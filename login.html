<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Restaurant 7★</title>
</head>
<body style="font-family:sans-serif; max-width:400px; margin:50px auto; padding:20px;">
    <h1>🍽️ Restaurant 7★</h1>
    
    <h2>Connexion</h2>
    <input type="email" id="login-email" placeholder="Email" style="width:100%;padding:10px;margin:5px 0;"><br>
    <input type="password" id="login-password" placeholder="Mot de passe" style="width:100%;padding:10px;margin:5px 0;"><br>
    <button onclick="login()" style="width:100%;padding:12px;background:#C6A43F;color:white;border:none;border-radius:20px;font-size:16px;cursor:pointer;">Se connecter</button>
    
    <hr>
    
    <h2>Inscription</h2>
    <input type="text" id="reg-nom" placeholder="Nom du restaurant" style="width:100%;padding:10px;margin:5px 0;"><br>
    <input type="email" id="reg-email" placeholder="Email" style="width:100%;padding:10px;margin:5px 0;"><br>
    <input type="password" id="reg-password" placeholder="Mot de passe (8+ car.)" style="width:100%;padding:10px;margin:5px 0;"><br>
    <button onclick="register()" style="width:100%;padding:12px;background:#27AE60;color:white;border:none;border-radius:20px;font-size:16px;cursor:pointer;">Créer mon espace</button>
    
    <div id="msg" style="margin-top:15px;padding:10px;border-radius:10px;"></div>

    <script>
    async function login() {
        var email = document.getElementById('login-email').value;
        var password = document.getElementById('login-password').value;
        var msg = document.getElementById('msg');
        
        if (!email || !password) { msg.innerHTML = '❌ Remplis tous les champs'; return; }
        msg.innerHTML = '⏳ Connexion...';
        
        try {
            var res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: email, motDePasse: password})
            });
            var data = await res.json();
            
            if (res.ok && data.success) {
                localStorage.setItem('resto_token', data.token);
                localStorage.setItem('resto_role', data.user.role);
                localStorage.setItem('resto_id', data.user.resto_id);
                msg.innerHTML = '✅ Connecté ! Redirection...';
                setTimeout(function(){ window.location.href = '/dashboard.html'; }, 1000);
            } else {
                msg.innerHTML = '❌ ' + (data.message || data.error || 'Erreur');
            }
        } catch(e) {
            msg.innerHTML = '❌ Erreur réseau';
        }
    }

    async function register() {
        var nom = document.getElementById('reg-nom').value;
        var email = document.getElementById('reg-email').value;
        var password = document.getElementById('reg-password').value;
        var msg = document.getElementById('msg');
        
        if (!nom || !email || !password) { msg.innerHTML = '❌ Remplis tous les champs'; return; }
        if (password.length < 8) { msg.innerHTML = '❌ Mot de passe : 8 caractères minimum'; return; }
        
        msg.innerHTML = '⏳ Création...';
        
        try {
            var res = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: email, motDePasse: password, nomRestaurant: nom})
            });
            var data = await res.json();
            
            if (res.ok && data.success) {
                localStorage.setItem('resto_token', data.token);
                localStorage.setItem('resto_role', 'gerant');
                localStorage.setItem('resto_id', data.user.resto_id);
                msg.innerHTML = '✅ Créé ! Redirection...';
                setTimeout(function(){ window.location.href = '/dashboard.html'; }, 1500);
            } else {
                msg.innerHTML = '❌ ' + (data.message || data.error || 'Erreur');
            }
        } catch(e) {
            msg.innerHTML = '❌ Erreur réseau';
        }
    }
    </script>
</body>
</html>
