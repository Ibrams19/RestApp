<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Resto Élite">
    <meta name="theme-color" content="#C6A43F">
    <link rel="manifest" href="/manifest.json">
    <title>Connexion | Restaurant Élite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1A1A2E 0%, #242440 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo { font-size: 48px; text-align: center; margin-bottom: 20px; }
        h1 { text-align: center; font-size: 28px; color: #1A1A2E; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #6C6C7A; margin-bottom: 30px; font-size: 14px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            cursor: pointer;
            background: #f0f0f0;
            transition: all 0.3s;
            font-weight: 500;
        }
        .tab.active { background: #C6A43F; color: white; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #1A1A2E; }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #E0E0E0;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #C6A43F;
            box-shadow: 0 0 0 3px rgba(198,164,63,0.1);
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #C6A43F 0%, #9E7E2E 100%);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(198,164,63,0.3); }
        .forgot-link { text-align: right; margin-top: 10px; }
        .forgot-link a { color: #C6A43F; text-decoration: none; font-size: 13px; }
        .message { margin-top: 15px; font-size: 14px; text-align: center; }
        .message.error { color: #E74C3C; }
        .message.success { color: #27AE60; }
        .info-text { text-align: center; margin-top: 20px; font-size: 12px; color: #6C6C7A; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🍽️</div>
        <h1>Restaurant Élite</h1>
        <div class="subtitle">Solution de gestion professionnelle</div>
        
        <div class="tabs">
            <div class="tab active" data-tab="login">🔐 Connexion</div>
            <div class="tab" data-tab="register">📝 Inscription</div>
        </div>
        
        <div id="login-form">
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" id="login-email" placeholder="ex: gerant@monresto.com">
            </div>
            <div class="form-group">
                <label>🔒 Mot de passe</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <div class="forgot-link">
                <a href="/forgot-password.html">Mot de passe oublié ?</a>
            </div>
            <button class="btn-primary" id="login-btn">🔐 Se connecter</button>
        </div>
        
        <div id="register-form" style="display: none;">
            <div class="form-group">
                <label>🏠 Nom du restaurant</label>
                <input type="text" id="register-nom" placeholder="Ex: Le Ndiollé">
            </div>
            <div class="form-group">
                <label>📧 Email du gérant</label>
                <input type="email" id="register-email" placeholder="ex: contact@monresto.com">
            </div>
            <div class="form-group">
                <label>🔒 Mot de passe</label>
                <input type="password" id="register-password" placeholder="Minimum 8 caractères">
            </div>
            <div class="form-group">
                <label>📞 Téléphone (optionnel)</label>
                <input type="tel" id="register-tel" placeholder="+221 77 000 00 00">
            </div>
            <div class="form-group">
                <label>📍 Adresse (optionnel)</label>
                <input type="text" id="register-adresse" placeholder="Dakar, Sénégal">
            </div>
            <button class="btn-primary" id="register-btn">🚀 Créer mon espace</button>
        </div>
        
        <div id="message" class="message"></div>
        <div class="info-text">💡 Espace sécurisé - Vos données sont protégées</div>
    </div>

    <script>
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const isLogin = tab.dataset.tab === 'login';
                document.getElementById('login-form').style.display = isLogin ? 'block' : 'none';
                document.getElementById('register-form').style.display = isLogin ? 'none' : 'block';
                document.getElementById('message').innerHTML = '';
            };
        });
        
        async function login() {
            const email = document.getElementById('login-email').value.trim();
            const motDePasse = document.getElementById('login-password').value;
            const messageDiv = document.getElementById('message');
            
            if (!email || !motDePasse) {
                messageDiv.innerHTML = '<div class="message error">❌ Veuillez entrer email et mot de passe</div>';
                return;
            }
            
            messageDiv.innerHTML = '<div class="message">⏳ Connexion en cours...</div>';
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, motDePasse })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    localStorage.setItem('resto_token', data.token);
                    localStorage.setItem('resto_user', JSON.stringify(data.user));
                    localStorage.setItem('resto_role', data.user.role);
                    localStorage.setItem('resto_id', data.user.resto_id);
                    messageDiv.innerHTML = '<div class="message success">✅ Connexion réussie ! Redirection...</div>';
                    setTimeout(() => {
                        if (data.user.role === 'gerant') window.location.href = '/dashboard.html';
                        else if (data.user.role === 'superadmin') window.location.href = '/superadmin.html';
                        else window.location.href = '/resto.html';
                    }, 1000);
                } else if (data.error === 'first_login') {
                    messageDiv.innerHTML = '<div class="message error">❌ Première connexion. Utilisez le lien magique reçu par WhatsApp.</div>';
                } else {
                    messageDiv.innerHTML = '<div class="message error">❌ ' + (data.error || 'Email ou mot de passe incorrect') + '</div>';
                }
            } catch(e) {
                messageDiv.innerHTML = '<div class="message error">❌ Erreur de connexion au serveur</div>';
            }
        }
        
        async function register() {
            const nom = document.getElementById('register-nom').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const motDePasse = document.getElementById('register-password').value;
            const telephone = document.getElementById('register-tel').value.trim();
            const adresse = document.getElementById('register-adresse').value.trim();
            const messageDiv = document.getElementById('message');
            
            if (!nom || !email || !motDePasse) {
                messageDiv.innerHTML = '<div class="message error">❌ Veuillez remplir tous les champs obligatoires</div>';
                return;
            }
            
            if (motDePasse.length < 8) {
                messageDiv.innerHTML = '<div class="message error">❌ Le mot de passe doit contenir au moins 8 caractères</div>';
                return;
            }
            
            messageDiv.innerHTML = '<div class="message">⏳ Création de votre espace...</div>';
            
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, motDePasse, nomRestaurant: nom, telephone, adresse })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    localStorage.setItem('resto_token', data.token);
                    localStorage.setItem('resto_user', JSON.stringify(data.user));
                    localStorage.setItem('resto_role', 'gerant');
                    localStorage.setItem('resto_id', data.user.resto_id);
                    messageDiv.innerHTML = '<div class="message success">✅ Restaurant créé ! Redirection...</div>';
                    setTimeout(() => { window.location.href = '/dashboard.html'; }, 1500);
                } else {
                    messageDiv.innerHTML = '<div class="message error">❌ ' + (data.error || 'Erreur lors de l\'inscription') + '</div>';
                }
            } catch(e) {
                messageDiv.innerHTML = '<div class="message error">❌ Erreur de connexion</div>';
            }
        }
        
        document.getElementById('login-btn').onclick = login;
        document.getElementById('register-btn').onclick = register;
        
        document.getElementById('login-password').addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
        document.getElementById('login-email').addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
        
        const token = localStorage.getItem('resto_token');
        if (token) {
            const role = localStorage.getItem('resto_role');
            if (role === 'gerant') window.location.href = '/dashboard.html';
            else if (role === 'superadmin') window.location.href = '/superadmin.html';
            else window.location.href = '/resto.html';
        }
    </script>
</body>
</html>
