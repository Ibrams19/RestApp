<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Connexion | Restaurant Élite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #1A1A2E 0%, #242440 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        .logo { font-size: 48px; text-align: center; margin-bottom: 20px; }
        h1 { text-align: center; color: #1A1A2E; margin-bottom: 10px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; }
        .tab { flex: 1; text-align: center; padding: 12px; border-radius: 40px; cursor: pointer; background: #f0f0f0; }
        .tab.active { background: #C6A43F; color: white; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 16px;
            font-size: 16px;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #C6A43F 0%, #9E7E2E 100%);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .error-message { color: #E74C3C; text-align: center; margin-top: 15px; font-size: 14px; }
        .info-text { text-align: center; margin-top: 20px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">🍽️</div>
        <h1>Restaurant Élite</h1>
        
        <div class="tabs">
            <div class="tab active" data-tab="login">🔐 Connexion</div>
            <div class="tab" data-tab="register">📝 Inscription</div>
        </div>
        
        <!-- Formulaire de connexion -->
        <div id="login-form">
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" id="login-email" placeholder="ex: gerant@monresto.com">
            </div>
            <div class="form-group">
                <label>🔒 Mot de passe</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>👤 Rôle</label>
                <select id="login-role">
                    <option value="gerant">📊 Gérant</option>
                    <option value="superadmin">👑 Super Admin</option>
                    <option value="cuisinier">👨‍🍳 Cuisinier</option>
                    <option value="serveur">🍽️ Serveur</option>
                </select>
            </div>
            <button class="btn-login" id="login-btn">🔐 Se connecter</button>
        </div>
        
        <!-- Formulaire d'inscription -->
        <div id="register-form" style="display: none;">
            <div class="form-group">
                <label>🏠 Nom du restaurant</label>
                <input type="text" id="register-nom" placeholder="Ex: Le Ndiollé">
            </div>
            <div class="form-group">
                <label>📧 Email du gérant</label>
                <input type="email" id="register-email" placeholder="ex: contact@monresto.com">
            </div>
            <div class="form-group">
                <label>🔒 Mot de passe</label>
                <input type="password" id="register-password" placeholder="•••••••• (min 6 caractères)">
            </div>
            <div class="form-group">
                <label>📞 Téléphone</label>
                <input type="tel" id="register-tel" placeholder="+221 77 000 00 00">
            </div>
            <div class="form-group">
                <label>📍 Adresse</label>
                <input type="text" id="register-adresse" placeholder="Dakar, Sénégal">
            </div>
            <button class="btn-login" id="register-btn">🚀 Créer mon espace</button>
        </div>
        
        <div class="error-message" id="error-message"></div>
        <div class="info-text">💡 Votre espace est sécurisé par mot de passe</div>
    </div>

    <script>
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const isLogin = tab.dataset.tab === 'login';
                document.getElementById('login-form').style.display = isLogin ? 'block' : 'none';
                document.getElementById('register-form').style.display = isLogin ? 'none' : 'block';
            };
        });
        
        async function login() {
            const email = document.getElementById('login-email').value.trim();
            const motDePasse = document.getElementById('login-password').value;
            const role = document.getElementById('login-role').value;
            const errorDiv = document.getElementById('error-message');
            
            if (!email || !motDePasse) {
                errorDiv.innerHTML = 'Veuillez entrer email et mot de passe';
                return;
            }
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, motDePasse, role })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    localStorage.setItem('resto_token', data.token);
                    localStorage.setItem('resto_user', JSON.stringify(data.user));
                    localStorage.setItem('resto_role', data.user.role);
                    localStorage.setItem('resto_id', data.user.resto_id);
                    
                    if (data.user.role === 'gerant') {
                        window.location.href = '/dashboard.html';
                    } else if (data.user.role === 'superadmin') {
                        window.location.href = '/superadmin.html';
                    } else {
                        window.location.href = '/resto.html';
                    }
                } else {
                    errorDiv.innerHTML = data.error || 'Email ou mot de passe incorrect';
                }
            } catch (error) {
                errorDiv.innerHTML = 'Erreur de connexion au serveur';
            }
        }
        
        async function register() {
            const nom = document.getElementById('register-nom').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const motDePasse = document.getElementById('register-password').value;
            const telephone = document.getElementById('register-tel').value.trim();
            const adresse = document.getElementById('register-adresse').value.trim();
            const errorDiv = document.getElementById('error-message');
            
            if (!nom || !email || !motDePasse) {
                errorDiv.innerHTML = 'Veuillez remplir tous les champs obligatoires';
                return;
            }
            
            if (motDePasse.length < 6) {
                errorDiv.innerHTML = 'Le mot de passe doit contenir au moins 6 caractères';
                return;
            }
            
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, motDePasse, nomRestaurant: nom, telephone, adresse })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    localStorage.setItem('resto_token', data.token);
                    localStorage.setItem('resto_user', JSON.stringify(data.user));
                    localStorage.setItem('resto_role', 'gerant');
                    localStorage.setItem('resto_id', data.user.resto_id);
                    window.location.href = '/dashboard.html';
                } else {
                    errorDiv.innerHTML = data.error || 'Erreur lors de l\'inscription';
                }
            } catch (error) {
                errorDiv.innerHTML = 'Erreur de connexion au serveur';
            }
        }
        
        document.getElementById('login-btn').onclick = login;
        document.getElementById('register-btn').onclick = register;
        
        document.getElementById('login-password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        
        const token = localStorage.getItem('resto_token');
        if (token) window.location.href = '/dashboard.html';
    </script>
</body>
</html>
