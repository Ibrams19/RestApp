<!DOCTYPE html>
<html lang="fr">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Resto Élite">
    <meta name="theme-color" content="#C6A43F">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Connexion | Restaurant Élite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1A1A2E 0%, #242440 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            color: #1A1A2E;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #6C6C7A;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #1A1A2E;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #E0E0E0;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #C6A43F;
            box-shadow: 0 0 0 3px rgba(198,164,63,0.1);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #C6A43F 0%, #9E7E2E 100%);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(198,164,63,0.3);
        }
        .error-message {
            color: #E74C3C;
            font-size: 14px;
            margin-top: 15px;
        }
        .demo-email {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #E0E0E0;
            font-size: 13px;
            color: #6C6C7A;
        }
        .demo-email span {
            background: #F5F5F5;
            padding: 5px 12px;
            border-radius: 20px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">🍽️</div>
        <h1>Espace Pro</h1>
        <div class="subtitle">Connectez-vous pour gérer votre restaurant</div>
        
        <div class="input-group">
            <label>📧 Email professionnel</label>
            <input type="email" id="email" placeholder="ex: admin@resto.com" autocomplete="off">
        </div>
        
        <button class="btn-login" id="login-btn">🔐 Se connecter</button>
        
        <div class="error-message" id="error-message"></div>
        
        <div class="demo-email">
            🔑 Compte de démo : <span>admin@resto.com</span>
        </div>
    </div>

    <script>
        const loginBtn = document.getElementById('login-btn');
        const emailInput = document.getElementById('email');
        const errorDiv = document.getElementById('error-message');

        async function login() {
            const email = emailInput.value.trim();
            
            if (!email) {
                errorDiv.textContent = 'Veuillez entrer votre email';
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.textContent = '⏳ Connexion...';
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    localStorage.setItem('resto_token', data.token);
                    localStorage.setItem('resto_user', JSON.stringify(data.user));
                    window.location.href = '/dashboard.html';
                } else {
                    errorDiv.textContent = data.error || 'Email non reconnu';
                }
            } catch (error) {
                errorDiv.textContent = 'Erreur de connexion au serveur';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '🔐 Se connecter';
            }
        }
        
        loginBtn.onclick = login;
        emailInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        
        // Vérifier si déjà connecté
        const token = localStorage.getItem('resto_token');
        if (token) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
