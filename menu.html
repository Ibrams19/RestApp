<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Menu 7★">
    <meta name="theme-color" content="#0d0d0d">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <title>Menu | RestApp 7★</title>
    <style>
        :root {
            --bg: #faf8f5;
            --bg-dark: #0d0d0d;
            --surface: #ffffff;
            --surface-dark: #1a1a1a;
            --surface-hover: #f5f3ed;
            --gold: #C6A43F;
            --gold-light: #f5eedb;
            --gold-dark: #a8872a;
            --text: #1a1a1a;
            --text-dark: #f0ece4;
            --text-secondary: #6b6b6b;
            --text-secondary-dark: #a0a0a0;
            --border: #e8e5df;
            --border-dark: #2a2a2a;
            --danger: #d9534f;
            --success: #27AE60;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.03);
            --shadow-md: 0 2px 16px rgba(0,0,0,0.05);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.08);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 60px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-serif: 'Playfair Display', 'Georgia', 'Times New Roman', serif;
            --header-height: 64px;
            --filter-height: 72px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            transition: background var(--transition), color var(--transition);
            padding-bottom: 100px;
        }

        body.dark {
            background: var(--bg-dark);
            color: var(--text-dark);
        }

        body.modal-open {
            overflow: hidden;
        }

        /* ========== HEADER ========== */
        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(250,248,245,0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            height: var(--header-height);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all var(--transition);
        }
        body.dark .header {
            background: rgba(13,13,13,0.9);
            border-bottom: 1px solid var(--border-dark);
        }

        .restaurant-name {
            font-family: var(--font-serif);
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.2px;
            color: var(--text);
        }
        body.dark .restaurant-name {
            color: var(--text-dark);
        }

        .table-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--gold-light);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: var(--gold-dark);
        }
        body.dark .table-indicator {
            background: #2a1f0a;
            color: var(--gold);
        }

        .theme-toggle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all var(--transition);
            margin-left: 8px;
        }
        body.dark .theme-toggle {
            background: var(--surface-dark);
            border-color: var(--border-dark);
        }

        /* ========== BARRE DE RECHERCHE ========== */
        .search-container {
            padding: 12px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px 12px 44px;
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            background: var(--surface);
            font-size: 14px;
            font-family: var(--font-sans);
            color: var(--text);
            transition: all var(--transition);
            outline: none;
        }
        .search-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(198,164,63,0.1);
        }
        .search-input::placeholder {
            color: #bbb;
        }
        body.dark .search-input {
            background: var(--surface-dark);
            border-color: var(--border-dark);
            color: var(--text-dark);
        }
        .search-wrapper {
            position: relative;
        }
        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: #bbb;
            pointer-events: none;
            z-index: 1;
        }

        /* ========== FILTRES STICKY ========== */
        .filters-sticky {
            position: sticky;
            top: var(--header-height);
            z-index: 40;
            background: rgba(250,248,245,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px 20px;
            transition: all var(--transition);
        }
        body.dark .filters-sticky {
            background: rgba(13,13,13,0.88);
        }

        .category-filters {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding: 4px 0;
            max-width: 800px;
            margin: 0 auto;
        }
        .category-filters::-webkit-scrollbar { display: none; }

        .category-btn {
            flex-shrink: 0;
            padding: 9px 20px;
            border-radius: 40px;
            border: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all var(--transition);
            color: var(--text-secondary);
            white-space: nowrap;
            font-family: var(--font-sans);
        }
        .category-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }
        .category-btn.active {
            background: var(--gold);
            color: white;
            border-color: var(--gold);
        }
        body.dark .category-btn {
            background: var(--surface-dark);
            border-color: var(--border-dark);
            color: var(--text-secondary-dark);
        }

        /* ========== GRILLE MENU ========== */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .menu-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition);
            display: flex;
            flex-direction: column;
        }
        .menu-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
            border-color: #d5cfc0;
        }
        .menu-card.unavailable {
            opacity: 0.5;
            pointer-events: none;
        }
        body.dark .menu-card {
            background: var(--surface-dark);
            border-color: var(--border-dark);
        }

        .menu-card-image {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #f5f3ed 0%, #e8e5df 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        body.dark .menu-card-image {
            background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
        }
        .menu-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .menu-card:hover .menu-card-image img {
            transform: scale(1.04);
        }
        .menu-card-image .placeholder-icon {
            font-size: 52px;
            opacity: 0.4;
        }
        .menu-card-image .no-photo {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 10px;
            padding: 4px 12px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .menu-card-body {
            padding: 16px 18px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .menu-card-category {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .menu-card-title {
            font-family: var(--font-serif);
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text);
            letter-spacing: -0.2px;
        }
        body.dark .menu-card-title {
            color: var(--text-dark);
        }

        .menu-card-description {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            flex: 1;
            margin-bottom: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        body.dark .menu-card-description {
            color: var(--text-secondary-dark);
        }

        .menu-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .menu-card-price {
            font-weight: 700;
            font-size: 18px;
            color: var(--text);
            white-space: nowrap;
        }
        body.dark .menu-card-price {
            color: var(--text-dark);
        }
        .menu-card-price small {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .btn-add {
            padding: 10px 18px;
            border-radius: 40px;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--gold);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all var(--transition);
            font-family: var(--font-sans);
            white-space: nowrap;
            letter-spacing: 0.2px;
        }
        .btn-add:hover {
            background: var(--gold);
            color: white;
        }
        .btn-add:active {
            transform: scale(0.95);
        }
        .btn-add.added {
            background: var(--success);
            border-color: var(--success);
            color: white;
            animation: addPulse 0.4s ease;
        }

        @keyframes addPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* ========== ÉTAT VIDE ========== */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        .empty-state-text {
            font-family: var(--font-serif);
            font-size: 18px;
            font-style: italic;
            opacity: 0.6;
        }

        /* ========== PANIER FLOTTANT ========== */
        .cart-fab {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 60;
        }

        .cart-fab-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: all var(--transition);
            position: relative;
            color: var(--text);
        }
        .cart-fab-btn:hover {
            transform: scale(1.06);
            border-color: var(--gold);
        }
        body.dark .cart-fab-btn {
            background: var(--surface-dark);
            border-color: var(--border-dark);
            color: var(--text-dark);
        }

        .cart-fab-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            min-width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            padding: 0 5px;
            animation: badgePop 0.3s ease;
        }

        .cart-fab-total {
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            font-weight: 600;
            color: var(--gold);
            white-space: nowrap;
            background: var(--bg);
            padding: 2px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        body.dark .cart-fab-total {
            background: var(--bg-dark);
            border-color: var(--border-dark);
        }

        @keyframes badgePop {
            0% { transform: scale(0); }
            70% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        /* ========== SUIVI COMMANDE ========== */
        .suivi-fab {
            position: fixed;
            bottom: 28px;
            left: 28px;
            z-index: 60;
        }

        .suivi-fab-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 12px 18px;
            border-radius: 40px;
            text-decoration: none;
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            box-shadow: var(--shadow-md);
            transition: all var(--transition);
        }
        .suivi-fab-btn:hover {
            border-color: var(--gold);
            box-shadow: var(--shadow-lg);
        }
        body.dark .suivi-fab-btn {
            background: var(--surface-dark);
            border-color: var(--border-dark);
            color: var(--text-dark);
        }

        /* ========== OVERLAY ========== */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 70;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
        }
        .overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        /* ========== TIROIR PANIER ========== */
        .cart-drawer {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            max-width: 420px;
            background: var(--surface);
            z-index: 80;
            transform: translateX(105%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
        }
        .cart-drawer.open {
            transform: translateX(0);
        }
        body.dark .cart-drawer {
            background: var(--surface-dark);
        }

        .cart-drawer-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        body.dark .cart-drawer-header {
            border-bottom: 1px solid var(--border-dark);
        }
        .cart-drawer-title {
            font-family: var(--font-serif);
            font-size: 20px;
            font-weight: 600;
        }
        .cart-drawer-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: transparent;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            color: var(--text-secondary);
        }
        .cart-drawer-close:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .cart-drawer-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f5f3ed;
            gap: 12px;
        }
        body.dark .cart-item {
            border-bottom: 1px solid #1f1f1f;
        }
        .cart-item-info {
            flex: 1;
            min-width: 0;
        }
        .cart-item-name {
            font-weight: 500;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .cart-item-price {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .cart-item-qty-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            color: var(--text);
            font-weight: 500;
        }
        .cart-item-qty-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }
        body.dark .cart-item-qty-btn {
            background: var(--surface-dark);
            border-color: var(--border-dark);
            color: var(--text-dark);
        }
        .cart-item-qty {
            width: 28px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
        }
        .cart-item-remove {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: #f5f3ed;
            cursor: pointer;
            font-size: 12px;
            transition: all var(--transition);
            color: #999;
        }
        .cart-item-remove:hover {
            background: var(--danger);
            color: white;
        }

        .cart-drawer-footer {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            background: #fdfcfa;
        }
        body.dark .cart-drawer-footer {
            border-top: 1px solid var(--border-dark);
            background: #141414;
        }
        .cart-total-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-size: 18px;
            font-weight: 600;
        }
        .cart-empty-message {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        .cart-empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .btn-order {
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            border: none;
            background: var(--gold);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            font-family: var(--font-sans);
            letter-spacing: 0.3px;
        }
        .btn-order:hover {
            background: var(--gold-dark);
            transform: translateY(-1px);
        }
        .btn-order:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .btn-order.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        /* ========== TOAST ========== */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px 20px;
            box-shadow: var(--shadow-lg);
            font-size: 13px;
            font-weight: 500;
            animation: toastIn 0.3s ease;
            pointer-events: all;
            white-space: nowrap;
            text-align: center;
        }
        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--danger); }
        body.dark .toast {
            background: var(--surface-dark);
            border-color: var(--border-dark);
        }

        @keyframes toastIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 480px) {
            .menu-grid {
                grid-template-columns: 1fr;
                gap: 14px;
                padding: 14px;
            }
            .menu-card-image {
                height: 150px;
            }
            .cart-fab {
                bottom: 20px;
                right: 20px;
            }
            .cart-drawer {
                max-width: 100%;
            }
            .header {
                padding: 0 14px;
            }
            .restaurant-name {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== HEADER ==================== -->
    <header class="header">
        <div class="restaurant-name" id="restaurant-name">🍽️ Menu</div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="table-indicator">
                🪑 Table <strong id="table-number">1</strong>
            </div>
            <button class="theme-toggle" id="theme-toggle" aria-label="Mode sombre">🌙</button>
        </div>
    </header>

    <!-- ==================== RECHERCHE ==================== -->
    <div class="search-container">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="search-input" placeholder="Rechercher un plat, une boisson…">
        </div>
    </div>

    <!-- ==================== FILTRES ==================== -->
    <div class="filters-sticky">
        <div class="category-filters" id="category-filters"></div>
    </div>

    <!-- ==================== MENU ==================== -->
    <div class="menu-grid" id="menu-grid"></div>

    <!-- ==================== LIEN SUIVI ==================== -->
    <div class="suivi-fab" id="suivi-fab" style="display: none;">
        <a href="#" class="suivi-fab-btn" id="suivi-link">
            📍 Suivre ma commande
        </a>
    </div>

    <!-- ==================== PANIER FAB ==================== -->
    <div class="cart-fab">
        <button class="cart-fab-btn" id="cart-fab-btn" aria-label="Panier">
            🛒
            <span class="cart-fab-badge" id="cart-badge" style="display: none;">0</span>
        </button>
        <div class="cart-fab-total" id="cart-fab-total" style="display: none;"></div>
    </div>

    <!-- ==================== OVERLAY ==================== -->
    <div class="overlay" id="overlay"></div>

    <!-- ==================== TIROIR PANIER ==================== -->
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-drawer-header">
            <span class="cart-drawer-title">🛒 Votre commande</span>
            <button class="cart-drawer-close" id="cart-close">✕</button>
        </div>
        <div class="cart-drawer-items" id="cart-items"></div>
        <div class="cart-drawer-footer">
            <div class="cart-total-line">
                <span>Total</span>
                <span id="cart-total">0 FCFA</span>
            </div>
            <button class="btn-order" id="btn-order">✅ Valider la commande</button>
        </div>
    </div>

    <!-- ==================== TOAST ==================== -->
    <div class="toast-container" id="toast-container"></div>

    <!-- ==================== SCRIPTS ==================== -->
    <script>
    (function() {
        'use strict';

        // ==================== CONFIGURATION ====================
        const urlParams = new URLSearchParams(window.location.search);
        const RESTO_ID = parseInt(urlParams.get('resto')) || null;
        const TABLE_ID = parseInt(urlParams.get('table')) || 1;

        const CART_STORAGE_KEY = `cart_${RESTO_ID}_${TABLE_ID}`;
        const NAME_STORAGE_KEY = `client_name_${RESTO_ID}_${TABLE_ID}`;
        const COMMANDE_STORAGE_KEY = `last_commande_${RESTO_ID}_${TABLE_ID}`;

        // ==================== ÉTAT ====================
        let menu = [];
        let panier = [];
        let selectedCategory = 'all';
        let clientName = '';
        let isOrdering = false;

        // ==================== INIT ====================
        function init() {
            if (!RESTO_ID) {
                showToast('⚠️ Restaurant introuvable. Scannez le QR code de votre table.', 'error');
                document.getElementById('menu-grid').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📱</div>
                        <div class="empty-state-text">Veuillez scanner le QR code de votre table</div>
                    </div>`;
                return;
            }

            document.getElementById('table-number').textContent = TABLE_ID;
            applyTheme();
            chargerClientName();
            chargerPanier();
            chargerMenu();
            initEventListeners();
            checkDerniereCommande();
        }

        function applyTheme() {
            // Détection automatique + préférence sauvegardée
            const saved = localStorage.getItem('menu_theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (saved === 'dark' || (!saved && prefersDark)) {
                document.body.classList.add('dark');
                document.getElementById('theme-toggle').textContent = '☀️';
            }
        }

        // ==================== NOM CLIENT ====================
        function chargerClientName() {
            clientName = localStorage.getItem(NAME_STORAGE_KEY) || '';
        }

        function demanderNomClient() {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.style.cssText = `
                    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
                    display: flex; align-items: center; justify-content: center;
                    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
                `;

                const dialog = document.createElement('div');
                dialog.style.cssText = `
                    background: var(--surface); border-radius: 24px; padding: 32px 24px;
                    max-width: 340px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
                `;
                dialog.innerHTML = `
                    <div style="font-size: 48px; margin-bottom: 16px;">👋</div>
                    <h3 style="font-family: var(--font-serif); font-size: 20px; margin-bottom: 8px;">Bienvenue</h3>
                    <p style="color: var(--text-secondary); font-size: 13px; margin-bottom: 20px;">
                        Pour mieux vous servir, comment devons-nous vous appeler ?
                    </p>
                    <input type="text" id="name-input" placeholder="Votre prénom"
                        style="width: 100%; padding: 12px 16px; border-radius: 40px; border: 1px solid var(--border);
                        font-size: 14px; font-family: var(--font-sans); outline: none; text-align: center;
                        margin-bottom: 16px; transition: all var(--transition);"
                        maxlength="30">
                    <div style="display: flex; gap: 10px;">
                        <button id="name-skip" style="flex: 1; padding: 10px; border-radius: 40px; border: 1px solid var(--border);
                            background: transparent; cursor: pointer; font-size: 13px; color: var(--text-secondary);">
                            Plus tard
                        </button>
                        <button id="name-confirm" style="flex: 2; padding: 10px; border-radius: 40px; border: none;
                            background: var(--gold); color: white; cursor: pointer; font-size: 13px; font-weight: 600;">
                            C'est parti !
                        </button>
                    </div>
                `;

                document.body.appendChild(overlay);
                overlay.appendChild(dialog);
                document.body.classList.add('modal-open');

                const input = dialog.querySelector('#name-input');
                setTimeout(() => input.focus(), 300);

                const close = (name) => {
                    document.body.removeChild(overlay);
                    document.body.classList.remove('modal-open');
                    resolve(name || '');
                };

                dialog.querySelector('#name-confirm').onclick = () => {
                    const name = input.value.trim();
                    if (name) {
                        localStorage.setItem(NAME_STORAGE_KEY, name);
                    }
                    close(name);
                };

                dialog.querySelector('#name-skip').onclick = () => close('');

                overlay.onclick = (e) => {
                    if (e.target === overlay) close('');
                };
            });
        }

        // ==================== PANIER LOCALSTORAGE ====================
        function sauvegarderPanier() {
            localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(panier));
        }

        function chargerPanier() {
            try {
                const saved = localStorage.getItem(CART_STORAGE_KEY);
                if (saved) {
                    panier = JSON.parse(saved);
                    // Vérifier que c'est un tableau valide
                    if (!Array.isArray(panier)) panier = [];
                }
            } catch(e) {
                panier = [];
            }
        }

        // ==================== CHARGEMENT MENU ====================
        async function chargerMenu() {
            try {
                const res = await fetch(`/api/menu/${RESTO_ID}`);
                if (!res.ok) throw new Error('Erreur serveur');
                const data = await res.json();

                // Le backend renvoie maintenant { restaurant, menu }
                if (data.restaurant) {
                    document.getElementById('restaurant-name').textContent = '🍽️ ' + data.restaurant;
                }
                menu = Array.isArray(data.menu) ? data.menu : (Array.isArray(data) ? data : []);

                afficherCategories();
                filtrerEtAfficher();
            } catch (error) {
                console.error(error);
                document.getElementById('menu-grid').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">😔</div>
                        <div class="empty-state-text">Menu temporairement indisponible</div>
                        <p style="margin-top: 8px; font-size: 13px;">Veuillez réessayer dans quelques instants.</p>
                    </div>`;
            }
        }

        // ==================== CATÉGORIES ====================
        function afficherCategories() {
            const categories = ['all', ...new Set(menu.map(p => p.categorie).filter(Boolean))];
            const container = document.getElementById('category-filters');

            container.innerHTML = categories.map(cat => `
                <button class="category-btn${cat === selectedCategory ? ' active' : ''}" data-category="${cat}">
                    ${cat === 'all' ? '🍽️ Tout' : cat}
                </button>
            `).join('');

            container.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    selectedCategory = btn.dataset.category;
                    afficherCategories();
                    filtrerEtAfficher();
                    // Scroll vers le haut des résultats
                    document.getElementById('menu-grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
            });
        }

        // ==================== FILTRAGE & AFFICHAGE ====================
        function filtrerEtAfficher() {
            const searchTerm = document.getElementById('search-input')?.value?.toLowerCase() || '';

            let filtered = menu.filter(plat => plat.disponible !== false);

            if (selectedCategory !== 'all') {
                filtered = filtered.filter(p => p.categorie === selectedCategory);
            }

            if (searchTerm.length >= 2) {
                filtered = filtered.filter(p =>
                    p.nom_plat.toLowerCase().includes(searchTerm) ||
                    (p.description && p.description.toLowerCase().includes(searchTerm)) ||
                    (p.categorie && p.categorie.toLowerCase().includes(searchTerm))
                );
            }

            afficherMenu(filtered);
        }

        function getCategoryIcon(categorie) {
            const icons = {
                'Entrée': '🥗',
                'Plat': '🍛',
                'Dessert': '🍰',
                'Boisson': '🥂',
                'Accompagnement': '🍟'
            };
            return icons[categorie] || '🍽️';
        }

        function afficherMenu(plats) {
            const container = document.getElementById('menu-grid');

            if (plats.length === 0) {
                const searchTerm = document.getElementById('search-input')?.value || '';
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">${searchTerm ? '🔍' : '🍃'}</div>
                        <div class="empty-state-text">
                            ${searchTerm ? `Aucun résultat pour "${searchTerm}"` : 'Aucun plat dans cette catégorie'}
                        </div>
                        <p style="margin-top: 8px; font-size: 13px;">
                            ${searchTerm ? 'Essayez un autre terme.' : 'Découvrez notre sélection dans les autres catégories.'}
                        </p>
                    </div>`;
                return;
            }

            container.innerHTML = plats.map(plat => {
                const isInCart = panier.find(p => p.id === plat.id);
                const qtyInCart = isInCart ? isInCart.quantite : 0;

                return `
                <div class="menu-card">
                    <div class="menu-card-image">
                        ${plat.photo_url ?
                            `<img src="${plat.photo_url}" alt="${escapeHtml(plat.nom_plat)}" loading="lazy">` :
                            `<div class="placeholder-icon">${getCategoryIcon(plat.categorie)}</div>
                             <div class="no-photo">Photo à venir</div>`
                        }
                    </div>
                    <div class="menu-card-body">
                        <div class="menu-card-category">${escapeHtml(plat.categorie || '')}</div>
                        <div class="menu-card-title">${escapeHtml(plat.nom_plat)}</div>
                        <div class="menu-card-description">${escapeHtml(plat.description || 'Un délice à découvrir…')}</div>
                        <div class="menu-card-footer">
                            <div class="menu-card-price">${plat.prix.toLocaleString()} <small>FCFA</small></div>
                            <button class="btn-add${qtyInCart > 0 ? ' added' : ''}"
                                data-id="${plat.id}"
                                data-nom="${escapeHtml(plat.nom_plat)}"
                                data-prix="${plat.prix}">
                                ${qtyInCart > 0 ? `✓ ${qtyInCart}` : '+ Ajouter'}
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');

            // Event listeners boutons ajouter
            container.querySelectorAll('.btn-add').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id);
                    const nom = this.dataset.nom;
                    const prix = parseInt(this.dataset.prix);

                    if (!clientName && !localStorage.getItem(NAME_STORAGE_KEY)) {
                        // Demander le nom avant d'ajouter
                        demanderNomClient().then(name => {
                            clientName = name;
                            ajouterAuPanier(id, nom, prix, this);
                        });
                    } else {
                        ajouterAuPanier(id, nom, prix, this);
                    }
                });
            });
        }

        // ==================== PANIER ====================
        function ajouterAuPanier(id, nom, prix, buttonElement) {
            const existant = panier.find(p => p.id === id);
            if (existant) {
                existant.quantite = Math.min(existant.quantite + 1, 99);
            } else {
                panier.push({ id, nom, prix, quantite: 1 });
            }

            // Animation bouton
            if (buttonElement) {
                buttonElement.classList.add('added');
                setTimeout(() => buttonElement.classList.remove('added'), 400);
            }

            sauvegarderPanier();
            updatePanierUI();
            showToast(`✅ ${nom} ajouté au panier`, 'success');

            // Mettre à jour les boutons du menu
            filtrerEtAfficher();
        }

        function modifierQuantite(id, delta) {
            const item = panier.find(p => p.id === id);
            if (!item) return;

            item.quantite = Math.max(0, Math.min(99, item.quantite + delta));

            if (item.quantite <= 0) {
                panier = panier.filter(p => p.id !== id);
            }

            sauvegarderPanier();
            updatePanierUI();
            filtrerEtAfficher(); // Rafraîchir les boutons du menu
        }

        function supprimerDuPanier(id) {
            const item = panier.find(p => p.id === id);
            if (!item) return;

            panier = panier.filter(p => p.id !== id);
            sauvegarderPanier();
            updatePanierUI();
            filtrerEtAfficher();
            showToast(`🗑️ ${item.nom} retiré du panier`, 'error');
        }

        function viderPanier() {
            panier = [];
            sauvegarderPanier();
            updatePanierUI();
            filtrerEtAfficher();
        }

        function updatePanierUI() {
            const count = panier.reduce((s, p) => s + p.quantite, 0);
            const total = panier.reduce((s, p) => s + (p.prix * p.quantite), 0);

            // Badge
            const badge = document.getElementById('cart-badge');
            badge.textContent = count;
            badge.style.display = count > 0 ? 'flex' : 'none';

            // Total sous le FAB
            const fabTotal = document.getElementById('cart-fab-total');
            if (count > 0) {
                fabTotal.textContent = total.toLocaleString() + ' FCFA';
                fabTotal.style.display = 'block';
            } else {
                fabTotal.style.display = 'none';
            }

            // Tiroir panier
            document.getElementById('cart-total').textContent = total.toLocaleString() + ' FCFA';
            const cartItems = document.getElementById('cart-items');

            if (panier.length === 0) {
                cartItems.innerHTML = `
                    <div class="cart-empty-message">
                        <div class="cart-empty-icon">🛒</div>
                        <p style="font-weight: 500;">Votre panier est vide</p>
                        <p style="font-size: 12px; color: var(--text-secondary); margin-top: 4px;">
                            Parcourez notre carte et ajoutez vos plats préférés !
                        </p>
                    </div>`;
                document.getElementById('btn-order').disabled = true;
            } else {
                cartItems.innerHTML = panier.map(p => `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${escapeHtml(p.nom)}</div>
                            <div class="cart-item-price">${p.prix.toLocaleString()} FCFA / unité</div>
                        </div>
                        <div class="cart-item-actions">
                            <button class="cart-item-qty-btn" data-action="minus" data-id="${p.id}">−</button>
                            <span class="cart-item-qty">${p.quantite}</span>
                            <button class="cart-item-qty-btn" data-action="plus" data-id="${p.id}">+</button>
                            <button class="cart-item-remove" data-action="remove" data-id="${p.id}" title="Retirer">🗑️</button>
                        </div>
                    </div>
                `).join('');

                document.getElementById('btn-order').disabled = false;

                // Event listeners
                cartItems.querySelectorAll('button').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const action = this.dataset.action;
                        const id = parseInt(this.dataset.id);
                        if (action === 'plus') modifierQuantite(id, 1);
                        else if (action === 'minus') modifierQuantite(id, -1);
                        else if (action === 'remove') supprimerDuPanier(id);
                    });
                });
            }
        }

        // ==================== COMMANDE ====================
        async function validerCommande() {
            if (isOrdering) return;
            if (panier.length === 0) {
                showToast('🛒 Votre panier est vide', 'error');
                return;
            }

            // Demander le nom si pas encore fait
            if (!clientName) {
                const name = await demanderNomClient();
                clientName = name;
                if (!localStorage.getItem(NAME_STORAGE_KEY) && name) {
                    localStorage.setItem(NAME_STORAGE_KEY, name);
                }
            }

            isOrdering = true;
            const btnOrder = document.getElementById('btn-order');
            btnOrder.textContent = '⏳ Envoi en cours…';
            btnOrder.classList.add('loading');

            const items = panier.map(p => ({
                menuId: p.id,
                quantite: p.quantite,
                prix: p.prix,
                nom: p.nom
            }));
            const total = panier.reduce((s, p) => s + (p.prix * p.quantite), 0);
            const finalClientName = localStorage.getItem(NAME_STORAGE_KEY) || clientName || 'Anonyme';

            try {
                const res = await fetch('/api/commande', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        restoId: RESTO_ID,
                        tableId: TABLE_ID,
                        clientName: finalClientName,
                        items: items,
                        total: total
                    })
                });

                if (res.ok) {
                    const data = await res.json();
                    const commandeId = data.commande_id;

                    // Sauvegarder l'ID de commande
                    localStorage.setItem(COMMANDE_STORAGE_KEY, commandeId);

                    // Afficher le lien de suivi
                    const suiviFab = document.getElementById('suivi-fab');
                    document.getElementById('suivi-link').href = `/suivi.html?id=${commandeId}`;
                    suiviFab.style.display = 'block';

                    // Vider le panier
                    viderPanier();
                    fermerTiroir();

                    showToast(`✅ Commande #${commandeId} envoyée en cuisine !`, 'success');
                } else {
                    const error = await res.json();
                    showToast(error.message || '❌ Erreur lors de la commande', 'error');
                }
            } catch (error) {
                console.error(error);
                showToast('❌ Erreur réseau. Vérifiez votre connexion.', 'error');
            } finally {
                isOrdering = false;
                btnOrder.textContent = '✅ Valider la commande';
                btnOrder.classList.remove('loading');
            }
        }

        // ==================== COMMANDE PRÉCÉDENTE ====================
        function checkDerniereCommande() {
            const lastCommandeId = localStorage.getItem(COMMANDE_STORAGE_KEY);
            if (lastCommandeId) {
                // Vérifier si la commande est encore active
                fetch(`/api/commande/suivi/${lastCommandeId}`)
                    .then(res => {
                        if (res.ok) {
                            return res.json();
                        }
                        throw new Error('Expirée');
                    })
                    .then(data => {
                        if (data.statut && data.statut !== 'paye') {
                            document.getElementById('suivi-link').href = `/suivi.html?id=${lastCommandeId}`;
                            document.getElementById('suivi-fab').style.display = 'block';
                        } else {
                            localStorage.removeItem(COMMANDE_STORAGE_KEY);
                        }
                    })
                    .catch(() => {
                        localStorage.removeItem(COMMANDE_STORAGE_KEY);
                    });
            }
        }

        // ==================== TIROIR PANIER ====================
        function ouvrirTiroir() {
            document.getElementById('cart-drawer').classList.add('open');
            document.getElementById('overlay').classList.add('open');
            document.body.classList.add('modal-open');
            updatePanierUI();
        }

        function fermerTiroir() {
            document.getElementById('cart-drawer').classList.remove('open');
            document.getElementById('overlay').classList.remove('open');
            document.body.classList.remove('modal-open');
        }

        // ==================== TOAST ====================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ==================== EVENT LISTENERS ====================
        function initEventListeners() {
            // Theme
            document.getElementById('theme-toggle').addEventListener('click', () => {
                document.body.classList.toggle('dark');
                const isDark = document.body.classList.contains('dark');
                localStorage.setItem('menu_theme', isDark ? 'dark' : 'light');
                document.getElementById('theme-toggle').textContent = isDark ? '☀️' : '🌙';
            });

            // Recherche
            const searchInput = document.getElementById('search-input');
            let searchTimeout;
            searchInput.addEventListener('input', () => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(filtrerEtAfficher, 300);
            });

            // Tiroir panier
            document.getElementById('cart-fab-btn').addEventListener('click', ouvrirTiroir);
            document.getElementById('cart-close').addEventListener('click', fermerTiroir);
            document.getElementById('overlay').addEventListener('click', fermerTiroir);

            // Valider commande
            document.getElementById('btn-order').addEventListener('click', validerCommande);

            // Fermer tiroir avec Escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') fermerTiroir();
            });

            // Geste swipe pour fermer le tiroir
            let touchStartX = 0;
            const drawer = document.getElementById('cart-drawer');
            drawer.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
            });
            drawer.addEventListener('touchmove', (e) => {
                const diff = e.touches[0].clientX - touchStartX;
                if (diff > 80) fermerTiroir();
            });
        }

        // ==================== UTILITAIRES ====================
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = String(str);
            return div.innerHTML;
        }

        // ==================== DÉMARRAGE ====================
        document.addEventListener('DOMContentLoaded', init);

        // Exposer pour compatibilité globale
        window.ajouterAuPanier = ajouterAuPanier;
        window.modifierQuantite = modifierQuantite;
        window.supprimerDuPanier = supprimerDuPanier;
    })();
    </script>
</body>
</html>
