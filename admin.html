<!DOCTYPE html>
<html lang="fr">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Resto Élite">
    <meta name="theme-color" content="#C6A43F">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Dashboard | Restaurant</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
        }
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-family: inherit;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .plats-table {
            width: 100%;
            background: white;
            border-radius: 20px;
            overflow-x: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .plats-table th, .plats-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .plats-table th {
            background: #1A1A2E;
            color: white;
        }
        .plat-photo {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
            background: #f0f0f0;
        }
        .btn-danger {
            background: #E74C3C;
            color: white;
        }
        .btn-warning {
            background: #F39C12;
            color: white;
        }
        .btn-small {
            padding: 5px 12px;
            font-size: 12px;
            margin: 3px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        .upload-btn {
            background: #C6A43F;
            color: #1A1A2E;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 12px;
            border: none;
        }
        .search-bar {
            margin-bottom: 15px;
        }
        .search-bar input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid #ddd;
        }
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            background: #f0f0f0;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .filter-btn.active {
            background: #C6A43F;
            color: white;
        }
        .nav-bar {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: 10px 20px;
            border-radius: 40px;
            text-decoration: none;
            background: #1A1A2E;
            color: white;
            transition: all 0.3s;
        }
        .nav-btn:hover {
            background: #C6A43F;
            color: #1A1A2E;
        }
        .stats-info {
            background: #f8f8f8;
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        @media (max-width: 768px) {
            .admin-container { padding: 15px; }
            .plats-table { font-size: 12px; }
            .plats-table th, .plats-table td { padding: 8px; }
        }
    </style>
</head>
<body>
    <header class="header-premium">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; padding: 15px 30px;">
            <div class="logo">👑 ADMIN DASHBOARD</div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span id="user-role" style="background: #C6A43F; padding: 5px 12px; border-radius: 20px; font-size: 12px;">Gérant</span>
                <select id="resto-select" class="btn-outline" style="padding: 8px 20px;">
                    <option value="1">Restaurant Test Dakar</option>
                </select>
                <button class="logout-btn" id="logout-btn" style="background: #E74C3C; color: white; border: none; padding: 8px 20px; border-radius: 40px; cursor: pointer;">🚪 Déconnexion</button>
            </div>
        </div>
    </header>

    <div class="nav-bar">
        <a href="/dashboard.html" class="nav-btn">📊 Dashboard</a>
        <a href="/admin.html" class="nav-btn" style="background: #C6A43F;">🍽️ Gestion plats</a>
        <a href="/resto.html" class="nav-btn">👨‍🍳 Cuisine</a>
        <a href="/qrcodes.html" class="nav-btn">📱 QR Codes</a>
    </div>

    <div class="admin-container">
        <div class="form-card">
            <h2>📝 Ajouter un plat</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Nom du plat</label>
                    <input type="text" id="plat-nom" placeholder="Ex: Yassa Poulet">
                </div>
                <div class="form-group">
                    <label>Prix (FCFA)</label>
                    <input type="number" id="plat-prix" placeholder="2500">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Catégorie</label>
                    <select id="plat-categorie">
                        <option value="Entrée">Entrée</option>
                        <option value="Plat">Plat</option>
                        <option value="Dessert">Dessert</option>
                        <option value="Boisson">Boisson</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Disponible</label>
                    <select id="plat-disponible">
                        <option value="true">✅ Disponible</option>
                        <option value="false">❌ Indisponible</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Description (optionnel)</label>
                <textarea id="plat-description" rows="2" placeholder="Une description appétissante..."></textarea>
            </div>
            <button class="btn-premium" id="ajouter-plat">➕ Ajouter le plat</button>
        </div>

        <div class="search-bar">
            <input type="text" id="search-plat" placeholder="🔍 Rechercher un plat par nom...">
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" id="filter-all">📋 Tous les plats</button>
            <button class="filter-btn" id="filter-available">✅ Disponibles</button>
            <button class="filter-btn" id="filter-unavailable">❌ Indisponibles</button>
        </div>

        <div class="stats-info" id="stats-info">
            <span>📊 Chargement...</span>
        </div>

        <div style="overflow-x: auto;">
            <table class="plats-table">
                <thead>
                    <tr>
                        <th>Photo</th>
                        <th>Nom</th>
                        <th>Prix</th>
                        <th>Catégorie</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="plats-list">
                    <tr><td colspan="6" style="text-align:center;">Chargement...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // VÉRIFICATION DE L'AUTHENTIFICATION ET DU RÔLE
        const token = localStorage.getItem('resto_token');
        const userRole = localStorage.getItem('resto_role');
        
        if (!token) {
            window.location.href = '/login.html';
        }
        
        if (userRole !== 'gerant') {
            alert('Accès réservé aux gérants');
            window.location.href = '/resto.html';
        }
        
        let currentResto = 1;
        let tousLesPlats = [];
        let currentFilter = 'all'; // 'all', 'available', 'unavailable'
        
        async function chargerPlats() {
            try {
                const res = await fetch(`/api/menu/${currentResto}`);
                if (res.ok) {
                    tousLesPlats = await res.json();
                    afficherPlats();
                    mettreAJourStats();
                } else if (res.status === 401) {
                    localStorage.clear();
                    window.location.href = '/login.html';
                }
            } catch(e) { console.error(e); }
        }
        
        function mettreAJourStats() {
            const total = tousLesPlats.length;
            const disponibles = tousLesPlats.filter(p => p.disponible === true).length;
            const indisponibles = tousLesPlats.filter(p => p.disponible === false).length;
            const statsDiv = document.getElementById('stats-info');
            statsDiv.innerHTML = `
                <span>📋 Total: ${total} plats</span>
                <span>✅ Disponibles: ${disponibles}</span>
                <span>❌ Indisponibles: ${indisponibles}</span>
            `;
        }
        
        function afficherPlats() {
            const searchTerm = document.getElementById('search-plat')?.value.toLowerCase() || '';
            let filtered = tousLesPlats.filter(p => p.nom_plat.toLowerCase().includes(searchTerm));
            
            // Appliquer le filtre de disponibilité
            if (currentFilter === 'available') {
                filtered = filtered.filter(p => p.disponible === true);
            } else if (currentFilter === 'unavailable') {
                filtered = filtered.filter(p => p.disponible === false);
            }
            
            const tbody = document.getElementById('plats-list');
            if (filtered.length === 0) {
                let message = 'Aucun plat trouvé';
                if (currentFilter === 'available') message = 'Aucun plat disponible';
                if (currentFilter === 'unavailable') message = 'Aucun plat indisponible';
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;">${message}</td></tr>`;
                return;
            }
            
            tbody.innerHTML = filtered.map(plat => `
                <tr>
                    <td style="text-align:center;">
                        ${plat.photo_url ? 
                            `<img src="${plat.photo_url}" class="plat-photo" alt="${plat.nom_plat}" style="width:50px;height:50px;object-fit:cover;border-radius:10px;">` : 
                            `<div style="width:50px;height:50px;display:flex;align-items:center;justify-content:center;background:#f0f0f0;border-radius:10px;">📷</div>`
                        }
                        <div style="margin-top:5px;">
                            <button class="btn-small upload-btn" onclick="uploadPhoto(${plat.id})">📷 Ajouter</button>
                        </div>
                    </td>
                    <td><strong>${escapeHtml(plat.nom_plat)}</strong><br><small style="color:gray;">${escapeHtml(plat.description || '')}</small></td>
                    <td>${plat.prix.toLocaleString()} FCFA</td>
                    <td>${plat.categorie || '-'}</td>
                    <td>${plat.disponible ? '<span style="color:#27AE60;">✅ Disponible</span>' : '<span style="color:#E74C3C;">❌ Indisponible</span>'}</td>
                    <td>
                        <button class="btn-small btn-warning" onclick="toggleDisponibilite(${plat.id}, ${!plat.disponible})">
                            ${plat.disponible ? '🔴 Désactiver' : '🟢 Activer'}
                        </button>
                        ${plat.photo_url ? `<button class="btn-small" style="background:#6b7280;color:white;" onclick="supprimerPhoto(${plat.id})">🗑️ Photo</button>` : ''}
                        <button class="btn-small btn-danger" onclick="supprimerPlat(${plat.id})">🗑️ Plat</button>
                    </td>
                </tr>
            `).join('');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function updateFilterButtons(activeId) {
            ['filter-all', 'filter-available', 'filter-unavailable'].forEach(id => {
                const btn = document.getElementById(id);
                if (btn) {
                    if (id === activeId) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                }
            });
        }
        
        async function ajouterPlat() {
            const nom = document.getElementById('plat-nom').value;
            const prix = document.getElementById('plat-prix').value;
            const categorie = document.getElementById('plat-categorie').value;
            const disponible = document.getElementById('plat-disponible').value === 'true';
            const description = document.getElementById('plat-description').value;
            
            if (!nom || !prix) {
                alert('❌ Veuillez remplir le nom et le prix');
                return;
            }
            
            try {
                const res = await fetch('/api/admin/plat', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        restoId: currentResto,
                        nom_plat: nom,
                        prix: parseInt(prix),
                        categorie: categorie,
                        disponible: disponible,
                        description: description
                    })
                });
                
                if (res.ok) {
                    alert('✅ Plat ajouté avec succès !');
                    document.getElementById('plat-nom').value = '';
                    document.getElementById('plat-prix').value = '';
                    document.getElementById('plat-description').value = '';
                    chargerPlats();
                } else {
                    const error = await res.json();
                    alert('❌ Erreur: ' + (error.error || 'Non autorisé'));
                }
            } catch(e) { console.error(e); }
        }
        
        function uploadPhoto(platId) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/jpeg,image/png,image/webp';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const formData = new FormData();
                formData.append('photo', file);
                
                try {
                    const res = await fetch(`/api/upload-plat-photo/${platId}`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });
                    
                    if (res.ok) {
                        alert('✅ Photo ajoutée avec succès !');
                        chargerPlats();
                    } else {
                        const error = await res.json();
                        alert('❌ Erreur: ' + (error.error || 'Upload échoué'));
                    }
                } catch(e) { console.error(e); }
            };
            input.click();
        }
        
        async function supprimerPhoto(platId) {
            if (!confirm('Supprimer cette photo ?')) return;
            try {
                const res = await fetch(`/api/delete-photo/${platId}`, { 
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    alert('✅ Photo supprimée');
                    chargerPlats();
                } else {
                    alert('❌ Erreur lors de la suppression');
                }
            } catch(e) { console.error(e); }
        }
        
        async function toggleDisponibilite(id, nouveauStatut) {
            try {
                const res = await fetch(`/api/admin/plat/${id}/disponible`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ disponible: nouveauStatut })
                });
                if (res.ok) {
                    chargerPlats();
                } else {
                    const error = await res.json();
                    alert('Erreur: ' + (error.error || 'Action non autorisée'));
                }
            } catch(e) { console.error(e); }
        }
        
        async function supprimerPlat(id) {
            if (!confirm('⚠️ Êtes-vous sûr de vouloir supprimer ce plat définitivement ?')) return;
            try {
                const res = await fetch(`/api/admin/plat/${id}`, { 
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    alert('✅ Plat supprimé');
                    chargerPlats();
                } else {
                    const error = await res.json();
                    alert('Erreur: ' + (error.error || 'Non autorisé'));
                }
            } catch(e) { console.error(e); }
        }
        
        // Gestion des filtres
        document.getElementById('filter-all').onclick = () => {
            currentFilter = 'all';
            updateFilterButtons('filter-all');
            afficherPlats();
        };
        document.getElementById('filter-available').onclick = () => {
            currentFilter = 'available';
            updateFilterButtons('filter-available');
            afficherPlats();
        };
        document.getElementById('filter-unavailable').onclick = () => {
            currentFilter = 'unavailable';
            updateFilterButtons('filter-unavailable');
            afficherPlats();
        };
        
        // Déconnexion
        document.getElementById('logout-btn').onclick = () => {
            localStorage.clear();
            window.location.href = '/login.html';
        };
        
        document.getElementById('ajouter-plat').onclick = ajouterPlat;
        document.getElementById('search-plat').oninput = () => afficherPlats();
        document.getElementById('resto-select').onchange = (e) => {
            currentResto = parseInt(e.target.value);
            chargerPlats();
        };
        
        // Rendre les fonctions globales pour les onclick
        window.uploadPhoto = uploadPhoto;
        window.supprimerPhoto = supprimerPhoto;
        window.toggleDisponibilite = toggleDisponibilite;
        window.supprimerPlat = supprimerPlat;
        
        chargerPlats();
    </script>
</body>
</html>
