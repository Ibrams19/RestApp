<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Gestion du menu">
    <meta name="theme-color" content="#0d0d0d">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Gestion du menu | RestApp 7★</title>
    <style>
        :root {
            --bg: #faf8f5; --bg-dark: #0d0d0d; --surface: #fff; --surface-dark: #1a1a1a;
            --gold: #C6A43F; --gold-dark: #a8872a; --text: #1a1a1a; --text-dark: #f0ece4;
            --text-secondary: #6b6b6b; --text-secondary-dark: #a0a0a0;
            --border: #e8e5df; --border-dark: #2a2a2a; --danger: #d9534f; --success: #27AE60;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.03); --shadow-md: 0 2px 16px rgba(0,0,0,0.05);
            --radius-sm: 12px; --radius-md: 16px; --radius-lg: 24px; --radius-xl: 60px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-sans: 'Inter', 'Segoe UI', system-ui, sans-serif;
            --font-serif: 'Playfair Display', 'Georgia', serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; transition: background var(--transition), color var(--transition); }
        body.dark { background: var(--bg-dark); color: var(--text-dark); }

        .header { background: rgba(255,255,255,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 24px; height: 64px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; transition: all var(--transition); }
        body.dark .header { background: rgba(13,13,13,0.9); border-bottom: 1px solid var(--border-dark); }
        .logo { font-family: var(--font-serif); font-size: 19px; font-weight: 600; letter-spacing: -0.3px; }
        .logo span { color: var(--gold); }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .btn-logout { background: transparent; border: 1px solid #e0dcd3; color: #999; padding: 8px 18px; border-radius: 40px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all var(--transition); }
        .btn-logout:hover { border-color: var(--danger); color: var(--danger); }
        body.dark .btn-logout { border-color: #3a3a3a; }

        .nav-bar { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; padding: 14px 16px 0; max-width: 1200px; margin: 0 auto; }
        .nav-btn { padding: 9px 18px; border-radius: 40px; text-decoration: none; font-size: 13px; font-weight: 500; background: var(--surface); color: var(--text-secondary); border: 1px solid var(--border); transition: all var(--transition); }
        .nav-btn:hover, .nav-btn.active { border-color: var(--gold); color: var(--gold); }
        .nav-btn.active { background: var(--gold); color: #fff; border-color: var(--gold); }
        body.dark .nav-btn { background: var(--surface-dark); border-color: var(--border-dark); color: var(--text-secondary-dark); }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px 24px 60px; }

        .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow-sm); }
        body.dark .section { background: var(--surface-dark); border-color: var(--border-dark); }
        .section-title { font-family: var(--font-serif); font-size: 20px; margin-bottom: 20px; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: var(--font-sans); background: #fdfcfa; color: var(--text); transition: all var(--transition); }
        .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(198,164,63,0.07); outline: none; background: #fff; }
        body.dark .form-input, body.dark .form-select, body.dark .form-textarea { background: var(--surface-dark); border-color: var(--border-dark); color: var(--text-dark); }
        .form-textarea { resize: vertical; min-height: 70px; }
        .btn { padding: 11px 22px; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all var(--transition); font-family: var(--font-sans); letter-spacing: 0.2px; border: none; }
        .btn-primary { background: var(--gold); color: #fff; }
        .btn-primary:hover { background: var(--gold-dark); }
        .btn-sm { padding: 6px 14px; font-size: 11px; border-radius: 20px; }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid #f5c6cb; }
        .btn-danger:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
        .btn-warning { background: #FFF8E1; color: #E67E22; border: 1px solid #ffeeba; }
        .btn-warning:hover { background: #F39C12; color: #fff; border-color: #F39C12; }
        .btn-success { background: #E8F5E9; color: #27AE60; border: 1px solid #c3e6cb; }
        .btn-success:hover { background: #27AE60; color: #fff; border-color: #27AE60; }

        .search-bar { margin-bottom: 16px; }
        .search-input { width: 100%; padding: 11px 18px 11px 40px; border: 1px solid var(--border); border-radius: 40px; font-size: 14px; font-family: var(--font-sans); background: var(--surface); transition: all var(--transition); }
        .search-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(198,164,63,0.07); outline: none; }
        .search-wrapper { position: relative; }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 15px; color: #bbb; pointer-events: none; }
        body.dark .search-input { background: var(--surface-dark); border-color: var(--border-dark); color: var(--text-dark); }

        .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 18px; border-radius: 40px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 12px; font-weight: 500; transition: all var(--transition); color: var(--text-secondary); font-family: var(--font-sans); }
        .filter-btn.active { background: var(--gold); color: #fff; border-color: var(--gold); }
        body.dark .filter-btn { background: var(--surface-dark); border-color: var(--border-dark); color: var(--text-secondary-dark); }

        .stats-bar { display: flex; gap: 16px; flex-wrap: wrap; padding: 14px 18px; background: #fdfcfa; border-radius: var(--radius-sm); border: 1px solid var(--border); margin-bottom: 16px; font-size: 13px; color: var(--text-secondary); }
        body.dark .stats-bar { background: #141414; border-color: var(--border-dark); color: var(--text-secondary-dark); }
        .stats-bar strong { color: var(--gold); }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #fdfcfa; padding: 14px 16px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); font-weight: 600; border-bottom: 2px solid var(--border); white-space: nowrap; }
        body.dark th { background: #141414; border-bottom: 2px solid var(--border-dark); color: var(--text-secondary-dark); }
        td { padding: 12px 16px; border-bottom: 1px solid #f5f3ed; font-size: 13px; vertical-align: middle; }
        body.dark td { border-bottom: 1px solid #1f1f1f; }
        tr:hover td { background: #fdfcfa; }
        body.dark tr:hover td { background: rgba(255,255,255,0.02); }

        .plat-img { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; background: #f0f0f0; }
        .plat-placeholder { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: #f5f3ed; color: #ccc; font-size: 18px; }
        body.dark .plat-placeholder { background: #1f1f1f; }

        .badge-status { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-available { background: #E8F5E9; color: #27AE60; }
        .badge-unavailable { background: #FDE8E8; color: #E74C3C; }
        body.dark .badge-available { background: #0a2e1a; color: #2ECC71; }
        body.dark .badge-unavailable { background: #2a0a0a; color: #E74C3C; }

        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .toast { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px 20px; box-shadow: var(--shadow-md); font-size: 13px; font-weight: 500; animation: slideIn 0.3s ease; max-width: 380px; }
        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--danger); }
        body.dark .toast { background: var(--surface-dark); border-color: var(--border-dark); }
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .container { padding: 14px; }
            .header { padding: 0 14px; }
            .logo { font-size: 16px; }
            td, th { padding: 8px 10px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">📋 <span>Gestion</span> du menu</div>
        <div class="header-right">
            <button class="btn-logout" id="logout-btn">Quitter</button>
        </div>
    </header>

    <nav class="nav-bar">
        <a href="/dashboard.html" class="nav-btn">📊 Dashboard</a>
        <a href="/admin.html" class="nav-btn active">📋 Menu</a>
        <a href="/employes.html" class="nav-btn">👥 Équipe</a>
        <a href="/resto.html" class="nav-btn">👨‍🍳 Cuisine</a>
        <a href="/qrcodes.html" class="nav-btn">📱 QR Codes</a>
        <a href="/subscription.html" class="nav-btn">💰 Abonnement</a>
    </nav>

    <div class="container">
        <!-- Formulaire ajout -->
        <div class="section">
            <h2 class="section-title">📝 Ajouter un article</h2>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Nom de l'article *</label>
                    <input type="text" id="plat-nom" class="form-input" placeholder="Ex: Yassa Poulet, Crêpe Nutella..." required>
                </div>
                <div class="form-group">
                    <label class="form-label">Prix (FCFA) *</label>
                    <input type="number" id="plat-prix" class="form-input" placeholder="2500" min="100" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Catégorie</label>
                    <select id="plat-categorie" class="form-select">
                        <option value="Entrée">Entrée</option>
                        <option value="Plat" selected>Plat</option>
                        <option value="Dessert">Dessert</option>
                        <option value="Boisson">Boisson</option>
                        <option value="Pâtisserie">Pâtisserie</option>
                        <option value="Crêpe">Crêpe</option>
                        <option value="Glace">Glace</option>
                        <option value="Accompagnement">Accompagnement</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Statut</label>
                    <select id="plat-disponible" class="form-select">
                        <option value="true">✅ Disponible</option>
                        <option value="false">❌ Indisponible</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea id="plat-description" class="form-textarea" placeholder="Une description courte et appétissante…" maxlength="500"></textarea>
            </div>
            <button class="btn btn-primary" id="btn-ajouter">➕ Ajouter l'article</button>
        </div>

        <!-- Recherche + Filtres -->
        <div class="search-bar">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-plat" class="search-input" placeholder="Rechercher un article...">
            </div>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">📋 Tous</button>
            <button class="filter-btn" data-filter="available">✅ Disponibles</button>
            <button class="filter-btn" data-filter="unavailable">❌ Indisponibles</button>
        </div>

        <div class="stats-bar" id="stats-bar">📊 Chargement…</div>

        <!-- Table -->
        <div class="section" style="padding: 0; overflow: hidden;">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Photo</th>
                            <th>Nom</th>
                            <th>Prix</th>
                            <th>Catégorie</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="plats-tbody">
                        <tr><td colspan="6" style="text-align:center; padding:40px;">Chargement…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
    (function() {
        'use strict';

        const TOKEN_KEY = 'resto_token';
        let token, userRole, currentResto;
        let tousLesArticles = [];
        let currentFilter = 'all';

        // ==================== INIT ====================
        function init() {
            token = localStorage.getItem(TOKEN_KEY);
            if (!token) { redirectToLogin(); return; }

            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                if (payload.exp && payload.exp * 1000 < Date.now()) { redirectToLogin(); return; }
                userRole = payload.role;
                currentResto = payload.resto_id;
                if (!currentResto) { redirectToLogin(); return; }
            } catch(e) { redirectToLogin(); return; }

            if (userRole !== 'gerant' && userRole !== 'superadmin') {
                window.location.href = '/resto.html';
                return;
            }

            initEvents();
            chargerArticles();
        }

        function redirectToLogin() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        // ==================== EVENTS ====================
        function initEvents() {
            document.getElementById('btn-ajouter').addEventListener('click', ajouterArticle);
            document.getElementById('search-plat').addEventListener('input', debounce(afficherArticles, 250));
            document.getElementById('logout-btn').addEventListener('click', () => { localStorage.clear(); window.location.href = '/login.html'; });

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    afficherArticles();
                });
            });

            document.getElementById('plat-prix').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') ajouterArticle();
            });
        }

        // ==================== CHARGEMENT ====================
        async function chargerArticles() {
            try {
                const res = await fetch(`/api/admin/menu/${currentResto}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401 || res.status === 403) {
                    const data = await res.json().catch(() => ({}));
                    if (data.code === 'SUBSCRIPTION_EXPIRED') window.location.href = '/subscription-renew.html';
                    else redirectToLogin();
                    return;
                }
                if (res.ok) {
                    tousLesArticles = await res.json();
                    afficherArticles();
                }
            } catch(e) { showToast('Erreur réseau', 'error'); }
        }

        // ==================== AFFICHAGE ====================
        function afficherArticles() {
            const searchTerm = document.getElementById('search-plat').value.toLowerCase();
            let filtered = tousLesArticles;

            if (searchTerm) {
                filtered = filtered.filter(p => p.nom_plat.toLowerCase().includes(searchTerm));
            }
            if (currentFilter === 'available') filtered = filtered.filter(p => p.disponible === true);
            if (currentFilter === 'unavailable') filtered = filtered.filter(p => p.disponible === false);

            const total = tousLesArticles.length;
            const dispos = tousLesArticles.filter(p => p.disponible === true).length;
            const indispos = tousLesArticles.filter(p => p.disponible === false).length;
            document.getElementById('stats-bar').innerHTML = `
                <span>📋 <strong>${total}</strong> article${total > 1 ? 's' : ''}</span>
                <span>✅ <strong>${dispos}</strong> disponible${dispos > 1 ? 's' : ''}</span>
                <span>❌ <strong>${indispos}</strong> indisponible${indispos > 1 ? 's' : ''}</span>
                ${searchTerm ? `<span>🔍 <strong>${filtered.length}</strong> résultat${filtered.length > 1 ? 's' : ''}</span>` : ''}
            `;

            const tbody = document.getElementById('plats-tbody');
            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:40px; color:var(--text-secondary);">🍃 Aucun article trouvé</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(article => `
                <tr>
                    <td style="text-align:center;">
                        ${article.photo_url
                            ? `<img src="${article.photo_url}" class="plat-img" alt="${escapeHtml(article.nom_plat)}">`
                            : `<div class="plat-placeholder">📷</div>`
                        }
                        <div style="margin-top:4px;">
                            <button class="btn btn-sm" style="background:var(--gold);color:#fff;border:none;" data-action="upload" data-id="${article.id}">📷</button>
                        </div>
                    </td>
                    <td>
                        <strong>${escapeHtml(article.nom_plat)}</strong>
                        ${article.description ? `<br><small style="color:var(--text-secondary);">${escapeHtml(article.description).substring(0, 60)}${article.description.length > 60 ? '…' : ''}</small>` : ''}
                    </td>
                    <td>${(article.prix || 0).toLocaleString()} FCFA</td>
                    <td>${escapeHtml(article.categorie || '-')}</td>
                    <td>
                        <span class="badge-status ${article.disponible ? 'badge-available' : 'badge-unavailable'}">
                            ${article.disponible ? 'Disponible' : 'Indisponible'}
                        </span>
                    </td>
                    <td style="white-space:nowrap;">
                        <button class="btn btn-sm ${article.disponible ? 'btn-warning' : 'btn-success'}" data-action="toggle" data-id="${article.id}" data-status="${!article.disponible}">
                            ${article.disponible ? '🔴 Désactiver' : '🟢 Activer'}
                        </button>
                        ${article.photo_url ? `<button class="btn btn-sm btn-danger" data-action="delete-photo" data-id="${article.id}" style="margin-left:4px;">🗑️</button>` : ''}
                        <button class="btn btn-sm btn-danger" data-action="delete" data-id="${article.id}" style="margin-left:4px;">🗑️</button>
                    </td>
                </tr>
            `).join('');

            tbody.querySelectorAll('button[data-action="upload"]').forEach(btn => {
                btn.addEventListener('click', () => uploadPhoto(parseInt(btn.dataset.id)));
            });
            tbody.querySelectorAll('button[data-action="toggle"]').forEach(btn => {
                btn.addEventListener('click', () => toggleDisponibilite(parseInt(btn.dataset.id), btn.dataset.status === 'true'));
            });
            tbody.querySelectorAll('button[data-action="delete-photo"]').forEach(btn => {
                btn.addEventListener('click', () => supprimerPhoto(parseInt(btn.dataset.id)));
            });
            tbody.querySelectorAll('button[data-action="delete"]').forEach(btn => {
                btn.addEventListener('click', () => supprimerArticle(parseInt(btn.dataset.id)));
            });
        }

        // ==================== ACTIONS ====================
        async function ajouterArticle() {
            const nom = document.getElementById('plat-nom').value.trim();
            const prix = parseInt(document.getElementById('plat-prix').value);
            const categorie = document.getElementById('plat-categorie').value;
            const disponible = document.getElementById('plat-disponible').value === 'true';
            const description = document.getElementById('plat-description').value.trim();

            if (!nom || nom.length < 2) { showToast("Nom de l'article requis (min 2 caractères)", 'error'); return; }
            if (!prix || prix < 100) { showToast('Prix minimum : 100 FCFA', 'error'); return; }

            try {
                const res = await fetch('/api/admin/plat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ restoId: currentResto, nom_plat: nom, prix, categorie, disponible, description })
                });
                if (res.ok) {
                    showToast('✅ Article ajouté', 'success');
                    document.getElementById('plat-nom').value = '';
                    document.getElementById('plat-prix').value = '';
                    document.getElementById('plat-description').value = '';
                    document.getElementById('plat-nom').focus();
                    chargerArticles();
                } else {
                    const err = await res.json();
                    showToast(err.message || err.error || 'Erreur', 'error');
                }
            } catch(e) { showToast('Erreur réseau', 'error'); }
        }

        function uploadPhoto(articleId) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/jpeg,image/png,image/webp';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 5 * 1024 * 1024) { showToast('Image trop volumineuse (max 5 Mo)', 'error'); return; }

                const formData = new FormData();
                formData.append('photo', file);
                try {
                    const res = await fetch(`/api/upload-plat-photo/${articleId}`, {
                        method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: formData
                    });
                    if (res.ok) { showToast('✅ Photo ajoutée', 'success'); chargerArticles(); }
                    else { const err = await res.json(); showToast(err.error || 'Erreur upload', 'error'); }
                } catch(e) { showToast('Erreur réseau', 'error'); }
            };
            input.click();
        }

        async function supprimerPhoto(articleId) {
            if (!confirm('Supprimer cette photo ?')) return;
            try {
                const res = await fetch(`/api/delete-photo/${articleId}`, {
                    method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) { showToast('✅ Photo supprimée', 'success'); chargerArticles(); }
                else showToast('Erreur suppression', 'error');
            } catch(e) { showToast('Erreur réseau', 'error'); }
        }

        async function toggleDisponibilite(id, nouveauStatut) {
            try {
                const res = await fetch(`/api/admin/plat/${id}/disponible`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ disponible: nouveauStatut })
                });
                if (res.ok) { chargerArticles(); }
                else { const err = await res.json(); showToast(err.error || 'Erreur', 'error'); }
            } catch(e) { showToast('Erreur réseau', 'error'); }
        }

        async function supprimerArticle(id) {
            if (!confirm("Supprimer définitivement cet article ? Cette action est irréversible.")) return;
            try {
                const res = await fetch(`/api/admin/plat/${id}`, {
                    method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) { showToast('✅ Article supprimé', 'success'); chargerArticles(); }
                else { const err = await res.json(); showToast(err.error || 'Erreur', 'error'); }
            } catch(e) { showToast('Erreur réseau', 'error'); }
        }

        // ==================== TOAST ====================
        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = String(str);
            return div.innerHTML;
        }

        function debounce(fn, delay) {
            let timer;
            return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
        }

        document.addEventListener('DOMContentLoaded', init);
    })();
    </script>
</body>
</html>
