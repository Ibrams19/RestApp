<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Équipe 7★">
    <meta name="theme-color" content="#0d0d0d">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Mon équipe | RestApp</title>
    <style>
        :root {
            --bg: #faf8f5; --bg-dark: #0d0d0d; --surface: #fff; --surface-dark: #1a1a1a;
            --gold: #C6A43F; --gold-dark: #a8872a; --text: #1a1a1a; --text-dark: #f0ece4;
            --text-secondary: #6b6b6b; --text-secondary-dark: #a0a0a0;
            --border: #e8e5df; --border-dark: #2a2a2a; --danger: #d9534f; --success: #27AE60; --info: #3498DB;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.03); --shadow-md: 0 2px 16px rgba(0,0,0,0.05); --shadow-lg: 0 8px 40px rgba(0,0,0,0.08);
            --radius-sm: 12px; --radius-md: 16px; --radius-lg: 24px; --radius-xl: 60px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-sans: 'Inter', 'Segoe UI', system-ui, sans-serif;
            --font-serif: 'Playfair Display', 'Georgia', serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; transition: background var(--transition), color var(--transition); }
        body.dark { background: var(--bg-dark); color: var(--text-dark); }
        body.modal-open { overflow: hidden; }

        .header { background: rgba(255,255,255,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 24px; height: 64px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; transition: all var(--transition); }
        body.dark .header { background: rgba(13,13,13,0.9); border-bottom: 1px solid var(--border-dark); }
        .logo { font-family: var(--font-serif); font-size: 19px; font-weight: 600; letter-spacing: -0.3px; }
        .logo span { color: var(--gold); }
        .btn-logout { background: transparent; border: 1px solid #e0dcd3; color: #999; padding: 8px 18px; border-radius: 40px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all var(--transition); }
        .btn-logout:hover { border-color: var(--danger); color: var(--danger); }
        body.dark .btn-logout { border-color: #3a3a3a; }

        .nav-bar { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; padding: 14px 16px 0; max-width: 1200px; margin: 0 auto; }
        .nav-btn { padding: 9px 18px; border-radius: 40px; text-decoration: none; font-size: 13px; font-weight: 500; background: var(--surface); color: var(--text-secondary); border: 1px solid var(--border); transition: all var(--transition); }
        .nav-btn:hover, .nav-btn.active { border-color: var(--gold); color: var(--gold); }
        .nav-btn.active { background: var(--gold); color: #fff; border-color: var(--gold); }
        body.dark .nav-btn { background: var(--surface-dark); border-color: var(--border-dark); color: var(--text-secondary-dark); }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px 24px 60px; }

        .page-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
        .page-title { font-family: var(--font-serif); font-size: 24px; }
        .btn-primary { padding: 11px 22px; border-radius: 40px; background: var(--gold); color: #fff; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all var(--transition); font-family: var(--font-sans); letter-spacing: 0.2px; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary:hover { background: var(--gold-dark); transform: translateY(-1px); }

        .search-bar { margin-bottom: 20px; }
        .search-wrapper { position: relative; }
        .search-input { width: 100%; padding: 11px 18px 11px 40px; border: 1px solid var(--border); border-radius: 40px; font-size: 14px; font-family: var(--font-sans); background: var(--surface); transition: all var(--transition); }
        .search-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(198,164,63,0.07); outline: none; }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 15px; color: #bbb; }
        body.dark .search-input { background: var(--surface-dark); border-color: var(--border-dark); color: var(--text-dark); }

        .stats-bar { display: flex; gap: 16px; flex-wrap: wrap; padding: 14px 18px; background: #fdfcfa; border-radius: var(--radius-sm); border: 1px solid var(--border); margin-bottom: 20px; font-size: 13px; color: var(--text-secondary); }
        body.dark .stats-bar { background: #141414; border-color: var(--border-dark); color: var(--text-secondary-dark); }
        .stats-bar strong { color: var(--gold); }

        .employes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .employe-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-sm); transition: all var(--transition); display: flex; flex-direction: column; align-items: center; text-align: center; }
        .employe-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-3px); border-color: #d5cfc0; }
        body.dark .employe-card { background: var(--surface-dark); border-color: var(--border-dark); }

        .employe-avatar { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 14px; }
        .avatar-cuisinier { background: #E3F2FD; }
        .avatar-serveur { background: #FFF3E0; }
        body.dark .avatar-cuisinier { background: #0a1e3d; }
        body.dark .avatar-serveur { background: #2e1f0a; }

        .employe-nom { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
        .employe-role { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; margin: 10px 0 16px; }
        .badge-cuisinier { background: #E3F2FD; color: #2471A3; }
        .badge-serveur { background: #FFF3E0; color: #E67E22; }
        body.dark .badge-cuisinier { background: #0a1e3d; color: #3498DB; }
        body.dark .badge-serveur { background: #2e1f0a; color: #F39C12; }

        .employe-date { font-size: 11px; color: var(--text-secondary); margin-bottom: 16px; }
        .employe-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .btn-sm { padding: 7px 14px; border-radius: 20px; font-size: 11px; font-weight: 500; cursor: pointer; transition: all var(--transition); font-family: var(--font-sans); border: 1px solid var(--border); background: var(--surface); }
        .btn-sm:hover { border-color: var(--gold); }
        .btn-share { background: #25D366; color: #fff; border-color: #25D366; }
        .btn-share:hover { background: #1da851; }
        .btn-delete { color: var(--danger); border-color: #f5c6cb; }
        .btn-delete:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
        body.dark .btn-sm { background: var(--surface-dark); border-color: var(--border-dark); }

        /* Modale */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity var(--transition); }
        .modal-overlay.open { opacity: 1; pointer-events: all; }
        .modal-dialog { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; max-width: 420px; width: 90%; box-shadow: var(--shadow-lg); max-height: 90vh; overflow-y: auto; }
        body.dark .modal-dialog { background: var(--surface-dark); border-color: var(--border-dark); }
        .modal-title { font-family: var(--font-serif); font-size: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input, .form-select { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: var(--font-sans); background: #fdfcfa; color: var(--text); transition: all var(--transition); }
        .form-input:focus, .form-select:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 0 3px rgba(198,164,63,0.07); }
        body.dark .form-input, body.dark .form-select { background: var(--surface-dark); border-color: var(--border-dark); color: var(--text-dark); }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .btn-cancel { background: transparent; border: 1px solid var(--border); padding: 9px 20px; border-radius: 40px; cursor: pointer; font-size: 13px; transition: all var(--transition); font-family: var(--font-sans); color: var(--text-secondary); }
        .btn-cancel:hover { border-color: var(--text-secondary); }
        .btn-confirm { background: var(--gold); color: #fff; border: none; padding: 9px 20px; border-radius: 40px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all var(--transition); font-family: var(--font-sans); }
        .btn-confirm:hover { background: var(--gold-dark); }

        .lien-display { background: #f5f3ed; border-radius: var(--radius-sm); padding: 12px; word-break: break-all; font-size: 12px; margin: 16px 0; color: var(--text-secondary); }
        body.dark .lien-display { background: #1f1f1f; color: var(--text-secondary-dark); }

        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
        .toast { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px 20px; box-shadow: var(--shadow-md); font-size: 13px; font-weight: 500; animation: slideIn 0.3s ease; max-width: 380px; }
        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--danger); }
        body.dark .toast { background: var(--surface-dark); border-color: var(--border-dark); }
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); grid-column: 1 / -1; }
        .empty-state-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
        body.dark .empty-state { color: var(--text-secondary-dark); }

        @media (max-width: 768px) {
            .container { padding: 14px; }
            .employes-grid { grid-template-columns: 1fr; }
            .page-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">👥 <span>Mon</span> équipe</div>
        <button class="btn-logout" id="logout-btn">Quitter</button>
    </header>

    <nav class="nav-bar">
        <a href="/dashboard.html" class="nav-btn">📊 Dashboard</a>
        <a href="/admin.html" class="nav-btn">🍽️ Plats</a>
        <a href="/employes.html" class="nav-btn active">👥 Équipe</a>
        <a href="/resto.html" class="nav-btn">👨‍🍳 Cuisine</a>
        <a href="/qrcodes.html" class="nav-btn">📱 QR Codes</a>
        <a href="/subscription.html" class="nav-btn">💰 Abonnement</a>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">Mon équipe</h1>
            <button class="btn-primary" id="btn-add">➕ Ajouter un employé</button>
        </div>

        <div class="search-bar">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="search" placeholder="Rechercher par nom…">
            </div>
        </div>

        <div class="stats-bar" id="stats-bar">📊 Chargement…</div>

        <div class="employes-grid" id="employes-grid">
            <div class="empty-state"><div class="empty-state-icon">⏳</div>Chargement…</div>
        </div>
    </div>

    <!-- Modale Ajout -->
    <div class="modal-overlay" id="modal-add">
        <div class="modal-dialog">
            <h3 class="modal-title">➕ Ajouter un employé</h3>
            <div class="form-group">
                <label class="form-label">Prénom</label>
                <input type="text" class="form-input" id="prenom" placeholder="Ex: Modou" maxlength="50">
            </div>
            <div class="form-group">
                <label class="form-label">Nom *</label>
                <input type="text" class="form-input" id="nom" placeholder="Ex: Diop" maxlength="50" required>
            </div>
            <div class="form-group">
                <label class="form-label">Rôle</label>
                <select class="form-select" id="role">
                    <option value="cuisinier">👨‍🍳 Cuisinier</option>
                    <option value="serveur">🍽️ Serveur</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="btn-cancel-add">Annuler</button>
                <button class="btn-confirm" id="btn-confirm-add">Ajouter</button>
            </div>
        </div>
    </div>

    <!-- Modale Lien magique -->
    <div class="modal-overlay" id="modal-lien">
        <div class="modal-dialog" style="text-align:center;">
            <div style="font-size:48px;margin-bottom:12px;">🔗</div>
            <h3 class="modal-title">Lien d'invitation</h3>
            <p style="font-size:13px;color:var(--text-secondary);margin-bottom:4px;">Partagez ce lien avec <strong id="lien-nom">…</strong></p>
            <div class="lien-display" id="lien-text"></div>
            <div class="modal-actions" style="justify-content:center;">
                <button class="btn-sm btn-share" id="btn-copier">📋 Copier</button>
                <button class="btn-sm" id="btn-tester" style="background:var(--gold);color:#fff;border-color:var(--gold);">🔗 Tester</button>
            </div>
            <button class="btn-cancel" id="btn-close-lien" style="margin-top:16px;width:100%;">Fermer</button>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
    (function() {
        'use strict';

        const TOKEN_KEY = 'resto_token';
        let token, userRole, currentResto;
        let employes = [];

        // ==================== INIT ====================
        function init() {
            token = localStorage.getItem(TOKEN_KEY);
            if (!token) { redirectToLogin(); return; }

            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                if (payload.exp && payload.exp * 1000 < Date.now()) { redirectToLogin(); return; }
                userRole = payload.role;
                currentResto = payload.resto_id;
            } catch(e) { redirectToLogin(); return; }

            if (userRole !== 'gerant' && userRole !== 'superadmin') {
                window.location.href = '/resto.html';
                return;
            }

            initEvents();
            chargerEmployes();
        }

        function redirectToLogin() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        // ==================== EVENTS ====================
        function initEvents() {
            document.getElementById('btn-add').addEventListener('click', () => openModal('modal-add'));
            document.getElementById('btn-cancel-add').addEventListener('click', () => closeModal('modal-add'));
            document.getElementById('btn-confirm-add').addEventListener('click', ajouterEmploye);
            document.getElementById('btn-close-lien').addEventListener('click', () => closeModal('modal-lien'));
            document.getElementById('logout-btn').addEventListener('click', () => { localStorage.clear(); window.location.href = '/login.html'; });
            document.getElementById('search').addEventListener('input', debounce(afficherEmployes, 200));

            // Fermer modales au clic extérieur
            document.querySelectorAll('.modal-overlay').forEach(overlay => {
                overlay.addEventListener('click', function(e) {
                    if (e.target === this) closeModal(this.id);
                });
            });

            // Escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    document.querySelectorAll('.modal-overlay.open').forEach(m => closeModal(m.id));
                }
            });
        }

        function openModal(id) {
            document.getElementById(id).classList.add('open');
            document.body.classList.add('modal-open');
            if (id === 'modal-add') document.getElementById('nom').focus();
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('open');
            if (!document.querySelector('.modal-overlay.open')) {
                document.body.classList.remove('modal-open');
            }
        }

        // ==================== CHARGEMENT ====================
        async function chargerEmployes() {
            try {
                const res = await fetch('/api/employes', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401 || res.status === 403) {
                    const data = await res.json().catch(() => ({}));
                    if (data.code === 'SUBSCRIPTION_EXPIRED') window.location.href = '/subscription-renew.html';
                    else redirectToLogin();
                    return;
                }
                if (res.ok) {
                    employes = await res.json();
                    afficherEmployes();
                }
            } catch(e) { showToast('Erreur réseau', 'error'); }
        }

        // ==================== AFFICHAGE ====================
        function afficherEmployes() {
            const searchTerm = document.getElementById('search').value.toLowerCase();
            const filtered = employes.filter(e =>
                (e.nom && e.nom.toLowerCase().includes(searchTerm)) ||
                (e.prenom && e.prenom.toLowerCase().includes(searchTerm))
            );

            document.getElementById('stats-bar').innerHTML = `
                <span>📋 <strong>${employes.length}</strong> employé${employes.length > 1 ? 's' : ''}</span>
                <span>👨‍🍳 <strong>${employes.filter(e => e.role === 'cuisinier').length}</strong> cuisinier${employes.filter(e => e.role === 'cuisinier').length > 1 ? 's' : ''}</span>
                <span>🍽️ <strong>${employes.filter(e => e.role === 'serveur').length}</strong> serveur${employes.filter(e => e.role === 'serveur').length > 1 ? 's' : ''}</span>
            `;

            const grid = document.getElementById('employes-grid');
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">👥</div><p>Aucun employé trouvé</p><p style="font-size:12px;margin-top:4px;">Ajoutez votre premier membre d'équipe !</p></div>`;
                return;
            }

            grid.innerHTML = filtered.map(e => `
                <div class="employe-card">
                    <div class="employe-avatar ${e.role === 'cuisinier' ? 'avatar-cuisinier' : 'avatar-serveur'}">
                        ${e.role === 'cuisinier' ? '👨‍🍳' : '🍽️'}
                    </div>
                    <div class="employe-nom">${escapeHtml(e.prenom ? e.prenom + ' ' : '')}${escapeHtml(e.nom)}</div>
                    <div class="employe-role ${e.role === 'cuisinier' ? 'badge-cuisinier' : 'badge-serveur'}">
                        ${e.role === 'cuisinier' ? 'Cuisinier' : 'Serveur'}
                    </div>
                    ${e.created_at ? `<div class="employe-date">Ajouté le ${new Date(e.created_at).toLocaleDateString('fr-FR')}</div>` : ''}
                    <div class="employe-actions">
                        <button class="btn-sm btn-share" data-action="share" data-lien="${escapeHtml(e.lien_unique || '')}" data-nom="${escapeHtml((e.prenom ? e.prenom + ' ' : '') + e.nom)}">📤 Partager</button>
                        <button class="btn-sm btn-delete" data-action="delete" data-id="${e.id}">🗑️ Supprimer</button>
                    </div>
                </div>
            `).join('');

            // Event listeners
            grid.querySelectorAll('[data-action="share"]').forEach(btn => {
                btn.addEventListener('click', () => ouvrirLienModal(btn.dataset.lien, btn.dataset.nom));
            });
            grid.querySelectorAll('[data-action="delete"]').forEach(btn => {
                btn.addEventListener('click', () => supprimerEmploye(parseInt(btn.dataset.id)));
            });
        }

        // ==================== MODALE LIEN ====================
        function ouvrirLienModal(lien, nom) {
            if (!lien || lien === 'null' || lien === 'undefined') {
                showToast('Lien invalide', 'error');
                return;
            }
            document.getElementById('lien-nom').textContent = nom;
            document.getElementById('lien-text').textContent = lien;

            document.getElementById('btn-copier').onclick = () => {
                navigator.clipboard.writeText(lien).then(() => showToast('✅ Lien copié !', 'success'))
                    .catch(() => { prompt('Copiez ce lien :', lien); });
            };
            document.getElementById('btn-tester').onclick = () => window.open(lien, '_blank');

            openModal('modal-lien');
        }

        // ==================== ACTIONS ====================
        async function ajouterEmploye() {
            const prenom = document.getElementById('prenom').value.trim();
            const nom = document.getElementById('nom').value.trim();
            const role = document.getElementById('role').value;

            if (!nom || nom.length < 2) { showToast('Le nom est requis (min 2 caractères)', 'error'); return; }

            const btn = document.getElementById('btn-confirm-add');
            btn.disabled = true;
            btn.textContent = 'Ajout…';

            try {
                const res = await fetch('/api/employes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ nom, prenom, role })
                });
                const data = await res.json();

                if (res.ok) {
                    showToast(`✅ ${data.role || 'Employé'} ajouté !`, 'success');
                    closeModal('modal-add');
                    document.getElementById('prenom').value = '';
                    document.getElementById('nom').value = '';
                    chargerEmployes();
                    if (data.lien) {
                        setTimeout(() => ouvrirLienModal(data.lien, data.nom), 500);
                    }
                } else {
                    showToast(data.message || data.error || 'Erreur', 'error');
                }
            } catch(e) { showToast('Erreur réseau', 'error'); }
            finally {
                btn.disabled = false;
                btn.textContent = 'Ajouter';
            }
        }

        async function supprimerEmploye(id) {
            if (!confirm('Supprimer cet employé ? Cette action est irréversible.')) return;
            try {
                const res = await fetch(`/api/employes/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) { showToast('✅ Employé supprimé', 'success'); chargerEmployes(); }
                else { const data = await res.json(); showToast(data.message || data.error || 'Erreur', 'error'); }
            } catch(e) { showToast('Erreur réseau', 'error'); }
        }

        // ==================== TOAST ====================
        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = String(str);
            return div.innerHTML;
        }

        function debounce(fn, delay) {
            let timer;
            return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
        }

        document.addEventListener('DOMContentLoaded', init);
    })();
    </script>
</body>
