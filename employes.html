<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    meta name="apple-mobile-web-app-title" content="Resto Élite">
    <meta name="theme-color" content="#C6A43F">
    <title>Équipe | Restaurant Élite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #F5F6FA;
            color: #1A1A2E;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1A1A2E 0%, #242440 100%);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo { font-size: 24px; font-weight: bold; color: white; }
        .logo span { color: #C6A43F; }
        .btn-logout {
            background: #E74C3C;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
        }

        /* Navigation */
        .nav-bar {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 25px 20px;
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: 10px 24px;
            border-radius: 40px;
            text-decoration: none;
            background: #1A1A2E;
            color: white;
            font-weight: 500;
        }
        .nav-btn.active { background: #C6A43F; color: #1A1A2E; }

        /* Container */
        .container { max-width: 1400px; margin: 0 auto; padding: 20px 30px; }

        /* Header actions */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }
        .btn-add {
            background: linear-gradient(135deg, #C6A43F 0%, #9E7E2E 100%);
            color: #1A1A2E;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Search */
        .search-bar input {
            width: 100%;
            padding: 14px 24px;
            border-radius: 60px;
            border: 1px solid #E0E0E0;
            margin-bottom: 20px;
        }

        /* Stats */
        .stats {
            background: white;
            padding: 15px 25px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        /* Grid */
        .employes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        /* Card */
        .employe-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: transform 0.3s;
        }
        .employe-card:hover { transform: translateY(-5px); }

        .employe-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1A1A2E 0%, #242440 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 20px;
        }
        .employe-nom { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
        .employe-role {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: bold;
            margin: 15px 0;
        }
        .role-cuisinier { background: #3498DB; color: white; }
        .role-serveur { background: #F39C12; color: white; }

        .employe-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn-share {
            background: #25D366;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-delete {
            background: #E74C3C;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 35px;
            max-width: 450px;
            width: 90%;
        }
        .modal-content h3 { margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
        }
        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 25px;
        }
        .btn-confirm {
            background: #C6A43F;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-cancel {
            background: #6C6C7A;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #27AE60;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 1100;
            animation: slideIn 0.3s ease;
        }
        .toast-error { background: #E74C3C; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            .employes-grid { grid-template-columns: 1fr; }
            .header-actions { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">🍽️ <span>RESTAURANT ÉLITE</span></div>
        <button class="btn-logout" id="logout-btn">🚪 Déconnexion</button>
    </header>

    <div class="nav-bar">
        <a href="/dashboard.html" class="nav-btn">📊 Dashboard</a>
        <a href="/admin.html" class="nav-btn">🍽️ Gestion plats</a>
        <a href="/employes.html" class="nav-btn active">👥 Équipe</a>
        <a href="/resto.html" class="nav-btn">👨‍🍳 Cuisine</a>
        <a href="/qrcodes.html" class="nav-btn">📱 QR Codes</a>
    </div>

    <div class="container">
        <div class="header-actions">
            <h1>👥 Mon équipe</h1>
            <button class="btn-add" id="btn-add">➕ Ajouter un employé</button>
        </div>

        <div class="search-bar">
            <input type="text" id="search" placeholder="🔍 Rechercher par nom...">
        </div>

        <div class="stats" id="stats">📊 Chargement...</div>

        <div class="employes-grid" id="employes-grid">
            <div style="text-align: center; padding: 40px;">Chargement...</div>
        </div>
    </div>

    <!-- Modal Ajout -->
    <div id="modal-add" class="modal">
        <div class="modal-content">
            <h3>➕ Ajouter un employé</h3>
            <div class="form-group">
                <label>Prénom</label>
                <input type="text" id="prenom" placeholder="Ex: Modou">
            </div>
            <div class="form-group">
                <label>Nom</label>
                <input type="text" id="nom" placeholder="Ex: Diop">
            </div>
            <div class="form-group">
                <label>Rôle</label>
                <select id="role">
                    <option value="cuisinier">👨‍🍳 Cuisinier</option>
                    <option value="serveur">🍽️ Serveur</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal('modal-add')">Annuler</button>
                <button class="btn-confirm" id="btn-confirm-add">Ajouter</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('resto_token');
        const userRole = localStorage.getItem('resto_role');
        
        if (!token || (userRole !== 'gerant' && userRole !== 'superadmin')) {
            window.location.href = '/login.html';
        }

        let employes = [];

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'toast-error' : ''}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        async function chargerEmployes() {
            try {
                const res = await fetch('/api/admin/employes', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    employes = await res.json();
                    afficherEmployes();
                } else if (res.status === 401) {
                    localStorage.clear();
                    window.location.href = '/login.html';
                }
            } catch(e) { 
                console.error(e); 
                showToast('Erreur de chargement', true);
            }
        }

        function afficherEmployes() {
            const searchTerm = document.getElementById('search').value.toLowerCase();
            const filtered = employes.filter(e => 
                (e.nom && e.nom.toLowerCase().includes(searchTerm)) ||
                (e.prenom && e.prenom.toLowerCase().includes(searchTerm))
            );

            const total = employes.length;
            const cuisiniers = employes.filter(e => e.role === 'cuisinier').length;
            const serveurs = employes.filter(e => e.role === 'serveur').length;
            document.getElementById('stats').innerHTML = `
                <span>📋 <strong>${total}</strong> employé(s)</span>
                <span>👨‍🍳 <strong>${cuisiniers}</strong> cuisinier(s)</span>
                <span>🍽️ <strong>${serveurs}</strong> serveur(s)</span>
            `;

            const container = document.getElementById('employes-grid');
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;">Aucun employé trouvé</div>';
                return;
            }

            container.innerHTML = filtered.map(e => `
                <div class="employe-card" data-id="${e.id}">
                    <div class="employe-avatar">${e.role === 'cuisinier' ? '👨‍🍳' : '🍽️'}</div>
                    <div class="employe-nom">${escapeHtml(e.prenom ? e.prenom + ' ' : '')}${escapeHtml(e.nom)}</div>
                    <div class="employe-role role-${e.role}">${e.role === 'cuisinier' ? '👨‍🍳 Cuisinier' : '🍽️ Serveur'}</div>
                    <div class="employe-actions">
                        <button class="btn-share" data-lien="${e.lien_unique || ''}" data-nom="${escapeHtml(e.nom)}">📤 Partager</button>
                        <button class="btn-delete" data-id="${e.id}">🗑️ Supprimer</button>
                    </div>
                </div>
            `).join('');

            // Attacher les événements après le rendu
            document.querySelectorAll('.btn-share').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const lien = btn.getAttribute('data-lien');
                    const nom = btn.getAttribute('data-nom');
                    partagerLien(lien, nom);
                });
            });

            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.getAttribute('data-id');
                    supprimerEmploye(id);
                });
            });
        }

        function afficherLienModal(lien, nom) {
            const modal = document.createElement('div');
            modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:2000;display:flex;align-items:center;justify-content:center;';
            modal.innerHTML = `
                <div style="background:white;border-radius:32px;padding:30px;width:90%;max-width:450px;text-align:center;">
                    <div style="font-size:48px;margin-bottom:10px;">🔗</div>
                    <h3>Lien magique</h3>
                    <p>Envoyez ce lien à <strong>${escapeHtml(nom)}</strong></p>
                    <div style="background:#f5f5f5;border-radius:12px;padding:12px;margin:20px 0;word-break:break-all;font-size:12px;">${lien}</div>
                    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
                        <button class="btn-copy-link" style="background:#3498DB;color:white;padding:10px 20px;border-radius:50px;border:none;cursor:pointer;">📋 Copier</button>
                        <button class="btn-test-link" style="background:#C6A43F;color:#1A1A2E;padding:10px 20px;border-radius:50px;border:none;cursor:pointer;">🔗 Tester</button>
                    </div>
                    <button class="btn-close-modal" style="background:#6C6C7A;color:white;margin-top:20px;padding:10px 20px;border-radius:50px;border:none;cursor:pointer;">Fermer</button>
                </div>
            `;
            document.body.appendChild(modal);

            modal.querySelector('.btn-copy-link').onclick = () => copierLien(lien);
            modal.querySelector('.btn-test-link').onclick = () => window.open(lien, '_blank');
            modal.querySelector('.btn-close-modal').onclick = () => modal.remove();
        }

        function partagerLien(lien, nom) {
            if (!lien || lien === 'null' || lien === 'undefined') {
                showToast('❌ Lien invalide, veuillez réessayer', true);
                return;
            }
            afficherLienModal(lien, nom);
        }

        function copierLien(lien) {
            navigator.clipboard.writeText(lien).then(() => {
                showToast('✅ Lien copié dans le presse-papier !');
            }).catch(() => {
                prompt('Copiez ce lien manuellement :', lien);
            });
        }

        async function ajouterEmploye() {
            const prenom = document.getElementById('prenom').value.trim();
            const nom = document.getElementById('nom').value.trim();
            const role = document.getElementById('role').value;

            if (!nom) {
                showToast('❌ Veuillez entrer un nom', true);
                return;
            }

            try {
                const res = await fetch('/api/admin/employe', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ nom, prenom: prenom || '', role })
                });

                const data = await res.json();

                if (res.ok) {
                    showToast(`✅ ${data.role || role} ajouté avec succès !`);
                    closeModal('modal-add');
                    document.getElementById('prenom').value = '';
                    document.getElementById('nom').value = '';
                    chargerEmployes();
                    if (data.lien) {
                        setTimeout(() => partagerLien(data.lien, data.nom || nom), 500);
                    }
                } else {
                    showToast('❌ ' + (data.error || 'Erreur lors de l\'ajout'), true);
                }
            } catch(e) {
                console.error(e);
                showToast('❌ Erreur de connexion au serveur', true);
            }
        }

        async function supprimerEmploye(id) {
    if (!confirm('⚠️ Êtes-vous sûr de vouloir supprimer cet employé ?\n\nCette action est irréversible.')) {
        return;
    }
    
    try {
        const res = await fetch(`/api/admin/employe/${id}`, {
            method: 'DELETE',
            headers: { 
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        });
        
        const data = await res.json();
        
        if (res.ok) {
            showToast('✅ Employé supprimé avec succès');
            // ✅ FORCER LE RAFRAÎCHISSEMENT IMMÉDIAT
            await chargerEmployes();
            // ✅ AUSSI FORCER L'AFFICHAGE
            afficherEmployes();
        } else {
            showToast('❌ ' + (data.error || 'Suppression impossible'), true);
        }
    } catch(e) {
        console.error('Erreur réseau:', e);
        showToast('❌ Erreur de connexion au serveur', true);
    }
}

     setTimeout(() => window.location.reload(), 500);

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        document.getElementById('btn-add').onclick = () => document.getElementById('modal-add').style.display = 'flex';
        document.getElementById('btn-confirm-add').onclick = ajouterEmploye;
        document.getElementById('logout-btn').onclick = () => { localStorage.clear(); window.location.href = '/login.html'; };
        document.getElementById('search').oninput = () => afficherEmployes();

        window.onclick = (e) => {
            if (e.target.classList.contains('modal')) e.target.style.display = 'none';
        };

        window.partagerLien = partagerLien;
        window.supprimerEmploye = supprimerEmploye;
        window.copierLien = copierLien;
        window.closeModal = closeModal;

        chargerEmployes();

        const user = JSON.parse(localStorage.getItem('resto_user') || '{}');
        if (user.restaurant_name) {
            document.querySelector('.logo').innerHTML = `🍽️ <span>${escapeHtml(user.restaurant_name)}</span>`;
        }
    </script>
</body>
</html>
