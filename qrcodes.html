<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Codes | Restaurant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        h1 { text-align: center; margin-bottom: 30px; color: #1A1A2E; }
        .qr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .qr-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .qr-card h3 {
            color: #C6A43F;
            margin-bottom: 15px;
        }
        .qr-img {
            width: 150px;
            height: 150px;
            margin: 10px auto;
            display: block;
        }
        button {
            background: #C6A43F;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .nav-bar {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: 10px 20px;
            border-radius: 40px;
            text-decoration: none;
            background: #1A1A2E;
            color: white;
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="/dashboard.html" class="nav-btn">📊 Dashboard</a>
        <a href="/admin.html" class="nav-btn">🍽️ Plats</a>
        <a href="/resto.html" class="nav-btn">👨‍🍳 Cuisine</a>
        <a href="/qrcodes.html" class="nav-btn" style="background: #C6A43F; color:#1A1A2E;">📱 QR Codes</a>
    </div>
    
    <h1>📱 QR Codes par table</h1>
    <div class="qr-grid" id="qr-grid">
        <div style="text-align:center;">Chargement...</div>
    </div>

    <script>
        const tables = [1, 2, 3, 4, 5];
        const baseUrl = window.location.origin;
        
        async function chargerQRCodes() {
            const container = document.getElementById('qr-grid');
            container.innerHTML = '';
            
            for (const tableId of tables) {
                try {
                    const res = await fetch(`${baseUrl}/api/generate-qr/1/${tableId}`);
                    if (res.ok) {
                        const html = await res.text();
                        // Extraire l'image du QR code
                        const match = html.match(/img src="([^"]+)"/);
                        const qrSrc = match ? match[1] : '';
                        
                        container.innerHTML += `
                            <div class="qr-card">
                                <h3>🍽️ TABLE ${tableId}</h3>
                                <img class="qr-img" src="${qrSrc}" alt="QR Code Table ${tableId}">
                                <button onclick="window.open('${baseUrl}/api/generate-qr/1/${tableId}', '_blank')">🖨️ Imprimer</button>
                                <p style="font-size: 11px; margin-top: 10px; word-break: break-all;">${baseUrl}/menu.html?resto=1&table=${tableId}</p>
                            </div>
                        `;
                    }
                } catch(e) {
                    console.error(e);
                    container.innerHTML += `<div class="qr-card"><h3>🍽️ TABLE ${tableId}</h3><p style="color:red;">Erreur chargement</p></div>`;
                }
            }
        }
        
        chargerQRCodes();
    </script>
</body>
</html>
