<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Connexion magique | Restaurant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #1A1A2E 0%, #242440 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #C6A43F;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success-icon { font-size: 64px; margin: 20px 0; }
        .error-icon { font-size: 64px; margin: 20px 0; }
        .btn {
            background: #C6A43F;
            color: #1A1A2E;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="card" id="card">
        <div id="content">
            <div class="spinner"></div>
            <p>Connexion en cours...</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        async function connecter() {
            if (!token) {
                document.getElementById('content').innerHTML = `
                    <div class="error-icon">❌</div>
                    <h2>Lien invalide</h2>
                    <p>Ce lien de connexion n'est pas valide.</p>
                    <p style="font-size: 12px; color: gray; margin-top: 20px;">Contactez votre gérant pour obtenir un nouveau lien.</p>
                `;
                return;
            }
            
            try {
                const res = await fetch(`/api/auth/magic/${token}`);
                const data = await res.json();
                
                if (res.ok && data.success) {
                    localStorage.setItem('resto_token', data.token);
                    localStorage.setItem('resto_user', JSON.stringify(data.user));
                    localStorage.setItem('resto_role', data.user.role);
                    localStorage.setItem('resto_id', data.user.resto_id);
                    
                    const role = data.user.role;
                    if (role === 'cuisinier' || role === 'serveur') {
                        window.location.href = '/resto.html';
                    } else {
                        window.location.href = '/dashboard.html';
                    }
                } else {
                    document.getElementById('content').innerHTML = `
                        <div class="error-icon">❌</div>
                        <h2>Lien expiré</h2>
                        <p>${data.error || 'Ce lien n\'est plus valide.'}</p>
                        <p style="font-size: 12px; color: gray; margin-top: 20px;">Contactez votre gérant pour obtenir un nouveau lien.</p>
                    `;
                }
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div class="error-icon">❌</div>
                    <h2>Erreur de connexion</h2>
                    <p>Impossible de se connecter au serveur.</p>
                    <button class="btn" onclick="window.location.reload()">🔄 Réessayer</button>
                `;
            }
        }
        
        connecter();
    </script>
</body>
</html>
