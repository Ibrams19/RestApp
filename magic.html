<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d0d0d">
    <title>Invitation | Restaurant 7★</title>
    <style>
        :root { --gold: #C6A43F; --text: #1a1a1a; --text-secondary: #6b6b6b; --border: #e8e5df; --font-sans: 'Inter', 'Segoe UI', system-ui, sans-serif; --font-serif: 'Playfair Display', 'Georgia', serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); background: #faf8f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; -webkit-font-smoothing: antialiased; }
        .card { background: #fff; border: 1px solid var(--border); border-radius: 28px; padding: 40px 32px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,0.06); animation: fadeUp 0.5s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .logo-icon { font-size: 48px; margin-bottom: 16px; }
        h1 { font-family: var(--font-serif); font-size: 22px; font-weight: 600; margin-bottom: 6px; }
        p { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
        .spinner { display: inline-block; width: 32px; height: 32px; border: 2px solid #e8e5df; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { color: #d9534f; font-weight: 500; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-icon">🔗</div>
        <h1>Redirection en cours…</h1>
        <p>Vous allez être redirigé vers la page de création de mot de passe.</p>
        <div class="spinner" id="spinner"></div>
        <p class="error" id="error-msg" style="display:none;"></p>
    </div>
    <script>
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('error-msg').textContent = 'Lien d\'invitation invalide. Contactez votre gérant.';
            return;
        }

        setTimeout(() => {
            window.location.href = `/api/auth/magic/${encodeURIComponent(token)}`;
        }, 800);
    })();
    </script>
</body>
</html>
