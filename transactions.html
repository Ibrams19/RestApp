<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historique des paiements - Restaurant Élite</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', system-ui, sans-serif;
            background: radial-gradient(ellipse at top, #1A1A2E 0%, #0F0F1A 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            color: #C6A43F;
            border: 1px solid rgba(198,164,63,0.3);
            padding: 12px 28px;
            border-radius: 60px;
            cursor: pointer;
            margin-bottom: 30px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            background: rgba(198,164,63,0.2);
            transform: translateX(-5px);
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            background: linear-gradient(135deg, #FFFFFF 0%, #C6A43F 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header p { color: rgba(255,255,255,0.7); }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(198,164,63,0.2);
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #C6A43F;
        }
        .stat-card .label { font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 5px; }
        
        .transactions-table {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(198,164,63,0.2);
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            padding: 15px 20px;
            background: rgba(0,0,0,0.3);
            color: #C6A43F;
            font-weight: 600;
        }
        td {
            padding: 12px 20px;
            color: rgba(255,255,255,0.8);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .status-paid { color: #2ECC71; font-weight: 600; }
        .status-pending { color: #F39C12; font-weight: 600; }
        .status-failed { color: #E74C3C; font-weight: 600; }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: rgba(255,255,255,0.5);
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 28px; }
            th, td { padding: 10px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="btn-back" onclick="window.location.href='/dashboard.html'">← Retour au dashboard</button>
        
        <div class="header">
            <h1>📜 Historique des paiements</h1>
            <p>Consultez l'ensemble de vos transactions et abonnements</p>
        </div>
        
        <div class="stats-grid" id="stats-grid">
            <div class="stat-card">
                <div class="value" id="total-paid">0</div>
                <div class="label">Total dépensé (FCFA)</div>
            </div>
            <div class="stat-card">
                <div class="value" id="transaction-count">0</div>
                <div class="label">Transactions effectuées</div>
            </div>
            <div class="stat-card">
                <div class="value" id="active-until">-</div>
                <div class="label">Abonnement valable jusqu'au</div>
            </div>
        </div>
        
        <div class="transactions-table">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Référence</th>
                        <th>Formule</th>
                        <th>Montant</th>
                        <th>Période</th>
                        <th>Statut</th>
                    </tr>
                </thead>
                <tbody id="transactions-list">
                    <tr><td colspan="6" class="empty-state">Chargement...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('resto_token');
        if (!token) window.location.href = '/login.html';
        
        async function chargerTransactions() {
            try {
                const res = await fetch('/api/restaurant/transactions', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const transactions = await res.json();
                
                // Afficher le tableau
                const tbody = document.getElementById('transactions-list');
                if (!transactions.length) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Aucune transaction trouvée</td></tr>';
                } else {
                    tbody.innerHTML = transactions.map(t => `
                        <tr>
                            <td>${new Date(t.created_at).toLocaleDateString('fr-FR')}</td>
                            <td style="font-family: monospace; font-size: 12px;">${t.transaction_ref}</td>
                            <td>${t.plan_type === 'monthly' ? '📅 Mensuel' : t.plan_type === 'quarterly' ? '📆 Trimestriel' : '📅 Annuel'}</td>
                            <td style="font-weight: bold; color: #C6A43F;">${t.amount.toLocaleString()} FCFA</td>
                            <td>${new Date(t.start_date).toLocaleDateString('fr-FR')} → ${new Date(t.end_date).toLocaleDateString('fr-FR')}</td>
                            <td class="status-${t.status}">${t.status === 'paid' ? '✅ Payé' : t.status === 'pending' ? '⏳ En attente' : '❌ Échoué'}</td>
                        </tr>
                    `).join('');
                }
                
                // Calculer les stats
                const paidTransactions = transactions.filter(t => t.status === 'paid');
                const totalPaid = paidTransactions.reduce((sum, t) => sum + t.amount, 0);
                document.getElementById('total-paid').innerHTML = totalPaid.toLocaleString();
                document.getElementById('transaction-count').innerHTML = paidTransactions.length;
                
                // Récupérer l'abonnement actif
                const subRes = await fetch('/api/restaurant/subscription', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const subData = await subRes.json();
                if (subData.ends_at) {
                    document.getElementById('active-until').innerHTML = new Date(subData.ends_at).toLocaleDateString('fr-FR');
                } else if (subData.status === 'trial') {
                    document.getElementById('active-until').innerHTML = `Essai: ${subData.days_left} jours restants`;
                } else {
                    document.getElementById('active-until').innerHTML = 'Expiré';
                }
                
            } catch(e) {
                console.error(e);
                document.getElementById('transactions-list').innerHTML = '<tr><td colspan="6" class="empty-state">Erreur de chargement</td></tr>';
            }
        }
        
        chargerTransactions();
    </script>
</body>
</html>
