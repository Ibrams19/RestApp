<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d0d0d">
    <title>Renouvellement | RestApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C6A43F; --gold-dark: #a8872a; --danger: #d9534f; --text: #1a1a1a; --text-secondary: #6b6b6b; --border: #e8e5df; --font-sans: 'Inter', 'Segoe UI', system-ui, sans-serif; --font-serif: 'Playfair Display', 'Georgia', serif; --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1); --radius-md: 16px; --radius-xl: 60px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); background: #faf8f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; -webkit-font-smoothing: antialiased; }
        body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 30%, rgba(198,164,63,0.04) 0%, transparent 60%); pointer-events: none; }
        .card { position: relative; z-index: 1; background: #fff; border: 1px solid var(--border); border-radius: 28px; padding: 40px 32px; max-width: 440px; width: 100%; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,0.06); animation: fadeUp 0.5s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .logo-icon { font-size: 56px; margin-bottom: 16px; }
        h1 { font-family: var(--font-serif); font-size: 24px; font-weight: 600; margin-bottom: 6px; }
        .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
        .alert { background: #FDE8E8; border: 1px solid #f5c6cb; border-radius: var(--radius-md); padding: 14px 18px; color: #C0392B; font-size: 13px; font-weight: 500; margin-bottom: 20px; }
        .btn-primary { display: block; width: 100%; padding: 14px; border-radius: var(--radius-xl); background: var(--gold); color: #fff; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: all var(--transition); font-family: var(--font-sans); text-decoration: none; }
        .btn-primary:hover { background: var(--gold-dark); }
        .btn-secondary { display: block; width: 100%; margin-top: 12px; padding: 12px; border-radius: var(--radius-xl); background: transparent; border: 1px solid var(--border); color: var(--text-secondary); font-size: 13px; cursor: pointer; transition: all var(--transition); text-decoration: none; text-align: center; }
        .btn-secondary:hover { border-color: var(--danger); color: var(--danger); }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-icon">⚠️</div>
        <h1>Abonnement expiré</h1>
        <p class="subtitle">Votre période d'essai ou votre abonnement est arrivé à expiration. Renouvelez pour continuer à utiliser le service.</p>
        <div class="alert">🔒 L'accès à votre espace est temporairement suspendu.</div>
        <a href="/subscription.html" class="btn-primary">💰 Voir les offres d'abonnement</a>
        <a href="/login.html" class="btn-secondary">Se déconnecter</a>
    </div>
</body>
</html>
