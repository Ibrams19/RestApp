<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renouvellement - Restaurant Élite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1A1A2E 0%, #242440 100%);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .alert {
            background: #FEF3C7;
            color: #92400E;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 30px;
        }
        .btn {
            background: #C6A43F;
            color: #1A1A2E;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size: 48px;">⚠️</div>
        <h1>Abonnement expiré</h1>
        <div class="alert">Votre période d'essai ou abonnement a expiré. Veuillez renouveler pour continuer.</div>
        <button class="btn" onclick="window.location.href='/subscription.html'">Voir les offres</button>
    </div>
</body>
</html>
