<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d0d0d">
    <title>Mes établissements | RestApp 7★</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#faf8f5; --surface:#fff; --gold:#C6A43F; --gold-dark:#a8872a; --text:#1a1a1a; --text-secondary:#6b6b6b; --border:#e8e5df; --danger:#d9534f; --success:#27AE60; --shadow-sm:0 1px 3px rgba(0,0,0,0.03); --shadow-md:0 2px 16px rgba(0,0,0,0.05); --shadow-lg:0 8px 40px rgba(0,0,0,0.08); --radius-md:16px; --radius-lg:24px; --radius-xl:60px; --transition:0.25s cubic-bezier(0.4,0,0.2,1); --font-sans:'Inter','Segoe UI',sans-serif; --font-serif:'Playfair Display','Georgia',serif; }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
        .header{background:rgba(255,255,255,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 28px;height:68px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
        .logo{font-family:var(--font-serif);font-size:20px;font-weight:600;}
        .logo span{color:var(--gold);}
        .btn-logout{background:transparent;border:1px solid #e0dcd3;color:#999;padding:8px 18px;border-radius:40px;cursor:pointer;font-size:13px;font-weight:500;transition:all var(--transition);}
        .btn-logout:hover{border-color:var(--danger);color:var(--danger);}
        .container{max-width:1200px;margin:0 auto;padding:30px 24px 60px;}
        .page-title{font-family:var(--font-serif);font-size:28px;margin-bottom:6px;}
        .page-subtitle{color:var(--text-secondary);font-size:14px;margin-bottom:28px;}

        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:30px;}
        .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;text-align:center;box-shadow:var(--shadow-sm);}
        .stat-value{font-family:var(--font-serif);font-size:32px;font-weight:600;color:var(--gold);}
        .stat-label{font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}

        .section-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:18px;}
        .section-title{font-family:var(--font-serif);font-size:20px;}
        .btn-add{padding:10px 20px;border-radius:40px;background:var(--gold);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all var(--transition);font-family:var(--font-sans);}
        .btn-add:hover{background:var(--gold-dark);}

        .etablissements-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;}
        .etablissement-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow-sm);transition:all var(--transition);cursor:pointer;}
        .etablissement-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px);border-color:var(--gold);}
        .etablissement-nom{font-family:var(--font-serif);font-size:20px;font-weight:600;margin-bottom:4px;}
        .etablissement-type{font-size:12px;color:var(--text-secondary);margin-bottom:12px;}
        .etablissement-stats{display:flex;gap:20px;font-size:13px;color:var(--text-secondary);}
        .etablissement-stats strong{color:var(--gold);}
        .badge-status{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-top:8px;}
        .badge-active{background:#E8F5E9;color:#27AE60;}
        .badge-trial{background:#FFF8E1;color:#E67E22;}
        .badge-expired{background:#FDE8E8;color:#E74C3C;}

        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
        .modal-dialog{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 24px;max-width:440px;width:90%;box-shadow:var(--shadow-lg);}
        .modal-title{font-family:var(--font-serif);font-size:20px;margin-bottom:20px;}
        .form-group{margin-bottom:16px;}
        .form-label{display:block;font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px;}
        .form-input,.form-select{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:12px;font-size:14px;font-family:var(--font-sans);background:#fdfcfa;color:var(--text);}
        .form-input:focus,.form-select:focus{border-color:var(--gold);outline:none;box-shadow:0 0 0 3px rgba(198,164,63,0.07);}
        .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
        .btn-cancel{padding:9px 20px;border-radius:40px;background:transparent;border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;font-size:13px;}
        .btn-confirm{padding:9px 20px;border-radius:40px;background:var(--gold);color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:600;}
        .btn-confirm:hover{background:var(--gold-dark);}
        .btn-basculer{padding:6px 14px;border-radius:20px;background:var(--gold);color:#fff;border:none;cursor:pointer;font-size:11px;font-weight:600;margin-top:10px;font-family:var(--font-sans);}
        .btn-basculer:hover{background:var(--gold-dark);}

        .empty-state{text-align:center;padding:60px;color:var(--text-secondary);grid-column:1/-1;}
        .empty-state-icon{font-size:48px;margin-bottom:12px;opacity:0.5;}

        .toast-container{position:fixed;top:20px;right:20px;z-index:1000;display:flex;flex-direction:column;gap:8px;}
        .toast{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:13px;font-weight:500;box-shadow:var(--shadow-md);animation:slideIn 0.3s ease;}
        .toast.success{border-left:3px solid var(--success);}
        .toast.error{border-left:3px solid var(--danger);}
        @keyframes slideIn{from{transform:translateX(120%);opacity:0;}to{transform:translateX(0);opacity:1;}}

        @media(max-width:768px){.container{padding:20px 14px;}.etablissements-grid{grid-template-columns:1fr;}}
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">🏢 <span>Mes</span> établissements</div>
        <button class="btn-logout" id="logout-btn">Quitter</button>
    </header>

    <div class="container">
        <h1 class="page-title">Tableau de bord Propriétaire</h1>
        <p class="page-subtitle">Gérez tous vos établissements depuis un seul compte</p>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon">🏪</div><div class="stat-value" id="nb-etablissements">-</div><div class="stat-label">Établissements</div></div>
            <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-value" id="nb-commandes">-</div><div class="stat-label">Commandes totales</div></div>
            <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-value" id="ca-total">-</div><div class="stat-label">CA Global (FCFA)</div></div>
        </div>

        <div class="section-header">
            <h2 class="section-title">🏪 Mes établissements</h2>
            <button class="btn-add" id="btn-add-etablissement">➕ Ajouter un établissement</button>
        </div>

        <div class="etablissements-grid" id="etablissements-grid">
            <div class="empty-state"><div class="empty-state-icon">⏳</div>Chargement…</div>
        </div>
    </div>

    <!-- MODALE AJOUT ÉTABLISSEMENT -->
    <div class="modal-overlay" id="modal-add" style="display:none;">
        <div class="modal-dialog">
            <h3 class="modal-title">➕ Ajouter un établissement</h3>
            <div class="form-group"><label class="form-label">Type *</label>
                <select id="add-type" class="form-select">
                    <option value="Restaurant">🍽️ Restaurant</option><option value="Fast-food">🍔 Fast-food</option><option value="Pizzeria">🍕 Pizzeria</option><option value="Snack">🥪 Snack</option><option value="Café">☕ Café</option><option value="Glacier">🍦 Glacier</option><option value="Grillade">🥩 Grillade</option><option value="Bar">🍺 Bar</option><option value="Food truck">🚚 Food truck</option><option value="Traiteur">📦 Traiteur</option><option value="Autre">🏷️ Autre</option>
                </select>
            </div>
            <div class="form-group"><label class="form-label">Nom *</label><input type="text" id="add-nom" class="form-input" placeholder="Nom de l'établissement" required></div>
            <div class="form-group"><label class="form-label">Téléphone</label><input type="text" id="add-tel" class="form-input" placeholder="+221 77 000 00 00"></div>
            <div class="form-group"><label class="form-label">Adresse</label><input type="text" id="add-adresse" class="form-input" placeholder="Dakar, Sénégal"></div>
            <div class="modal-actions">
                <button class="btn-cancel" id="btn-cancel-add">Annuler</button>
                <button class="btn-confirm" id="btn-confirm-add">Créer</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <script>
        (function(){
            const TOKEN_KEY='resto_token';let token;
            function init(){
                token=localStorage.getItem(TOKEN_KEY);
                if(!token){location.href='/login.html';return;}
                document.getElementById('logout-btn').addEventListener('click',()=>{localStorage.clear();location.href='/login.html';});
                document.getElementById('btn-add-etablissement').addEventListener('click',()=>document.getElementById('modal-add').style.display='flex');
                document.getElementById('btn-cancel-add').addEventListener('click',()=>document.getElementById('modal-add').style.display='none');
                document.getElementById('btn-confirm-add').addEventListener('click',ajouterEtablissement);
                chargerDonnees();
            }
            function showToast(m,t){const c=document.getElementById('toast-container'),to=document.createElement('div');to.className='toast '+t;to.textContent=m;c.appendChild(to);setTimeout(()=>{to.style.opacity='0';to.style.transition='opacity 0.3s';setTimeout(()=>to.remove(),300);},3000);}

            async function chargerDonnees(){
                try{
                    const[etsRes,statsRes]=await Promise.all([
                        fetch('/api/proprietaire/etablissements',{headers:{'Authorization':'Bearer '+token}}),
                        fetch('/api/proprietaire/stats',{headers:{'Authorization':'Bearer '+token}})
                    ]);
                    const ets=await etsRes.json();const stats=await statsRes.json();
                    document.getElementById('nb-etablissements').textContent=stats.nbEtablissements;
                    document.getElementById('nb-commandes').textContent=stats.nbCommandes;
                    document.getElementById('ca-total').textContent=(stats.caTotal||0).toLocaleString();
                    const grid=document.getElementById('etablissements-grid');
                    if(!ets.length){grid.innerHTML='<div class="empty-state"><div class="empty-state-icon">🏪</div><p>Aucun établissement</p></div>';return;}
                    grid.innerHTML=ets.map(function(e){
                        const s=stats.etablissements?.find(function(x){return x.id===e.id;});
                        return '<div class="etablissement-card">'+
                            '<div class="etablissement-nom">'+e.nom+'</div>'+
                            '<div class="etablissement-type">'+(e.type_etablissement||'Restaurant')+'</div>'+
                            '<div class="etablissement-stats">'+
                            '<span>💰 <strong>'+(s?.ca||0).toLocaleString()+' FCFA</strong></span>'+
                            '<span>📋 <strong>'+(s?.nbCommandes||0)+'</strong> commandes</span>'+
                            '</div>'+
                            '<button class="btn-basculer" data-id="'+e.id+'">➡️ Gérer cet établissement</button>'+
                            '<button class="btn-equipe" data-id="'+e.id+'" style="margin-top:8px;padding:6px 14px;border-radius:20px;background:transparent;border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;font-size:11px;font-family:var(--font-sans);">👥 Gérer l\'équipe</button>'+
                        '</div>';
                    }).join('');
                    grid.querySelectorAll('.btn-basculer').forEach(function(b){b.addEventListener('click',function(){basculerEtablissement(b.dataset.id);});});
                    grid.querySelectorAll('.btn-equipe').forEach(function(b){
                        b.addEventListener('click',function(){
                        basculerEtablissement(b.dataset.id, '/employes.html');
                        });
                    });
                }catch(e){}
            }

            async function ajouterEtablissement(){
                const nom=document.getElementById('add-nom').value.trim(),type=document.getElementById('add-type').value,tel=document.getElementById('add-tel').value.trim(),adresse=document.getElementById('add-adresse').value.trim();
                if(!nom){showToast('Nom requis','error');return;}
                try{
                    const r=await fetch('/api/proprietaire/ajouter-etablissement',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({nomRestaurant:nom,typeEtablissement:type,telephone:tel,adresse})});
                    if(r.ok){showToast('✅ Créé !','success');document.getElementById('modal-add').style.display='none';document.getElementById('add-nom').value='';chargerDonnees();}
                    else{const d=await r.json();showToast(d.error||'Erreur','error');}
                }catch(e){showToast('Erreur réseau','error');}
            }

            async function basculerEtablissement(restoId, page){
                page = page || '/dashboard.html';
                try{
                    const r=await fetch('/api/proprietaire/basculer',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({resto_id:restoId})});
                    if(r.ok){const d=await r.json();localStorage.setItem(TOKEN_KEY,d.token);localStorage.setItem('resto_id',d.restaurant.id);localStorage.setItem('resto_role','gerant');window.location.href=page;}
                    else{const d=await r.json();showToast(d.error||'Erreur','error');}
                }catch(e){showToast('Erreur réseau','error');}
            }

            document.addEventListener('DOMContentLoaded',init);
        })();
</script>
</body>
</html>
