<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-title" content="Resto Élite">
    <meta name="theme-color" content="#C6A43F">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>Espace Cuisine & Service | Restaurant</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; margin: 0; }
        .header-premium {
            background: linear-gradient(135deg, #1A1A2E 0%, #242440 100%);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo { font-size: 24px; font-weight: bold; color: white; }
        .logo span { color: #C6A43F; }
        .btn-outline {
            background: transparent;
            border: 2px solid #C6A43F;
            color: #C6A43F;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-outline:hover {
            background: #C6A43F;
            color: #1A1A2E;
        }
        .btn-danger-outline {
            border-color: #E74C3C;
            color: #E74C3C;
        }
        .btn-danger-outline:hover {
            background: #E74C3C;
            color: white;
        }
        .tabs-premium {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
            background: white;
            margin: 20px;
            border-radius: 60px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .tab-btn {
            padding: 10px 25px;
            border-radius: 40px;
            border: none;
            background: #f0f0f0;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: #C6A43F;
            color: white;
        }
        .stats-premium {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
        }
        .stat-card-premium {
            background: white;
            padding: 15px 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .stat-number-premium {
            font-size: 32px;
            font-weight: 700;
            color: #C6A43F;
        }
        .btn-action {
            padding: 8px 16px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn-action-primary { background: #3498DB; color: white; }
        .btn-action-success { background: #27AE60; color: white; }
        .btn-action-warning { background: #F39C12; color: white; }
        .btn-action-dark { background: #1A1A2E; color: white; }
        .btn-action-disabled { background: #bdc3c7; color: #7f8c8d; cursor: not-allowed; }
        .commandes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .commande-card-premium {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border-left: 5px solid #C6A43F;
            transition: transform 0.3s;
        }
        .commande-card-premium:hover {
            transform: translateY(-3px);
        }
        .commande-header {
            background: #1A1A2E;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .table-number { font-size: 18px; font-weight: 600; }
        .table-number::before { content: "🍽️ "; }
        .client-name { 
            background: #C6A43F; 
            color: #1A1A2E; 
            padding: 4px 12px; 
            border-radius: 40px; 
            font-size: 12px; 
            font-weight: bold;
        }
        .statut-badge {
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
        }
        .statut-en_attente { background: #F39C12; color: #1A1A2E; }
        .statut-cuisine { background: #3498DB; color: white; }
        .statut-pret { background: #27AE60; color: white; }
        .statut-servi { background: #C6A43F; color: #1A1A2E; }
        .statut-paye { background: #6C6C7A; color: white; }
        .nav-bar {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px;
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: 10px 20px;
            border-radius: 40px;
            text-decoration: none;
            background: #1A1A2E;
            color: white;
            transition: all 0.3s;
        }
        .nav-btn:hover {
            background: #C6A43F;
            color: #1A1A2E;
        }
        .role-badge {
            background: #C6A43F;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #1A1A2E;
            font-weight: bold;
        }
        .fade-in {
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 768px) {
            .commandes-grid { grid-template-columns: 1fr; }
            .header-premium { flex-direction: column; gap: 15px; text-align: center; }
        }
        .notification-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #27AE60;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <header class="header-premium">
        <div class="logo">👨‍🍳 <span>ESPACE STAFF</span></div>
        <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
            <span class="role-badge" id="user-role-badge">Chargement...</span>
            <select id="resto-select" class="btn-outline" style="padding: 8px 20px;">
                <option value="1">Restaurant Test Dakar</option>
            </select>
            <button class="btn-outline btn-danger-outline" id="logout-btn">🚪 Quitter</button>
        </div>
    </header>

    <!-- Barre de navigation adaptée au rôle -->
    <div class="nav-bar" id="nav-bar"></div>

    <div class="stats-premium">
        <div class="stat-card-premium">
            <div>⏳ En attente</div>
            <div class="stat-number-premium" id="count-attente">0</div>
            <div style="font-size: 12px; color: #666;">(Cuisine)</div>
        </div>
        <div class="stat-card-premium">
            <div>👨‍🍳 En cuisine</div>
            <div class="stat-number-premium" id="count-cuisine">0</div>
        </div>
        <div class="stat-card-premium">
            <div>✅ Prêtes</div>
            <div class="stat-number-premium" id="count-pret">0</div>
        </div>
        <div class="stat-card-premium">
            <div>🍽️ Servies</div>
            <div class="stat-number-premium" id="count-servi">0</div>
        </div>
    </div>

    <div class="tabs-premium">
        <button class="tab-btn active" data-status="all">📋 Toutes</button>
        <button class="tab-btn" data-status="en_attente">⏳ En attente</button>
        <button class="tab-btn" data-status="cuisine">🍳 En cuisine</button>
        <button class="tab-btn" data-status="pret">✅ Prêtes</button>
        <button class="tab-btn" data-status="servi">🍽️ Servies</button>
        <button class="tab-btn" data-status="paye">💰 Payées</button>
    </div>

    <div class="commandes-grid" id="commandes-grid"></div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script>
        // Vérification de l'authentification
        const token = localStorage.getItem('resto_token');
        const userRole = localStorage.getItem('resto_role');
        
        if (!token) {
            window.location.href = '/login.html';
        }
        
        // Afficher le rôle avec icône
        const roleBadge = document.getElementById('user-role-badge');
        if (userRole === 'gerant') {
            roleBadge.innerHTML = '👑 Gérant (accès total)';
        } else if (userRole === 'cuisinier') {
            roleBadge.innerHTML = '👨‍🍳 Cuisinier - Prépare les plats';
        } else if (userRole === 'serveur') {
            roleBadge.innerHTML = '🍽️ Serveur - Sert et encaisse';
        } else if (userRole === 'superadmin') {
            roleBadge.innerHTML = '👑 Super Admin';
        } else {
            roleBadge.innerHTML = '📋 Staff';
        }
        
        // Barre de navigation adaptée au rôle
        const navBar = document.getElementById('nav-bar');
        if (userRole === 'gerant' || userRole === 'superadmin') {
            navBar.innerHTML = `
                <a href="/dashboard.html" class="nav-btn">📊 Dashboard</a>
                <a href="/admin.html" class="nav-btn">🍽️ Gestion plats</a>
                <a href="/resto.html" class="nav-btn" style="background: #C6A43F;">👨‍🍳 Cuisine & Service</a>
                <a href="/qrcodes.html" class="nav-btn">📱 QR Codes</a>
            `;
        } else if (userRole === 'cuisinier') {
            navBar.innerHTML = `
                <a href="/resto.html" class="nav-btn" style="background: #C6A43F;">👨‍🍳 Ma cuisine</a>
                <span style="color: gray; padding: 10px;">👨‍🍳 Rôle: Cuisinier - Vous préparez les plats</span>
            `;
        } else if (userRole === 'serveur') {
            navBar.innerHTML = `
                <a href="/resto.html" class="nav-btn" style="background: #C6A43F;">🍽️ Mon service</a>
                <span style="color: gray; padding: 10px;">🍽️ Rôle: Serveur - Vous servez et encaissez</span>
            `;
        }
        
        let currentResto = localStorage.getItem('resto_id') || 1;
        let currentFilter = 'all';
        let allCommandes = [];
        const socket = io();
        
        socket.emit('join_resto', currentResto);
        
        function showNotification(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'notification-toast';
            toast.style.background = type === 'error' ? '#E74C3C' : '#27AE60';
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function chargerCommandes() {
            try {
                const res = await fetch(`/api/commandes/${currentResto}`);
                if (res.ok) {
                    allCommandes = await res.json();
                    afficherCommandes();
                    mettreAJourStats();
                } else if (res.status === 401) {
                    localStorage.clear();
                    window.location.href = '/login.html';
                }
            } catch(e) { console.error(e); }
        }
        
        socket.on('nouvelle_commande', () => {
            chargerCommandes();
            showNotification('📣 Nouvelle commande reçue !', 'success');
        });

        socket.on('statut_change', (data) => {
            chargerCommandes();
            if (data.statut === 'pret') {
                showNotification('✅ Un plat est prêt à être servi !', 'success');
            }
        });
        
        function mettreAJourStats() {
            document.getElementById('count-attente').innerText = allCommandes.filter(c => c.statut === 'en_attente').length;
            document.getElementById('count-cuisine').innerText = allCommandes.filter(c => c.statut === 'cuisine').length;
            document.getElementById('count-pret').innerText = allCommandes.filter(c => c.statut === 'pret').length;
            document.getElementById('count-servi').innerText = allCommandes.filter(c => c.statut === 'servi').length;
        }
        
        function getStatutText(statut) {
            const map = {
                'en_attente': '⏳ En attente cuisine',
                'cuisine': '🍳 En préparation',
                'pret': '✅ Prête à servir',
                'servi': '🍽️ Servie',
                'paye': '💰 Payée'
            };
            return map[statut] || statut;
        }
        
        // Définition des actions selon le rôle et le statut
        function getActionsForCommand(cmd, role) {
            const statut = cmd.statut;
            const actions = [];
            
            if (role === 'cuisinier') {
                if (statut === 'en_attente') {
                    actions.push({ label: '👨‍🍳 Cuisiner', action: 'cuisine', class: 'btn-action-primary' });
                }
                if (statut === 'cuisine') {
                    actions.push({ label: '✅ Plat prêt', action: 'pret', class: 'btn-action-success' });
                }
            }
            
            if (role === 'serveur') {
                if (statut === 'pret') {
                    actions.push({ label: '🍽️ Servir à table', action: 'servi', class: 'btn-action-warning' });
                }
                if (statut === 'servi') {
                    actions.push({ label: '💰 Paiement (caisse)', action: 'paye', class: 'btn-action-dark' });
                }
            }
            
            if (role === 'gerant' || role === 'superadmin') {
                if (statut === 'en_attente') {
                    actions.push({ label: '👨‍🍳 Cuisiner', action: 'cuisine', class: 'btn-action-primary' });
                }
                if (statut === 'cuisine') {
                    actions.push({ label: '✅ Plat prêt', action: 'pret', class: 'btn-action-success' });
                }
                if (statut === 'pret') {
                    actions.push({ label: '🍽️ Servir', action: 'servi', class: 'btn-action-warning' });
                }
                if (statut === 'servi') {
                    actions.push({ label: '💰 Payer', action: 'paye', class: 'btn-action-dark' });
                }
            }
            
            return actions;
        }
        
        async function changerStatut(commandeId, nouveauStatut) {
            try {
                const res = await fetch(`/api/commande/${commandeId}/statut`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ statut: nouveauStatut, restoId: currentResto })
                });
                if (res.ok) {
                    chargerCommandes();
                    const messages = {
                        'cuisine': '🔪 Commande passée en cuisine',
                        'pret': '✅ Plat prêt à être servi !',
                        'servi': '🍽️ Plat servi à table',
                        'paye': '💰 Paiement validé'
                    };
                    showNotification(messages[nouveauStatut] || 'Statut mis à jour');
                }
            } catch(e) { console.error(e); }
        }
        
        function afficherCommandes() {
            let filtered = allCommandes;
            if (currentFilter !== 'all') {
                filtered = allCommandes.filter(c => c.statut === currentFilter);
            }
            
            const container = document.getElementById('commandes-grid');
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:gray; padding:50px;">📭 Aucune commande</div>';
                return;
            }
            
            container.innerHTML = filtered.map(cmd => {
                const actions = getActionsForCommand(cmd, userRole);
                
                return `
                <div class="commande-card-premium fade-in">
                    <div class="commande-header">
                        <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                            <span class="table-number">Table ${cmd.table_numero || cmd.table_id}</span>
                            ${cmd.client_nom ? `<span class="client-name">👤 ${escapeHtml(cmd.client_nom)}</span>` : ''}
                        </div>
                        <span class="statut-badge statut-${cmd.statut}">${getStatutText(cmd.statut)}</span>
                    </div>
                    <div style="padding: 20px;">
                        ${cmd.details && cmd.details.length ? cmd.details.map(d => `
                            <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee;">
                                <span><strong>${d.quantite}x</strong> ${escapeHtml(d.nom_plat)}</span>
                                <span>${(d.prix_unitaire * d.quantite).toLocaleString()} FCFA</span>
                            </div>
                        `).join('') : '<div>Aucun détail</div>'}
                        <div style="display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 2px solid #C6A43F; font-weight: bold;">
                            <span>Total</span>
                            <span>${(cmd.total || 0).toLocaleString()} FCFA</span>
                        </div>
                        <div style="display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap;">
                            ${actions.map(action => `
                                <button class="btn-action ${action.class}" onclick="changerStatut(${cmd.id}, '${action.action}')">${action.label}</button>
                            `).join('')}
                            ${actions.length === 0 && cmd.statut !== 'paye' ? `
                                <span style="color: gray; font-size: 12px;">⏳ En attente de l'autre équipe...</span>
                            ` : ''}
                            ${cmd.statut === 'paye' ? `
                                <span style="color: green; font-size: 12px;">✓ Commande finalisée</span>
                            ` : ''}
                        </div>
                        ${cmd.date_commande ? `<div style="margin-top: 15px; font-size: 11px; color: gray;">🕐 ${new Date(cmd.date_commande).toLocaleString()}</div>` : ''}
                    </div>
                </div>
            `}).join('');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        document.getElementById('resto-select').onchange = (e) => {
            currentResto = parseInt(e.target.value);
            localStorage.setItem('resto_id', currentResto);
            socket.emit('join_resto', currentResto);
            chargerCommandes();
        };
        
        document.getElementById('logout-btn').onclick = () => {
            localStorage.clear();
            window.location.href = '/login.html';
        };
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.status;
                afficherCommandes();
            };
        });
        
        // Rendre la fonction globale pour les onclick
        window.changerStatut = changerStatut;
        window.escapeHtml = escapeHtml;
        
        chargerCommandes();
        setInterval(chargerCommandes, 5000);
    </script>
</body>
</html>
