    <style>
        :root {
            --bg: #faf8f5; --bg-dark: #0d0d0d; --surface: #ffffff; --surface-dark: #1a1a1a;
            --gold: #C6A43F; --gold-hover: #b39330; --gold-light: #f5eedb;
            --text: #1a1a1a; --text-dark: #f0ece4; --text-secondary: #6b6b6b; --text-secondary-dark: #a0a0a0;

        body.dark .statut-pret { background: #0a2e1a; color: #2ECC71; } body.dark .statut-servi { background: #2e1f0a; color: #C6A43F; } body.dark .statut-paye { background: #1a1a1a; color: #999; }
        .commande-body { padding: 20px; }
        .detail-line { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f5f3ed; font-size: 14px; }
        body.dark .detail-line { border-bottom: 1px solid #1f1f1f; }
        .detail-name { font-weight: 500; } .detail-qty { color: var(--text-secondary); font-size: 12px; margin-right: 8px; } .detail-price { font-weight: 500; color: var(--gold); }
        .commande-total { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 16px; border-top: 2px solid var(--gold); font-weight: 600; font-size: 16px; }
        .commande-actions { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
        .btn-action { padding: 10px 20px; border-radius: 40px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; letter-spacing: 0.3px; transition: all var(--transition); font-family: var(--font-sans); }
        .btn-cuisine { background: #3498DB; color: white; } .btn-cuisine:hover { background: #2980B9; transform: translateY(-1px); }
        .btn-pret { background: #27AE60; color: white; } .btn-pret:hover { background: #219A52; transform: translateY(-1px); }
        .btn-servir { background: #F39C12; color: white; } .btn-servir:hover { background: #E67E22; transform: translateY(-1px); }
        .btn-payer { background: #1A1A2E; color: white; } .btn-payer:hover { background: #2C2C44; transform: translateY(-1px); }
        .btn-delete { background: #E74C3C; color: white; }
        .btn-delete:hover { background: #C0392B; }
        .commande-time { font-size: 11px; color: var(--text-secondary); margin-top: 14px; display: flex; align-items: center; gap: 6px; }
        .commande-time.urgent-text { color: #E74C3C; font-weight: 600; }
        body.dark .commande-time { color: var(--text-secondary-dark); }
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 80px 20px; color: var(--text-secondary); }
        .empty-state-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.6; }
        .empty-state-text { font-family: var(--font-serif); font-size: 20px; font-style: italic; opacity: 0.7; }
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px 20px; box-shadow: var(--shadow-lg); animation: slideInRight 0.35s ease; font-size: 14px; font-weight: 500; min-width: 300px; max-width: 420px; }
        .toast.success { border-left: 4px solid #27AE60; } .toast.info { border-left: 4px solid #3498DB; } .toast.warning { border-left: 4px solid #F39C12; } .toast.error { border-left: 4px solid #E74C3C; }
        body.dark .toast { background: var(--surface-dark); border-color: var(--border-dark); }
        @keyframes slideInRight { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOutRight { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }
        @keyframes slideUp { from { transform: translate(-50%, 100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        .cr-menu-item:hover { background: var(--gold-light) !important; }
        @media print { body * { visibility: hidden; } #recu-print, #recu-print * { visibility: visible; } #recu-print { position: absolute; left: 0; top: 0; width: 100%; } }
        @media (max-width: 768px) { .header { padding: 0 16px; height: 60px; } .commandes-grid { grid-template-columns: 1fr; padding: 0 12px 40px; gap: 12px; } }
        body.dark #modal-commande-rapide > div { background: #1e1e1e !important; }
        body.dark #modal-commande-rapide h3 { color: #f0ece4 !important; }
        body.dark #cr-table, body.dark #cr-client, body.dark #cr-search { background: #2a2a2a !important; border-color: #444 !important; color: #eee !important; }
        body.dark #cr-menu-list { background: #2a2a2a !important; border-color: #444 !important; }
        body.dark #cr-resume { background: #252525 !important; color: #ccc !important; }

        body.dark #recu-print * { color: #f0ece4 !important; }
        body.dark #recu-print button:first-child { background: #C6A43F !important; color: #fff !important; }
        body.dark #recu-print button:last-child { background: #333 !important; color: #ccc !important; }

<body>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script>
        // ==================== DÉTECTION PLATEFORME ====================
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const isAndroid = /Android/.test(navigator.userAgent);
        const isPWA = window.matchMedia('(display-mode: standalone)').matches || 
                      navigator.standalone === true;
        
        console.log('📱 Plateforme:', { isIOS, isAndroid, isPWA });

        // Variables globales pour l'audio
        var notifSoundEnabled = false;
        var audioContext = null;
        var audioUnlocked = false;

        // Élément audio HTML5 comme fallback
        var audioFallback = null;

        function initAudioFallback() {
            // Créer un élément audio pour le fallback
            if (!audioFallback) {
                audioFallback = new Audio();
                // Utiliser un son encodé en base64 (beep court)
                audioFallback.src = 'data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACAf39/f4B/f3+Af4CAgH9/f3+Af39/gH9/f3+Af3+Af4CAgH9/f3+Af39/gICAgICAgICAf39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gIA=';
                audioFallback.volume = 0.5;
                audioFallback.preload = 'auto';
            }
        }

        // ==================== NOTIFICATIONS ====================
        function updateNotifButton(active) {
            const btn = document.getElementById('btn-notif');
            if (!btn) return;
            
            if (active) {
                btn.style.background = '#27AE60';
                btn.style.color = 'white';
                btn.style.borderColor = '#27AE60';
                btn.innerHTML = '🔔✓';
                btn.title = '🔔 Son activé - Cliquer pour désactiver';
            } else {
                btn.style.background = '';
                btn.style.color = '';
                btn.style.borderColor = '';
                btn.innerHTML = '🔔';
                btn.title = isIOS && !isPWA ? 
                    '📱 Sur iPhone, utilisez Safari et ajoutez à l\'écran d\'accueil' : 
                    '🔔 Activer le son des commandes';
            }
        }

        // ==================== AUDIO CONTEXT (Web Audio API) ====================
        function getAudioContext() {
            if (!audioContext) {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                audioContext = new AudioContextClass();
                console.log('🎵 AudioContext créé, état:', audioContext.state);
            }
            return audioContext;
        }

        async function unlockAudio() {
            if (audioUnlocked) {
                console.log('🔓 Audio déjà déverrouillé');
                return true;
            }

            try {
                const ctx = getAudioContext();
                
                if (ctx.state === 'suspended') {
                    console.log('🔓 Tentative de déverrouillage audio...');
                    await ctx.resume();
                    console.log('✅ AudioContext état après resume:', ctx.state);
                }

                if (ctx.state === 'running') {
                    // Jouer un son silencieux pour vraiment déverrouiller
                    const buffer = ctx.createBuffer(1, 1, 22050);
                    const source = ctx.createBufferSource();
                    source.buffer = buffer;
                    source.connect(ctx.destination);
                    source.start(0);
                    
                    audioUnlocked = true;
                    console.log('🔓 Audio déverrouillé avec succès');
                    return true;
                }
            } catch(e) {
                console.error('❌ Échec déverrouillage audio:', e);
            }
            return false;
        }

        // ==================== JOUER LE SON ====================
        function playNotificationSound() {
            console.log('🔔 Tentative son - enabled:', notifSoundEnabled, 'unlocked:', audioUnlocked, 'isIOS:', isIOS);
            
            if (!notifSoundEnabled) return;

            // Essayer d'abord Web Audio API
            try {
                const ctx = getAudioContext();
                
                if (ctx.state === 'suspended') {
                    ctx.resume().then(() => {
                        audioUnlocked = true;
                        playBeep(ctx);
                    }).catch(() => {
                        playFallback();
                    });
                } else {
                    audioUnlocked = true;
                    playBeep(ctx);
                }
            } catch(e) {
                console.log('Web Audio échoué, tentative fallback:', e);
                playFallback();
            }
        }

        function playBeep(ctx) {
            const now = ctx.currentTime;
            
            // Son 1 : bip aigu
            const osc1 = ctx.createOscillator();
            const gain1 = ctx.createGain();
            osc1.connect(gain1);
            gain1.connect(ctx.destination);
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(800, now);
            osc1.frequency.setValueAtTime(1200, now + 0.1);
            gain1.gain.setValueAtTime(0.3, now);
            gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc1.start(now);
            osc1.stop(now + 0.3);

            // Son 2 : bip plus long
            const osc2 = ctx.createOscillator();
            const gain2 = ctx.createGain();
            osc2.connect(gain2);
            gain2.connect(ctx.destination);
            osc2.type = 'square';
            osc2.frequency.setValueAtTime(600, now + 0.15);
            gain2.gain.setValueAtTime(0.2, now + 0.15);
            gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc2.start(now + 0.15);
            osc2.stop(now + 0.5);
            
            console.log('✅ Bip joué');
        }

        function playFallback() {
            try {
                initAudioFallback();
                if (audioFallback) {
                    audioFallback.currentTime = 0;
                    audioFallback.play().then(() => {
                        console.log('✅ Fallback audio joué');
                    }).catch(e => {
                        console.error('❌ Fallback échoué:', e);
                    });
                }
            } catch(e) {
                console.error('❌ Aucune méthode audio disponible');
            }
        }

        // ==================== GESTIONNAIRE DE CLIC SUR LA CLOCHE ====================
async function handleNotifClick() {
    console.log('🔔 Clic cloche - début handler, iOS:', isIOS);
    
    // Si déjà actif, désactiver
    if (notifSoundEnabled) {
        notifSoundEnabled = false;
        localStorage.setItem('notif_active', 'false');
        updateNotifButton(false);
        showToast('🔕 Son désactivé', 'info');
        return;
    }

    // ===== ÉTAPE 1 : ACTIVER LE SON (prioritaire) =====
    try {
        const unlocked = await unlockAudio();
        
        if (unlocked) {
            notifSoundEnabled = true;
            localStorage.setItem('notif_active', 'true');
            updateNotifButton(true);
            
            // Test immédiat du son
            setTimeout(() => playNotificationSound(), 200);
            
            // Message adapté selon le navigateur
            if (isIOS) {
                if (isPWA) {
                    showToast('✅ Son activé ! Bonne réception des commandes 🔔', 'success');
                } else {
                    showToast('✅ Son activé ! Pensez à installer l\'app pour les notifications', 'info');
                }
            } else {
                showToast('✅ Son activé ! 🔔', 'success');
            }
        } else {
            // Sur iOS, proposer de réessayer
            if (isIOS) {
                showToast('⚠️ Appuyez à nouveau pour activer le son', 'warning');
            } else {
                showToast('⚠️ Réessayez - son non disponible', 'warning');
            }
            return;
        }
    } catch(e) {
        console.error('❌ Erreur activation audio:', e);
        showToast('❌ Son non disponible - Réessayez', 'warning');
        return;
    }

    // ===== ÉTAPE 2 : NOTIFICATIONS (optionnel, ne bloque pas le son) =====
    
    // Sur iOS avec Safari en mode PWA, tenter les notifications
    if ('Notification' in window) {
        const currentPermission = Notification.permission;
        console.log('📬 Permission notification:', currentPermission);
        
        // Ne demander la permission QUE si ce n'est pas déjà "denied"
        if (currentPermission === 'default') {
            try {
                // Vérifier si les notifications sont possibles
                if (isIOS && !isPWA) {
                    console.log('📱 iOS non-PWA - notifications non supportées');
                    // Ne rien faire, le son fonctionne déjà
                } else {
                    const permission = await Notification.requestPermission();
                    console.log('📬 Permission accordée:', permission);
                    
                    if (permission === 'granted' && 'PushManager' in window) {
                        try {
                            const reg = await navigator.serviceWorker.ready;
                            const sub = await reg.pushManager.subscribe({
                                userVisibleOnly: true,
                                applicationServerKey: urlBase64ToUint8Array(VAPID_KEY)
                            });
                            
                            await fetch('/api/push/subscribe', {
                                method: 'POST',
                                headers: { 
                                    'Content-Type': 'application/json', 
                                    'Authorization': 'Bearer ' + localStorage.getItem('resto_token') 
                                },
                                body: JSON.stringify({ subscription: sub })
                            });
                            
                            console.log('✅ Push activé');
                            showToast('✅ Notifications et son activés !', 'success');
                        } catch(pushError) {
                            console.log('⚠️ Push non disponible:', pushError);
                            // Le son fonctionne déjà, c'est l'essentiel
                        }
                    }
                }
            } catch(notifError) {
                console.log('⚠️ Notifications non disponibles:', notifError);
                // Sur iOS, c'est normal - ne pas afficher d'erreur
                if (!isIOS) {
                    showToast('💡 Le son fonctionne, les notifications sont optionnelles', 'info');
                }
            }
        } else if (currentPermission === 'denied' && isIOS) {
            // Sur iOS, c'est normal que ce soit refusé
            console.log('📱 iOS - notifications non supportées sur ce navigateur');
        }
    }
    
    // Message spécial pour iOS non-PWA après la première activation
    if (isIOS && !isPWA && !localStorage.getItem('ios_tip_shown')) {
        localStorage.setItem('ios_tip_shown', 'true');
        setTimeout(() => {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
                background: #1a1a1a; color: white; padding: 16px 20px; border-radius: 16px;
                z-index: 99999; font-size: 13px; text-align: center; max-width: 90%;
                box-shadow: 0 10px 40px rgba(0,0,0,0.3); animation: slideUp 0.5s ease;
            `;
            toast.innerHTML = `
                <div style="font-size:16px;margin-bottom:8px;">📱 <b>Pour recevoir les commandes</b></div>
                <div style="font-size:12px;opacity:0.9;line-height:1.5;margin-bottom:10px;">
                    ✅ Le son est activé !<br>
                    🔔 Pour les notifications :<br>
                    Ouvrez dans <b>Safari</b> → <b>Partager</b> → <b>Écran d'accueil</b>
                </div>
                <button onclick="this.parentElement.remove()" style="
                    background:#C6A43F; border:none; color:white;
                    padding:8px 20px; border-radius:20px; font-weight:600;
                ">Compris 👍</button>
            `;
            document.body.appendChild(toast);
        }, 2000);
    }
}

        // ==================== INITIALISATION ====================
        function init() {
            // Restaurer l'état sauvegardé
            if (localStorage.getItem('notif_active') === 'true') {
                notifSoundEnabled = true;
                updateNotifButton(true);
                // Tenter de réveiller l'audio au prochain clic
                document.addEventListener('click', function wakeAudio() {
                    unlockAudio();
                    document.removeEventListener('click', wakeAudio);
                }, { once: true });
            }

            // Attacher le handler au bouton cloche
            const notifBtn = document.getElementById('btn-notif');
            if (notifBtn) {
                notifBtn.addEventListener('click', handleNotifClick);
            }

            // Déverrouiller l'audio sur première interaction (crucial iOS)
            const unlockEvents = ['touchstart', 'touchend', 'click'];
            unlockEvents.forEach(eventType => {
                document.addEventListener(eventType, function() {
                    if (!audioUnlocked) {
                        unlockAudio();
                    }
                }, { once: true });
            });

            // ... (le reste de ton init() reste identique)
        }

        // ==================== WEBSOCKET ====================
        // Modifier la partie socket pour appeler notre fonction
        function initWebSocket() {
            socket = io({
                reconnection: true,
                reconnectionAttempts: 20,
                reconnectionDelay: 500,
                reconnectionDelayMax: 5000,
                timeout: 10000
            });

            socket.on('connect', function() {
                console.log('🔗 WS connecté');
                socket.emit('join_resto', currentResto);
            });

            socket.on('nouvelle_commande', function() {
                console.log('📦 Nouvelle commande reçue');
                chargerCommandes();
                playNotificationSound(); // Notre fonction unifiée
            });

            socket.on('statut_change', function() {
                chargerCommandes();
            });
        }

        // ==================== POLLING (fallback si WS déconnecté) ====================
        function startPolling() {
            if (pollingTimer) clearInterval(pollingTimer);
            pollingTimer = setInterval(function() {
                const oldCount = allCommandes.filter(c => c.statut === 'en_attente').length;
                chargerCommandes().then(() => {
                    const newCount = allCommandes.filter(c => c.statut === 'en_attente').length;
                    if (newCount > oldCount) {
                        console.log('📦 Nouvelle commande détectée par polling');
                        playNotificationSound();
                    }
                });
            }, 3000);
        }

        // ==================== STARTUP ====================
        document.addEventListener('DOMContentLoaded', function() {
            initAudioFallback();
            init();
            
            // Message spécial pour iOS non-PWA
            if (isIOS && !isPWA) {
                setTimeout(() => {
                    const toast = document.createElement('div');
                    toast.style.cssText = `
                        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
                        background: #1a1a1a; color: white; padding: 16px 24px; border-radius: 16px;
                        z-index: 99999; font-size: 13px; text-align: center; max-width: 90%;
                        box-shadow: 0 10px 40px rgba(0,0,0,0.3); animation: slideUp 0.5s ease;
                    `;
                    toast.innerHTML = `
                        <div style="font-size:16px;margin-bottom:8px;">📱 <b>Pour une meilleure expérience</b></div>
                        <div style="font-size:12px;opacity:0.8;line-height:1.5;">
                            Ouvrez dans <b>Safari</b> → Appuyez sur <b>Partager</b> → <b>Sur l'écran d'accueil</b>
                        </div>
                        <button onclick="this.parentElement.remove()" style="
                            margin-top:10px; background:#C6A43F; border:none; color:white;
                            padding:8px 20px; border-radius:20px; font-weight:600;
                        ">OK</button>
                    `;
                    document.body.appendChild(toast);
                }, 3000);
            }
        });

        // Nettoyage
        window.addEventListener('beforeunload', function() {
            if (pollingTimer) clearInterval(pollingTimer);
            if (socket) socket.disconnect();
            if (audioContext) audioContext.close();
        });
    </script>
