<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-title" content="Resto 7★">
    <meta name="theme-color" content="#0d0d0d">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <title>Cuisine & Service | RestApp</title>
    <style>
        :root {
            --bg: #faf8f5; --bg-dark: #0d0d0d; --surface: #ffffff; --surface-dark: #1a1a1a;
            --gold: #C6A43F; --gold-hover: #b39330; --gold-light: #f5eedb;
            --text: #1a1a1a; --text-dark: #f0ece4; --text-secondary: #6b6b6b; --text-secondary-dark: #a0a0a0;
            --border: #e8e5df; --border-dark: #2a2a2a; --danger: #E74C3C; --success: #27AE60;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.03); --shadow-md: 0 2px 16px rgba(0,0,0,0.04); --shadow-lg: 0 4px 32px rgba(0,0,0,0.06);
            --radius-sm: 12px; --radius-md: 16px; --radius-lg: 24px; --radius-xl: 60px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-serif: 'Playfair Display', 'Georgia', 'Times New Roman', serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; transition: background var(--transition), color var(--transition); }
        body.dark { background: var(--bg-dark); color: var(--text-dark); }

        .header { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 32px; height: 72px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; transition: all var(--transition); }
        body.dark .header { background: rgba(13,13,13,0.9); border-bottom: 1px solid var(--border-dark); }
        .logo { font-family: var(--font-serif); font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; white-space: nowrap; }
        .logo span { color: var(--gold); }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .role-badge { display: inline-flex; align-items: center; gap: 6px; background: #f5f3ed; padding: 6px 14px; border-radius: 40px; font-size: 12px; font-weight: 500; color: var(--text); letter-spacing: 0.3px; }
        body.dark .role-badge { background: #252525; color: var(--text-dark); }
        .btn-icon { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all var(--transition); color: var(--text-secondary); }
        .btn-icon:hover { border-color: var(--gold); color: var(--gold); }
        body.dark .btn-icon { background: var(--surface-dark); border-color: var(--border-dark); color: var(--text-secondary-dark); }
        .btn-logout { background: transparent; border: 1px solid #e0dcd3; color: #999; padding: 8px 18px; border-radius: 40px; cursor: pointer; font-size: 13px; font-weight: 500; letter-spacing: 0.2px; transition: all var(--transition); }
        .btn-logout:hover { border-color: #d9534f; color: #d9534f; }
        body.dark .btn-logout { border-color: #3a3a3a; color: #777; }

        .nav-bar { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; padding: 20px 24px 0; max-width: 1400px; margin: 0 auto; }
        .nav-btn { padding: 9px 20px; border-radius: 40px; text-decoration: none; font-size: 13px; font-weight: 500; background: var(--surface); color: var(--text-secondary); border: 1px solid var(--border); transition: all var(--transition); letter-spacing: 0.2px; }
        .nav-btn:hover { border-color: var(--gold); color: var(--gold); }
        .nav-btn.active { background: var(--gold); color: white; border-color: var(--gold); }
        body.dark .nav-btn { background: var(--surface-dark); border-color: var(--border-dark); color: var(--text-secondary-dark); }

        .stats-row { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; padding: 24px; max-width: 1400px; margin: 0 auto; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px 28px; min-width: 130px; text-align: center; transition: all var(--transition); box-shadow: var(--shadow-sm); }
        .stat-card:hover { border-color: var(--gold); box-shadow: var(--shadow-md); }
        body.dark .stat-card { background: var(--surface-dark); border-color: var(--border-dark); }
        .stat-icon { font-size: 22px; margin-bottom: 6px; }
        .stat-number { font-family: var(--font-serif); font-size: 40px; font-weight: 600; color: var(--gold); line-height: 1; transition: all 0.5s ease; }
        .stat-number.pulse { animation: numberPulse 0.6s ease; }
        .stat-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 6px; font-weight: 500; }
        body.dark .stat-label { color: var(--text-secondary-dark); }
        @keyframes numberPulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); color: #27AE60; } 100% { transform: scale(1); } }

        .tabs-container { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; padding: 8px 24px 20px; max-width: 1400px; margin: 0 auto; }
        .tab-btn { padding: 10px 22px; border-radius: 40px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 13px; font-weight: 500; transition: all var(--transition); color: var(--text-secondary); letter-spacing: 0.2px; }
        .tab-btn:hover { border-color: var(--gold); color: var(--gold); }
        .tab-btn.active { background: var(--gold); color: white; border-color: var(--gold); }
        .tab-count { display: inline-block; background: rgba(0,0,0,0.06); padding: 2px 8px; border-radius: 20px; font-size: 11px; margin-left: 6px; font-weight: 600; }
        .tab-btn.active .tab-count { background: rgba(255,255,255,0.25); }
        body.dark .tab-btn { background: var(--surface-dark); border-color: var(--border-dark); color: var(--text-secondary-dark); }

        .commandes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px; padding: 0 24px 40px; max-width: 1400px; margin: 0 auto; }
        .commande-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); transition: all var(--transition); position: relative; }
        .commande-card:hover { box-shadow: var(--shadow-lg); border-color: #d5cfc0; }
        .commande-card.urgent { border-left: 4px solid #E74C3C; animation: urgentPulse 2s infinite; }
        body.dark .commande-card { background: var(--surface-dark); border-color: var(--border-dark); }
        @keyframes urgentPulse { 0%, 100% { box-shadow: var(--shadow-sm); } 50% { box-shadow: 0 0 0 4px rgba(231, 76, 60, 0.1); } }
        .commande-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; background: #fdfcfa; }
        body.dark .commande-header { background: #141414; border-bottom: 1px solid var(--border-dark); }
        .table-badge { font-family: var(--font-serif); font-size: 18px; font-weight: 600; color: var(--text); }
        .table-badge::before { content: "🍽️ "; font-size: 16px; }
        body.dark .table-badge { color: var(--text-dark); }
        .client-badge { background: #f5f3ed; color: var(--text); padding: 4px 12px; border-radius: 40px; font-size: 12px; font-weight: 500; }
        body.dark .client-badge { background: #252525; color: var(--text-dark); }
        .statut-badge { padding: 6px 14px; border-radius: 40px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
        .statut-en_attente { background: #FFF8E1; color: #E67E22; } .statut-cuisine { background: #E3F2FD; color: #2471A3; }
        .statut-pret { background: #E8F5E9; color: #27AE60; } .statut-servi { background: #FFF3E0; color: #C6A43F; } .statut-paye { background: #F3F4F6; color: #6B7280; }
        body.dark .statut-en_attente { background: #3d2e0a; color: #F39C12; } body.dark .statut-cuisine { background: #0a1e3d; color: #3498DB; }
        body.dark .statut-pret { background: #0a2e1a; color: #2ECC71; } body.dark .statut-servi { background: #2e1f0a; color: #C6A43F; } body.dark .statut-paye { background: #1a1a1a; color: #999; }
        .commande-body { padding: 20px; }
        .detail-line { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f5f3ed; font-size: 14px; }
        body.dark .detail-line { border-bottom: 1px solid #1f1f1f; }
        .detail-name { font-weight: 500; } .detail-qty { color: var(--text-secondary); font-size: 12px; margin-right: 8px; } .detail-price { font-weight: 500; color: var(--gold); }
        .commande-total { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 16px; border-top: 2px solid var(--gold); font-weight: 600; font-size: 16px; }
        .commande-actions { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
        .btn-action { padding: 10px 20px; border-radius: 40px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; letter-spacing: 0.3px; transition: all var(--transition); font-family: var(--font-sans); }
        .btn-cuisine { background: #3498DB; color: white; } .btn-cuisine:hover { background: #2980B9; transform: translateY(-1px); }
        .btn-pret { background: #27AE60; color: white; } .btn-pret:hover { background: #219A52; transform: translateY(-1px); }
        .btn-servir { background: #F39C12; color: white; } .btn-servir:hover { background: #E67E22; transform: translateY(-1px); }
        .btn-payer { background: #1A1A2E; color: white; } .btn-payer:hover { background: #2C2C44; transform: translateY(-1px); }
        .commande-time { font-size: 11px; color: var(--text-secondary); margin-top: 14px; display: flex; align-items: center; gap: 6px; }
        .commande-time.urgent-text { color: #E74C3C; font-weight: 600; }
        body.dark .commande-time { color: var(--text-secondary-dark); }
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 80px 20px; color: var(--text-secondary); }
        .empty-state-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.6; }
        .empty-state-text { font-family: var(--font-serif); font-size: 20px; font-style: italic; opacity: 0.7; }

        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px 20px; box-shadow: var(--shadow-lg); animation: slideInRight 0.35s ease; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px; min-width: 300px; max-width: 420px; }
        .toast.success { border-left: 4px solid #27AE60; } .toast.info { border-left: 4px solid #3498DB; } .toast.warning { border-left: 4px solid #F39C12; } .toast.error { border-left: 4px solid #E74C3C; }
        body.dark .toast { background: var(--surface-dark); border-color: var(--border-dark); }
        @keyframes slideInRight { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOutRight { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }

        .cr-menu-item:hover { background: var(--gold-light) !important; }
        .cr-qty-btn { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; font-weight: 600; color: var(--text); }
        .cr-qty-btn:hover { border-color: var(--gold); color: var(--gold); }
        body.dark .cr-qty-btn { background: var(--surface-dark); border-color: var(--border-dark); color: var(--text-dark); }

        @media print { body * { visibility: hidden; } #recu-print, #recu-print * { visibility: visible; } #recu-print { position: absolute; left: 0; top: 0; width: 100%; } }
        @media (max-width: 768px) { .header { padding: 0 16px; height: 60px; } .commandes-grid { grid-template-columns: 1fr; padding: 0 12px 40px; gap: 12px; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo"><span class="logo-icon">👨‍🍳</span><span>Cuisine</span> & Service</div>
        <div class="header-right">
            <button class="btn-commande-rapide" id="btn-commande-rapide" style="background:#27AE60;color:white;border:none;padding:10px 18px;border-radius:40px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-sans);display:flex;align-items:center;gap:6px;">⚡ Commande rapide</button>
            <span class="role-badge" id="role-badge">Chargement…</span>
            <button class="btn-icon" id="theme-toggle" title="Mode sombre">🌙</button>
            <button class="btn-logout" id="logout-btn">Quitter</button>
        </div>
    </header>

    <nav class="nav-bar" id="nav-bar"></nav>

    <div class="stats-row">
        <div class="stat-card"><div class="stat-icon">⏳</div><div class="stat-number" id="count-attente">0</div><div class="stat-label">En attente</div></div>
        <div class="stat-card"><div class="stat-icon">👨‍🍳</div><div class="stat-number" id="count-cuisine">0</div><div class="stat-label">En cuisine</div></div>
        <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-number" id="count-pret">0</div><div class="stat-label">Prêtes</div></div>
        <div class="stat-card"><div class="stat-icon">🍽️</div><div class="stat-number" id="count-servi">0</div><div class="stat-label">Servies</div></div>
        <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-number" id="count-paye">0</div><div class="stat-label">Payées</div></div>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" data-status="all">Toutes<span class="tab-count" id="count-all">0</span></button>
        <button class="tab-btn" data-status="en_attente">⏳ En attente<span class="tab-count" id="tab-count-attente">0</span></button>
        <button class="tab-btn" data-status="cuisine">🍳 En cuisine<span class="tab-count" id="tab-count-cuisine">0</span></button>
        <button class="tab-btn" data-status="pret">✅ Prêtes<span class="tab-count" id="tab-count-pret">0</span></button>
        <button class="tab-btn" data-status="servi">🍽️ Servies<span class="tab-count" id="tab-count-servi">0</span></button>
        <button class="tab-btn" data-status="paye">💰 Payées<span class="tab-count" id="tab-count-paye">0</span></button>
    </div>

    <div class="commandes-grid" id="commandes-grid"></div>

    <!-- MODALE COMMANDE RAPIDE -->
    <div class="modal-overlay" id="modal-commande-rapide" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px);">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:24px;max-width:600px;width:95%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <h3 style="font-family:var(--font-serif);font-size:20px;">⚡ Commande rapide</h3>
                <button id="cr-close-top" style="background:transparent;border:none;font-size:24px;cursor:pointer;color:var(--text-secondary);">&times;</button>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
                <div>
                    <label style="font-size:11px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;">Table *</label>
                    <select id="cr-table" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;font-size:13px;font-family:var(--font-sans);background:#fdfcfa;margin-top:4px;"><option value="">Sélectionnez...</option></select>
                </div>
                <div>
                    <label style="font-size:11px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;">Client</label>
                    <input type="text" id="cr-client" placeholder="Nom du client" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;font-size:13px;font-family:var(--font-sans);background:#fdfcfa;margin-top:4px;" maxlength="30">
                </div>
            </div>
            <div style="margin-bottom:10px;position:relative;">
                <input type="text" id="cr-search" placeholder="🔍 Rechercher un plat..." style="width:100%;padding:10px 12px 10px 32px;border:1px solid var(--border);border-radius:10px;font-size:13px;font-family:var(--font-sans);background:#fdfcfa;">
                <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;">🔍</span>
            </div>
            <div id="cr-menu-list" style="max-height:220px;overflow-y:auto;margin-bottom:14px;border:1px solid var(--border);border-radius:12px;padding:8px;"><div style="text-align:center;color:var(--text-secondary);padding:20px;">Chargement du menu...</div></div>
            <div style="background:#fdfcfa;border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:14px;">
                <div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">🛒 Commande</div>
                <div id="cr-resume" style="font-size:13px;color:var(--text-secondary);text-align:center;">Aucun plat ajouté</div>
                <div id="cr-total-line" style="display:none;justify-content:space-between;align-items:center;padding-top:10px;margin-top:8px;border-top:2px solid var(--gold);font-weight:700;font-size:16px;"><span>Total</span><span id="cr-total" style="color:var(--gold);">0 FCFA</span></div>
            </div>
            <div style="display:flex;gap:10px;">
                <button id="cr-cancel" style="flex:1;padding:12px;border-radius:40px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:13px;font-family:var(--font-sans);">Annuler</button>
                <button id="cr-submit" style="flex:2;padding:12px;border-radius:40px;border:none;background:var(--gold);color:white;font-weight:600;cursor:pointer;font-size:14px;font-family:var(--font-sans);">✅ Enregistrer la commande</button>
            </div>
        </div>
    </div>

    <!-- MODALE REÇU -->
    <div class="modal-overlay" id="modal-recu" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:250;align-items:center;justify-content:center;backdrop-filter:blur(4px);">
        <div id="recu-print" style="background:white;border-radius:16px;padding:30px;max-width:380px;width:90%;font-family:'Georgia',serif;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-height:90vh;overflow-y:auto;"></div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script>
    (function() {
        'use strict';
        const TOKEN_KEY = 'resto_token', THEME_KEY = 'resto_theme', POLLING_INTERVAL = 8000;
        let currentResto = null, currentFilter = 'all', allCommandes = [], userRole = null, userId = null, pollingTimer = null, socket = null, isLoading = false;
        let previousStats = { en_attente:0, cuisine:0, pret:0, servi:0, paye:0 };
        let crPanier = [], crMenu = [];

        function init() {
            const token = localStorage.getItem(TOKEN_KEY);
            if(!token){redirectToLogin();return;}
            try{
                const p=JSON.parse(atob(token.split('.')[1]));
                userRole=p.role;userId=p.id;currentResto=p.resto_id;
                window.restoName = p.restaurant_name || 'Mon établissement';
                if(!currentResto){showToast('Erreur compte','error');return;}
                localStorage.setItem('resto_id',currentResto);localStorage.setItem('resto_role',userRole);
            }catch(e){redirectToLogin();return;}
            applyTheme();initUI();initWebSocket();chargerCommandes();startPolling();
        }
        function redirectToLogin(){localStorage.clear();window.location.href='/login.html';}
        function applyTheme(){const s=localStorage.getItem(THEME_KEY);if(s==='dark'){document.body.classList.add('dark');document.getElementById('theme-toggle').textContent='☀️';}else{document.body.classList.remove('dark');document.getElementById('theme-toggle').textContent='🌙';}}
        function toggleTheme(){document.body.classList.toggle('dark');const d=document.body.classList.contains('dark');localStorage.setItem(THEME_KEY,d?'dark':'light');document.getElementById('theme-toggle').textContent=d?'☀️':'🌙';}

        function initUI(){
            document.getElementById('role-badge').textContent={'gerant':'👑 Gérant','serveur':'🍽️ Serveur','superadmin':'👑 Super Admin'}[userRole]||'📋 Staff';
            const nb=document.getElementById('nav-bar'),ni=[];
            if(userRole==='gerant'||userRole==='superadmin')ni.push({href:'/dashboard.html',label:'📊 Dashboard'},{href:'/admin.html',label:'🍽️ Plats'},{href:'/employes.html',label:'👥 Équipe'},{href:'/resto.html',label:'👨‍🍳 Cuisine & Service',active:true},{href:'/qrcodes.html',label:'📱 QR Codes'},{href:'/subscription.html',label:'💰 Abonnement'});
            else if(userRole==='serveur')ni.push({href:'/resto.html',label:'🍽️ Mon service',active:true});
            nb.innerHTML=ni.map(i=>`<a href="${i.href}" class="nav-btn${i.active?' active':''}">${i.label}</a>`).join('');
            document.getElementById('theme-toggle').addEventListener('click',toggleTheme);
            document.getElementById('logout-btn').addEventListener('click',logout);
            document.querySelectorAll('.tab-btn').forEach(b=>{b.addEventListener('click',function(){document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));this.classList.add('active');currentFilter=this.dataset.status;afficherCommandes();})});
            document.getElementById('btn-commande-rapide').addEventListener('click',ouvrirCommandeRapide);
            document.getElementById('cr-cancel').addEventListener('click',fermerCommandeRapide);
            document.getElementById('cr-close-top').addEventListener('click',fermerCommandeRapide);
            document.getElementById('cr-submit').addEventListener('click',validerCommandeRapide);
            document.getElementById('cr-search').addEventListener('input',function(){afficherMenuRapide(this.value);});
            document.getElementById('modal-recu').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});
        }
        function logout(){if(socket)socket.disconnect();if(pollingTimer)clearInterval(pollingTimer);localStorage.clear();window.location.href='/login.html';}

        function initWebSocket(){
            socket=io({reconnection:true,reconnectionAttempts:10,reconnectionDelay:1000,reconnectionDelayMax:10000});
            socket.on('connect',()=>{socket.emit('join_resto',currentResto);});
            socket.on('disconnect',r=>{if(r==='io server disconnect')socket.connect();});
            socket.on('reconnect',n=>{socket.emit('join_resto',currentResto);chargerCommandes();});
            socket.on('nouvelle_commande',()=>{chargerCommandes();playNotificationSound();});
            socket.on('statut_change',d=>{chargerCommandes();const m={pret:'✅ Un plat est prêt !',cuisine:'🔪 Commande en cuisine',servi:'🍽️ Plat servi'};if(m[d.statut])showToast(m[d.statut],d.statut==='pret'?'success':'info');});
        }
        function playNotificationSound(){try{const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(800,c.currentTime);o.frequency.setValueAtTime(1000,c.currentTime+0.1);g.gain.setValueAtTime(0.3,c.currentTime);g.gain.exponentialRampToValueAtTime(0.01,c.currentTime+0.3);o.start(c.currentTime);o.stop(c.currentTime+0.3);}catch(e){}}
        function startPolling(){if(pollingTimer)clearInterval(pollingTimer);pollingTimer=setInterval(()=>{if(!socket?.connected)chargerCommandes();},POLLING_INTERVAL);}

        async function chargerCommandes(){
            if(isLoading)return;isLoading=true;
            try{const t=localStorage.getItem(TOKEN_KEY);const r=await fetch(`/api/commandes/${currentResto}`,{headers:{'Authorization':`Bearer ${t}`}});
                if(r.status===401){redirectToLogin();return;}
                if(r.status===403){const d=await r.json();if(d.code==='SUBSCRIPTION_EXPIRED'){showToast(d.message||'Abonnement expiré','error');setTimeout(()=>{window.location.href=d.redirect||'/subscription-renew.html';},2000);return;}}
                if(r.ok){allCommandes=await r.json();afficherCommandes();mettreAJourStats();}
            }catch(e){}finally{isLoading=false;}
        }

        function mettreAJourStats(){
            const c={en_attente:allCommandes.filter(x=>x.statut==='en_attente').length,cuisine:allCommandes.filter(x=>x.statut==='cuisine').length,pret:allCommandes.filter(x=>x.statut==='pret').length,servi:allCommandes.filter(x=>x.statut==='servi').length,paye:allCommandes.filter(x=>x.statut==='paye').length};
            ['attente','cuisine','pret','servi','paye'].forEach(s=>{const e=document.getElementById(`count-${s}`),v=c[s]||0,o=parseInt(e.textContent)||0;if(v!==o){e.textContent=v;e.classList.remove('pulse');void e.offsetWidth;e.classList.add('pulse');}});
            document.getElementById('tab-count-attente').textContent=c.en_attente;document.getElementById('tab-count-cuisine').textContent=c.cuisine;
            document.getElementById('tab-count-pret').textContent=c.pret;document.getElementById('tab-count-servi').textContent=c.servi;
            document.getElementById('tab-count-paye').textContent=c.paye;document.getElementById('count-all').textContent=allCommandes.length;
            previousStats={...c};
        }

        function getStatutText(s){return{en_attente:'En attente',cuisine:'En cuisine',pret:'Prête',servi:'Servie',paye:'Payée'}[s]||s;}
        function getTimeAgo(d){if(!d)return'';const n=new Date(),t=new Date(d),m=Math.floor((n-t)/60000);if(m<1)return'À l\'instant';if(m<60)return`Il y a ${m} min`;const h=Math.floor(m/60);if(h<24)return`Il y a ${h}h`;return t.toLocaleDateString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});}
        function isUrgent(d,s){if(s!=='en_attente'&&s!=='cuisine')return false;if(!d)return false;return Math.floor((new Date()-new Date(d))/60000)>15;}
        function getActionsForCommand(s,r){const a=[];if(r==='serveur'||r==='gerant'||r==='superadmin'){if(s==='en_attente')a.push({label:'👨‍🍳 En cuisine',action:'cuisine',class:'btn-cuisine'});if(s==='cuisine')a.push({label:'✅ Plat prêt',action:'pret',class:'btn-pret'});if(s==='pret')a.push({label:'🍽️ Servir',action:'servi',class:'btn-servir'});if(s==='servi')a.push({label:'💰 Encaisser',action:'paye',class:'btn-payer'});}return a;}

        function afficherCommandes(){
            let f=allCommandes;const sp={en_attente:0,cuisine:1,pret:2,servi:3,paye:4};
            f.sort((a,b)=>sp[a.statut]!==sp[b.statut]?sp[a.statut]-sp[b.statut]:new Date(a.date_commande)-new Date(b.date_commande));
            if(currentFilter!=='all')f=f.filter(c=>c.statut===currentFilter);
            const c=document.getElementById('commandes-grid');
            if(!f.length){c.innerHTML=`<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">Aucune commande</div></div>`;return;}
            c.innerHTML=f.map(cmd=>{
                const a=getActionsForCommand(cmd.statut,userRole),u=isUrgent(cmd.date_commande,cmd.statut),t=getTimeAgo(cmd.date_commande);
                const d=cmd.details?.length?cmd.details.map(d=>`<div class="detail-line"><span><span class="detail-name">${escapeHtml(d.nom_plat)}</span><span class="detail-qty">×${d.quantite}</span></span><span class="detail-price">${((d.prix_unitaire||0)*(d.quantite||0)).toLocaleString()} FCFA</span></div>`).join(''):'<div class="detail-line">Aucun détail</div>';
                const ah=a.length?a.map(a=>`<button class="btn-action ${a.class}" data-cmd-id="${cmd.id}" data-action="${a.action}">${a.label}</button>`).join(''):(cmd.statut==='paye'?'<span style="color:#27AE60;">✓ Finalisée</span>':'<span style="color:var(--text-secondary);">⏳ En attente</span>');
                return`<div class="commande-card${u?' urgent':''}"><div class="commande-header"><div style="display:flex;gap:10px;align-items:center;"><span class="table-badge">Table ${cmd.table_numero||cmd.table_id}</span>${cmd.client_nom?`<span class="client-badge">👤 ${escapeHtml(cmd.client_nom)}</span>`:''}</div><span class="statut-badge statut-${cmd.statut}">${getStatutText(cmd.statut)}</span></div><div class="commande-body">${d}<div class="commande-total"><span>Total</span><span>${(cmd.total||0).toLocaleString()} FCFA</span></div><div class="commande-actions">${ah}</div>${t?`<div class="commande-time${u?' urgent-text':''}">🕐 ${t}${u?' — Action requise':''}</div>`:''}</div></div>`;
            }).join('');
            c.querySelectorAll('.btn-action').forEach(b=>{b.addEventListener('click',function(){changerStatut(parseInt(this.dataset.cmdId),this.dataset.action,this);})});
        }

        async function changerStatut(id,ns,btn){
            if(btn){btn.disabled=true;btn.style.opacity='0.6';}
            try{const t=localStorage.getItem(TOKEN_KEY);const r=await fetch(`/api/commande/${id}/statut`,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':`Bearer ${t}`},body:JSON.stringify({statut:ns,restoId:currentResto})});
                if(r.ok){
                const m={cuisine:'🔪 En cuisine',pret:'✅ Plat prêt !',servi:'🍽️ Servi',paye:'💰 Payé'};
                showToast(m[ns]||'Statut mis à jour','success');
                if(ns==='paye'){
                    const cmd=allCommandes.find(c=>c.id===id);
                    if(cmd)genererRecu(cmd.client_nom||'Client',cmd.table_numero||cmd.table_id,cmd.details||[],cmd.total||0,cmd.id);
                };chargerCommandes();}
                else if(r.status===400){const d=await r.json();showToast(d.message||'Transition non autorisée','warning');}
                else{showToast('Erreur','error');}
            }catch(e){showToast('Erreur réseau','error');}finally{if(btn){btn.disabled=false;btn.style.opacity='1';}}
        }

        function showToast(m,t='info'){const c=document.getElementById('toast-container'),to=document.createElement('div');to.className=`toast ${t}`;to.textContent=m;c.appendChild(to);setTimeout(()=>{to.style.animation='slideOutRight 0.3s ease forwards';setTimeout(()=>to.remove(),300);},3500);}
        function escapeHtml(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}

        // ==================== COMMANDE RAPIDE PRO ====================
        async function ouvrirCommandeRapide(){
            crPanier=[];crMenu=[];
            try{const t=localStorage.getItem(TOKEN_KEY);const[tr,mr]=await Promise.all([fetch(`/api/tables/${currentResto}`,{headers:{'Authorization':`Bearer ${t}`}}),fetch(`/api/admin/menu/${currentResto}`,{headers:{'Authorization':`Bearer ${t}`}})]);
                if(tr.ok){const ta=await tr.json();document.getElementById('cr-table').innerHTML='<option value="">Sélectionnez...</option>'+ta.map(t=>`<option value="${t.numero_table}">🍽️ Table ${t.numero_table}</option>`).join('');}
                if(mr.ok){crMenu=await mr.json();afficherMenuRapide();}
            }catch(e){}
            document.getElementById('modal-commande-rapide').style.display='flex';document.body.style.overflow='hidden';document.getElementById('cr-search').value='';actualiserResume();
        }
        function fermerCommandeRapide(){document.getElementById('modal-commande-rapide').style.display='none';document.body.style.overflow='';crPanier=[];}
        
        function afficherMenuRapide(filter=''){
            const con=document.getElementById('cr-menu-list');let plats=crMenu.filter(p=>p.disponible!==false);
            if(filter)plats=plats.filter(p=>p.nom_plat.toLowerCase().includes(filter.toLowerCase())||(p.categorie&&p.categorie.toLowerCase().includes(filter.toLowerCase())));
            const cats={};plats.forEach(p=>{const c=p.categorie||'Autre';if(!cats[c])cats[c]=[];cats[c].push(p);});
            if(!plats.length){con.innerHTML='<div style="text-align:center;color:var(--text-secondary);padding:20px;">Aucun plat</div>';return;}
            con.innerHTML=Object.entries(cats).map(([cat,items])=>`<div style="margin-bottom:6px;"><div style="font-size:10px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:1px;padding:4px 8px;">${cat}</div>${items.map(p=>{const inC=crPanier.find(i=>i.menuId===p.id);return`<div class="cr-menu-item" data-id="${p.id}" data-nom="${escapeHtml(p.nom_plat)}" data-prix="${p.prix}" style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;cursor:pointer;border-radius:8px;transition:all 0.15s;${inC?'background:var(--gold-light);':''}"><span style="font-size:13px;flex:1;">${escapeHtml(p.nom_plat)}</span><span style="font-size:12px;font-weight:600;color:var(--gold);margin:0 10px;">${p.prix.toLocaleString()} F</span><span style="background:${inC?'#27AE60':'#f0f0f0'};color:${inC?'white':'#666'};border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;">${inC?'✓':'+'}</span></div>`;}).join('')}</div>`).join('');
            con.querySelectorAll('.cr-menu-item').forEach(item=>{item.addEventListener('click',function(){togglePlatPanier(parseInt(this.dataset.id),this.dataset.nom,parseInt(this.dataset.prix));});});
        }
        function togglePlatPanier(id,nom,prix){const ex=crPanier.find(i=>i.menuId===id);if(ex)crPanier=crPanier.filter(i=>i.menuId!==id);else crPanier.push({menuId:id,nom,prix,quantite:1});actualiserResume();afficherMenuRapide(document.getElementById('cr-search').value);}
        function actualiserResume(){
            const con=document.getElementById('cr-resume'),tl=document.getElementById('cr-total-line');
            if(!crPanier.length){con.innerHTML='<div style="text-align:center;color:var(--text-secondary);">Aucun plat ajouté</div>';tl.style.display='none';return;}
            const total=crPanier.reduce((s,i)=>s+(i.prix*i.quantite),0);
            con.innerHTML=crPanier.map((item,idx)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px;"><span>${escapeHtml(item.nom)}</span><span style="display:flex;align-items:center;gap:6px;"><button class="cr-qty-btn" data-idx="${idx}" data-delta="-1">−</button><span style="font-weight:600;">${item.quantite}</span><button class="cr-qty-btn" data-idx="${idx}" data-delta="1">+</button><span style="color:var(--danger);cursor:pointer;margin-left:6px;" data-idx="${idx}" data-action="remove">🗑️</span></span></div>`).join('');
            tl.style.display='flex';document.getElementById('cr-total').textContent=total.toLocaleString()+' FCFA';
            con.querySelectorAll('.cr-qty-btn').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();const idx=parseInt(this.dataset.idx),d=parseInt(this.dataset.delta);crPanier[idx].quantite=Math.max(1,Math.min(99,crPanier[idx].quantite+d));actualiserResume();});});
            con.querySelectorAll('[data-action="remove"]').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();crPanier.splice(parseInt(this.dataset.idx),1);actualiserResume();afficherMenuRapide(document.getElementById('cr-search').value);});});
        }
        async function validerCommandeRapide(){
            const table=document.getElementById('cr-table').value,client=document.getElementById('cr-client').value.trim()||'Client';
            if(!table){showToast('Sélectionnez une table','error');return;}if(!crPanier.length){showToast('Ajoutez au moins un plat','error');return;}
            const items=crPanier.map(i=>({menuId:i.menuId,quantite:i.quantite,prix:i.prix,nom:i.nom})),total=crPanier.reduce((s,i)=>s+(i.prix*i.quantite),0);
            const btn=document.getElementById('cr-submit');btn.disabled=true;btn.textContent='Enregistrement...';
            try{const t=localStorage.getItem(TOKEN_KEY);const r=await fetch('/api/commande-manuelle',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${t}`},body:JSON.stringify({restoId:currentResto,tableId:parseInt(table),clientName:client,items,total,source:'manuelle'})});
                if(r.ok){const d=await r.json();showToast('✅ Commande enregistrée ! Paiement à encaisser.','success');fermerCommandeRapide();chargerCommandes();}
                else{const e=await r.json();showToast(e.error||'Erreur','error');}
            }catch(e){showToast('Erreur réseau','error');}finally{btn.disabled=false;btn.textContent='✅ Enregistrer & Imprimer reçu';}
        }

        // ==================== REÇU ====================
        function genererRecu(client,table,items,total,commandeId){
            const now=new Date(),ds=now.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}),hs=now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
            const nomEtablissement = window.restoName || 'Mon établissement';
            document.getElementById('recu-print').innerHTML=`<div style="text-align:center;margin-bottom:16px;"><div style="font-size:22px;font-weight:bold;">🍽️ ${escapeHtml(nomEtablissement)}</div><div style="font-size:11px;color:#888;">${ds} à ${hs}</div><div style="font-size:11px;color:#888;">Commande #${commandeId}</div></div><div style="border-top:1px dashed #ddd;border-bottom:1px dashed #ddd;padding:8px 0;margin-bottom:10px;font-size:12px;color:#666;">Table : ${table} &nbsp;|&nbsp; Client : ${escapeHtml(client)}</div><table style="width:100%;font-size:12px;margin-bottom:10px;">${items.map(i=>`<tr><td style="padding:3px 0;">${escapeHtml(i.nom)} ×${i.quantite}</td><td style="text-align:right;">${(i.prix*i.quantite).toLocaleString()} F</td></tr>`).join('')}</table><div style="border-top:2px solid #000;padding-top:8px;display:flex;justify-content:space-between;font-size:16px;font-weight:bold;"><span>TOTAL</span><span>${total.toLocaleString()} FCFA</span></div><div style="text-align:center;margin-top:16px;font-size:11px;color:#888;">Merci de votre visite !<br>À bientôt ⭐</div><div style="display:flex;gap:8px;margin-top:16px;"><button onclick="window.print()" style="flex:1;padding:10px;background:#C6A43F;color:white;border:none;border-radius:20px;font-weight:600;cursor:pointer;">🖨️ Imprimer</button><button onclick="document.getElementById('modal-recu').style.display='none'" style="flex:1;padding:10px;background:#f0f0f0;border:none;border-radius:20px;cursor:pointer;">Fermer</button></div>`;
            document.getElementById('modal-recu').style.display='flex';
        }

        window.addEventListener('beforeunload',()=>{if(pollingTimer)clearInterval(pollingTimer);if(socket)socket.disconnect();});
        document.addEventListener('DOMContentLoaded',init);
        window.changerStatut=changerStatut;window.escapeHtml=escapeHtml;
    })();
    </script>
</body>
</html>
