<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Créer mon mot de passe | Restaurant Élite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1A1A2E 0%, #242440 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo { font-size: 48px; margin-bottom: 20px; }
        h1 { font-size: 28px; color: #1A1A2E; margin-bottom: 10px; }
        .subtitle { color: #6C6C7A; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #1A1A2E; }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #E0E0E0;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #C6A43F;
            box-shadow: 0 0 0 3px rgba(198,164,63,0.1);
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #C6A43F 0%, #9E7E2E 100%);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(198,164,63,0.3); }
        .error-message { color: #E74C3C; font-size: 14px; margin-top: 15px; }
        .success-message { color: #27AE60; font-size: 14px; margin-top: 15px; }
        .info-box {
            background: #F8F9FA;
            border-radius: 16px;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
        }
        .info-box p { margin: 5px 0; font-size: 14px; color: #666; }
        .requirement { font-size: 12px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🔐</div>
        <h1>Créer mon mot de passe</h1>
        <div class="subtitle">Bienvenue dans l'équipe !</div>
        
        <div class="info-box">
            <p>📧 <strong>Email :</strong> <span id="display-email">---</span></p>
            <p>👔 <strong>Rôle :</strong> <span id="display-role">---</span></p>
        </div>
        
        <div class="form-group">
            <label>🔒 Nouveau mot de passe</label>
            <input type="password" id="password" placeholder="Minimum 8 caractères">
            <div class="requirement">✓ Au moins 8 caractères</div>
        </div>
        
        <div class="form-group">
            <label>✅ Confirmer le mot de passe</label>
            <input type="password" id="confirm-password" placeholder="Retapez votre mot de passe">
        </div>
        
        <button class="btn-primary" id="submit-btn">Créer mon compte</button>
        
        <div id="message"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');
        const role = urlParams.get('role');
        const restoId = urlParams.get('resto_id');
        
        if (!token || !email) {
            document.getElementById('message').innerHTML = '<div class="error-message">❌ Lien invalide. Contactez votre gérant.</div>';
            document.getElementById('submit-btn').disabled = true;
        } else {
            document.getElementById('display-email').innerText = decodeURIComponent(email);
            document.getElementById('display-role').innerText = role === 'cuisinier' ? '👨‍🍳 Cuisinier' : '🍽️ Serveur';
        }
        
        async function setPassword() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const messageDiv = document.getElementById('message');
            
            if (password.length < 8) {
                messageDiv.innerHTML = '<div class="error-message">❌ Le mot de passe doit contenir au moins 8 caractères</div>';
                return;
            }
            
            if (password !== confirmPassword) {
                messageDiv.innerHTML = '<div class="error-message">❌ Les mots de passe ne correspondent pas</div>';
                return;
            }
            
            try {
                const res = await fetch('/api/auth/set-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, email: decodeURIComponent(email), motDePasse: password, role, restoId })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    localStorage.setItem('resto_token', data.token);
                    localStorage.setItem('resto_user', JSON.stringify(data.user));
                    localStorage.setItem('resto_role', data.user.role);
                    localStorage.setItem('resto_id', data.user.resto_id);
                    messageDiv.innerHTML = '<div class="success-message">✅ Compte créé ! Redirection...</div>';
                    setTimeout(() => {
                        window.location.href = data.user.role === 'cuisinier' || data.user.role === 'serveur' ? '/resto.html' : '/dashboard.html';
                    }, 1500);
                } else {
                    messageDiv.innerHTML = '<div class="error-message">❌ ' + (data.error || 'Erreur lors de la création du compte') + '</div>';
                }
            } catch(e) {
                messageDiv.innerHTML = '<div class="error-message">❌ Erreur de connexion</div>';
            }
        }
        
        document.getElementById('submit-btn').onclick = setPassword;
        document.getElementById('password').addEventListener('keypress', (e) => { if (e.key === 'Enter') setPassword(); });
        document.getElementById('confirm-password').addEventListener('keypress', (e) => { if (e.key === 'Enter') setPassword(); });
    </script>
</body>
</html>
