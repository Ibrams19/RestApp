<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-title" content="Resto Élite">
    <meta name="theme-color" content="#C6A43F">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>Dashboard | Restaurant Élite</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #C6A43F;
            margin: 10px 0;
        }
        .period-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .period-btn {
            padding: 10px 25px;
            border-radius: 40px;
            border: none;
            background: #f0f0f0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .period-btn.active {
            background: #C6A43F;
            color: white;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .chart-card h3 {
            margin-bottom: 20px;
            color: #1A1A2E;
        }
        .nav-bar {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: 10px 20px;
            border-radius: 40px;
            text-decoration: none;
            background: #1A1A2E;
            color: white;
            transition: all 0.3s;
        }
        .nav-btn:hover {
            background: #C6A43F;
            color: #1A1A2E;
        }
        .tables-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .table-card {
            background: #f8f8f8;
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            transition: all 0.3s;
        }
        .table-card:hover {
            background: #e8e8e8;
        }
        .table-number-display {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #C6A43F;
        }
        .qr-preview {
            width: 80px;
            height: 80px;
            margin: 10px auto;
            display: block;
            cursor: pointer;
            border-radius: 12px;
            background: white;
            padding: 5px;
            object-fit: contain;
        }
        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            margin: 3px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        .btn-premium-small {
            background: #C6A43F;
            color: #1A1A2E;
        }
        .btn-danger-small {
            background: #E74C3C;
            color: white;
        }
        .add-table-form {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .add-table-form input {
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #ddd;
            width: 120px;
        }
        .logout-btn {
            background: #E74C3C;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        .top-plats-list {
            list-style: none;
            padding: 0;
        }
        .top-plats-list li {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
            .tables-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
        }
        .refresh-btn {
            background: #3498DB;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
        }
        .error-placeholder {
            width: 80px;
            height: 80px;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f0f0;
            border-radius: 12px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <header class="header-premium">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; padding: 15px 30px;">
            <div class="logo">📊 TABLEAU DE BORD</div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span id="resto-name" style="color: #C6A43F;">Restaurant</span>
                <span id="user-role" style="background: #C6A43F; padding: 5px 12px; border-radius: 20px; font-size: 12px;">Gérant</span>
                <button class="logout-btn" id="logout-btn">🚪 Déconnexion</button>
            </div>
        </div>
    </header>

    <div class="nav-bar">
        <a href="/dashboard.html" class="nav-btn" style="background: #C6A43F;">📊 Dashboard</a>
        <a href="/admin.html" class="nav-btn">🍽️ Gestion plats</a>
        <a href="/employes.html" class="nav-btn">👥 Équipe</a>
        <a href="/resto.html" class="nav-btn">👨‍🍳 Cuisine</a>
        <a href="/qrcodes.html" class="nav-btn">📱 QR Codes</a>
    </div>

    <div class="dashboard-container">
        <div class="period-selector">
            <button class="period-btn active" data-period="day">📅 Aujourd'hui</button>
            <button class="period-btn" data-period="week">📆 Cette semaine</button>
            <button class="period-btn" data-period="month">📅 Ce mois</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div>💰 Chiffre d'affaires</div>
                <div class="stat-value" id="ca-total">0 FCFA</div>
            </div>
            <div class="stat-card">
                <div>📋 Commandes servies</div>
                <div class="stat-value" id="nb-commandes">0</div>
            </div>
            <div class="stat-card">
                <div>🛒 Panier moyen</div>
                <div class="stat-value" id="panier-moyen">0 FCFA</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h3>📈 Évolution des ventes</h3>
                <canvas id="evolution-chart" width="400" height="250"></canvas>
            </div>
            <div class="chart-card">
                <h3>🏆 Top 10 des plats</h3>
                <div id="top-plats-container"></div>
            </div>
        </div>

        <div class="tables-section">
            <h2>🏷️ Gestion des tables et QR codes</h2>
            <div style="margin-bottom: 15px; text-align: right;">
                <button class="refresh-btn" onclick="chargerTables()">🔄 Rafraîchir</button>
            </div>
            <div class="tables-grid" id="tables-grid">
                <div>Chargement des tables...</div>
            </div>
            <div class="add-table-form">
                <input type="number" id="new-table-number" placeholder="Numéro de table" min="1">
                <button class="btn-premium" id="add-table-btn">➕ Ajouter une table</button>
            </div>
        </div>
    </div>

    <script>

        async function checkSubscriptionStatus() {
    try {
        const res = await fetch('/api/restaurant/subscription', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (res.ok) {
            const data = await res.json();
            if (data.status === 'trial' && data.days_left <= 3) {
                showNotification(`⚠️ Votre essai se termine dans ${data.days_left} jours. Souscrivez un abonnement !`, 'warning');
            }
        } else if (res.status === 403) {
            const error = await res.json();
            if (error.error === 'expired') {
                window.location.href = '/subscription.html';
            }
        }
    } catch(e) { console.error(e); }
}

checkSubscriptionStatus();

        // VÉRIFICATION DU RÔLE - Dashboard accessible uniquement au gérant
        const token = localStorage.getItem('resto_token');
        const userRole = localStorage.getItem('resto_role');
        
        if (!token) {
            window.location.href = '/login.html';
        }
        
        if (userRole !== 'gerant') {
            // Si ce n'est pas un gérant, rediriger vers resto.html
            window.location.href = '/resto.html';
        }
        
        // Afficher le rôle
        const roleSpan = document.getElementById('user-role');
        if (roleSpan) {
            if (userRole === 'gerant') roleSpan.textContent = '👑 Gérant';
            else if (userRole === 'cuisinier') roleSpan.textContent = '👨‍🍳 Cuisinier';
            else if (userRole === 'serveur') roleSpan.textContent = '🍽️ Serveur';
        }
        
        let currentPeriod = 'day';
        let currentResto = localStorage.getItem('resto_id') || 1;
        let evolutionChart;
        
        const user = JSON.parse(localStorage.getItem('resto_user') || '{}');
        if (user.restaurant_name) {
            document.getElementById('resto-name').innerText = user.restaurant_name;
        }
        
        async function chargerStats() {
            try {
                const res = await fetch(`/api/stats/${currentResto}?periode=${currentPeriod}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const stats = await res.json();
                    document.getElementById('ca-total').innerHTML = (stats.caTotal || 0).toLocaleString() + ' FCFA';
                    document.getElementById('nb-commandes').innerHTML = stats.nbCommandes || 0;
                    document.getElementById('panier-moyen').innerHTML = Math.round(stats.panierMoyen || 0).toLocaleString() + ' FCFA';
                    
                    if (stats.topPlats && stats.topPlats.length) {
                        const container = document.getElementById('top-plats-container');
                        container.innerHTML = `
                            <ul class="top-plats-list">
                                ${stats.topPlats.slice(0,10).map((plat, index) => `
                                    <li><span>${index + 1}. 🍽️ ${plat.nom}</span><span>${plat.quantite} vendus</span></li>
                                `).join('')}
                            </ul>
                        `;
                    } else {
                        document.getElementById('top-plats-container').innerHTML = '<p>Aucune vente pour cette période</p>';
                    }
                    
                    if (stats.evolution && stats.evolution.length) {
                        updateEvolutionChart(stats.evolution);
                    }
                } else if (res.status === 401 || res.status === 403) {
                    localStorage.clear();
                    window.location.href = '/login.html';
                }
            } catch(e) { console.error(e); }
        }
        
        function updateEvolutionChart(evolution) {
            const ctx = document.getElementById('evolution-chart').getContext('2d');
            if (evolutionChart) evolutionChart.destroy();
            evolutionChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: evolution.map(e => e.date),
                    datasets: [{
                        label: 'CA (FCFA)',
                        data: evolution.map(e => e.total),
                        borderColor: '#C6A43F',
                        backgroundColor: 'rgba(198,164,63,0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true
                }
            });
        }
        
        async function chargerTables() {
            try {
                const res = await fetch(`/api/tables/${currentResto}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const tables = await res.json();
                    afficherTables(tables);
                } else {
                    document.getElementById('tables-grid').innerHTML = '<p style="color:red;">Erreur chargement tables</p>';
                }
            } catch(e) { 
                console.error(e);
                document.getElementById('tables-grid').innerHTML = '<p style="color:red;">Erreur réseau</p>';
            }
        }
        
        function afficherTables(tables) {
            const container = document.getElementById('tables-grid');
            if (!tables.length) {
                container.innerHTML = '<p style="color:gray;">Aucune table. Ajoutez-en une !</p>';
                return;
            }
            
            container.innerHTML = tables.map(table => `
                <div class="table-card">
                    <div class="table-number-display">🍽️ Table ${table.numero_table}</div>
                    <img class="qr-preview" 
                         src="/api/qrcode-image/${currentResto}/${table.numero_table}?t=${Date.now()}" 
                         alt="QR Code Table ${table.numero_table}"
                         onclick="window.open('/api/generate-qr/${currentResto}/${table.numero_table}', '_blank')"
                         onerror="this.onerror=null; this.parentElement.querySelector('.qr-error').style.display='flex'; this.style.display='none';"
                         style="cursor: pointer;">
                    <div class="qr-error" style="display: none; width:80px; height:80px; margin:10px auto; align-items:center; justify-content:center; background:#f0f0f0; border-radius:12px; color:#999; font-size:11px;">
                        ⚠️ Erreur
                    </div>
                    <div>
                        <button class="btn-small btn-premium-small" onclick="genererQR(${table.numero_table})">🖨️ Imprimer</button>
                        <button class="btn-small btn-danger-small" onclick="supprimerTable(${table.id})">🗑️ Supprimer</button>
                    </div>
                </div>
            `).join('');
        }
        
        function genererQR(tableId) {
            window.open(`/api/generate-qr/${currentResto}/${tableId}`, '_blank');
        }
        
        async function ajouterTable() {
            const numeroTable = document.getElementById('new-table-number').value;
            if (!numeroTable) {
                alert('Entrez un numéro de table');
                return;
            }
            try {
                const res = await fetch('/api/tables', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ restoId: currentResto, numeroTable: parseInt(numeroTable) })
                });
                if (res.ok) {
                    document.getElementById('new-table-number').value = '';
                    chargerTables();
                } else {
                    alert('Erreur lors de l\'ajout');
                }
            } catch(e) { console.error(e); }
        }
        
        async function supprimerTable(id) {
            if (!confirm('Supprimer cette table ?')) return;
            try {
                const res = await fetch(`/api/tables/${id}`, { 
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) chargerTables();
            } catch(e) { console.error(e); }
        }
        
        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPeriod = btn.dataset.period;
                chargerStats();
            };
        });
        
        document.getElementById('add-table-btn').onclick = ajouterTable;
        document.getElementById('logout-btn').onclick = () => {
            localStorage.clear();
            window.location.href = '/login.html';
        };
        
        // Fonctions globales pour les onclick
        window.genererQR = genererQR;
        window.supprimerTable = supprimerTable;
        window.chargerTables = chargerTables;
        
        chargerStats();
        chargerTables();
        setInterval(chargerStats, 30000);
    </script>
</body>
</html>
