<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mot de passe oublié | Restaurant Élite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1A1A2E 0%, #242440 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        .logo { font-size: 48px; margin-bottom: 20px; }
        h1 { font-size: 28px; color: #1A1A2E; margin-bottom: 10px; }
        .subtitle { color: #6C6C7A; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 16px;
            font-size: 16px;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #C6A43F 0%, #9E7E2E 100%);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px solid #C6A43F;
            border-radius: 40px;
            color: #C6A43F;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            text-decoration: none;
            display: inline-block;
        }
        .message { margin-top: 15px; font-size: 14px; }
        .success { color: #27AE60; }
        .error { color: #E74C3C; }
        .back-link { display: block; margin-top: 20px; color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🔒</div>
        <h1>Mot de passe oublié ?</h1>
        <div class="subtitle">Entrez votre email pour réinitialiser votre mot de passe</div>
        
        <div class="form-group">
            <label>📧 Email</label>
            <input type="email" id="email" placeholder="ex: gerant@monresto.com">
        </div>
        
        <button class="btn-primary" id="submit-btn">Envoyer le lien de réinitialisation</button>
        
        <a href="/login.html" class="btn-secondary">← Retour à la connexion</a>
        
        <div id="message"></div>
    </div>

    <script>
        async function resetPassword() {
            const email = document.getElementById('email').value.trim();
            const messageDiv = document.getElementById('message');
            
            if (!email) {
                messageDiv.innerHTML = '<div class="message error">❌ Veuillez entrer votre email</div>';
                return;
            }
            
            messageDiv.innerHTML = '<div class="message">⏳ Envoi en cours...</div>';
            
            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    messageDiv.innerHTML = `<div class="message success">✅ ${data.message}<br><br>Lien : ${data.resetUrl}</div>`;
                } else {
                    messageDiv.innerHTML = `<div class="message error">❌ ${data.error || 'Email non trouvé'}</div>`;
                }
            } catch(e) {
                messageDiv.innerHTML = '<div class="message error">❌ Erreur de connexion</div>';
            }
        }
        
        document.getElementById('submit-btn').onclick = resetPassword;
        document.getElementById('email').addEventListener('keypress', (e) => { if (e.key === 'Enter') resetPassword(); });
    </script>
</body>
</html>
