<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d0d0d">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <title>Mot de passe oublié | Restaurant 7★</title>
    <style>
        :root { --gold: #C6A43F; --gold-dark: #a8872a; --danger: #d9534f; --success: #27AE60; --text: #1a1a1a; --text-secondary: #6b6b6b; --border: #e8e5df; --font-sans: 'Inter', 'Segoe UI', system-ui, sans-serif; --font-serif: 'Playfair Display', 'Georgia', serif; --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1); --radius-md: 16px; --radius-xl: 60px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); background: #faf8f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; -webkit-font-smoothing: antialiased; }
        body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 30%, rgba(198,164,63,0.04) 0%, transparent 60%); pointer-events: none; }
        .card { position: relative; z-index: 1; background: #fff; border: 1px solid var(--border); border-radius: 28px; padding: 40px 32px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,0.06); animation: fadeUp 0.5s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .logo-icon { font-size: 48px; margin-bottom: 16px; }
        h1 { font-family: var(--font-serif); font-size: 24px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.3px; }
        .subtitle { color: var(--text-secondary); font-size: 13px; margin-bottom: 28px; }
        .form-group { margin-bottom: 18px; text-align: left; }
        .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input { width: 100%; padding: 13px 16px; border: 1px solid var(--border); border-radius: 14px; font-size: 15px; font-family: var(--font-sans); transition: all var(--transition); background: #fdfcfa; }
        .form-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(198,164,63,0.07); outline: none; background: #fff; }
        .btn-submit { width: 100%; padding: 13px; border-radius: var(--radius-xl); background: var(--gold); color: #fff; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: all var(--transition); font-family: var(--font-sans); letter-spacing: 0.2px; }
        .btn-submit:hover { background: var(--gold-dark); }
        .btn-submit:disabled { opacity: 0.6; }
        .back-link { display: block; margin-top: 20px; color: var(--text-secondary); text-decoration: none; font-size: 13px; transition: color var(--transition); }
        .back-link:hover { color: var(--gold); }
        .message { margin-top: 16px; padding: 12px 16px; border-radius: 14px; font-size: 13px; font-weight: 500; display: none; }
        .message.success { display: block; background: #E8F5E9; color: #1E8C4A; border: 1px solid #c3e6cb; }
        .message.error { display: block; background: #FDE8E8; color: #C0392B; border: 1px solid #f5c6cb; }
        .message.info { display: block; background: #FFF8E1; color: #E67E22; border: 1px solid #ffeeba; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-icon">🔒</div>
        <h1>Mot de passe oublié</h1>
        <p class="subtitle">Entrez votre email pour recevoir un lien de réinitialisation</p>
        <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input type="email" class="form-input" id="email" placeholder="gerant@monrestaurant.com" autocomplete="email" required>
        </div>
        <button class="btn-submit" id="submit-btn">Envoyer le lien</button>
        <div id="message" class="message"></div>
        <a href="/login.html" class="back-link">← Retour à la connexion</a>
    </div>
    <script>
    (function() {
        const btn = document.getElementById('submit-btn');
        const emailInput = document.getElementById('email');
        const msgDiv = document.getElementById('message');

        function showMsg(text, type) { msgDiv.textContent = text; msgDiv.className = 'message ' + type; }
        function hideMsg() { msgDiv.className = 'message'; }

        async function resetPassword() {
            const email = emailInput.value.trim();
            if (!email) { showMsg('Veuillez entrer votre email.', 'error'); return; }

            hideMsg();
            btn.disabled = true;
            btn.textContent = 'Envoi…';
            showMsg('Envoi en cours…', 'info');

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (res.ok) {
                    showMsg(data.message || 'Un lien a été envoyé à votre adresse email.', 'success');
                } else {
                    showMsg(data.message || 'Erreur lors de l\'envoi.', 'error');
                }
            } catch(e) {
                showMsg('Erreur réseau. Réessayez.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Envoyer le lien';
            }
        }

        btn.addEventListener('click', resetPassword);
        emailInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') resetPassword(); });
    })();
    </script>
</body>
</html>
