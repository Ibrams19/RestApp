<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Réinitialisation | Restaurant Élite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1A1A2E 0%, #242440 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        .logo { font-size: 48px; margin-bottom: 20px; }
        h1 { font-size: 28px; color: #1A1A2E; margin-bottom: 10px; }
        .subtitle { color: #6C6C7A; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 16px;
            font-size: 16px;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #C6A43F 0%, #9E7E2E 100%);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .message { margin-top: 15px; font-size: 14px; }
        .success { color: #27AE60; }
        .error { color: #E74C3C; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🔄</div>
        <h1>Nouveau mot de passe</h1>
        <div class="subtitle">Créez un nouveau mot de passe</div>
        
        <div class="form-group">
            <label>🔒 Nouveau mot de passe</label>
            <input type="password" id="password" placeholder="Minimum 8 caractères">
        </div>
        
        <div class="form-group">
            <label>✅ Confirmer</label>
            <input type="password" id="confirm-password" placeholder="Retapez votre mot de passe">
        </div>
        
        <button class="btn-primary" id="submit-btn">Réinitialiser</button>
        
        <div id="message"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');
        
        if (!token || !email) {
            document.getElementById('message').innerHTML = '<div class="message error">❌ Lien invalide</div>';
            document.getElementById('submit-btn').disabled = true;
        }
        
        async function resetPassword() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const messageDiv = document.getElementById('message');
            
            if (password.length < 8) {
                messageDiv.innerHTML = '<div class="message error">❌ Minimum 8 caractères</div>';
                return;
            }
            
            if (password !== confirmPassword) {
                messageDiv.innerHTML = '<div class="message error">❌ Les mots de passe ne correspondent pas</div>';
                return;
            }
            
            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, email: decodeURIComponent(email), motDePasse: password })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    localStorage.setItem('resto_token', data.token);
                    messageDiv.innerHTML = '<div class="message success">✅ Mot de passe modifié ! Redirection...</div>';
                    setTimeout(() => { window.location.href = '/dashboard.html'; }, 1500);
                } else {
                    messageDiv.innerHTML = `<div class="message error">❌ ${data.error || 'Erreur'}</div>`;
                }
            } catch(e) {
                messageDiv.innerHTML = '<div class="message error">❌ Erreur de connexion</div>';
            }
        }
        
        document.getElementById('submit-btn').onclick = resetPassword;
    </script>
</body>
</html>
